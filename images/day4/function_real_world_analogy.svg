  <text x="490" y="295" text-anchor="middle" style="font-family:var(--font-mono);fill:#854F0B;fill:rgb(133, 79, 11);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:ui-monospace, monospace;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">(water, leaves, sugar)</text>
  <text x="620" y="295" text-anchor="middle" style="font-family:var(--font-mono);fill:var(--color-text-secondary);fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:ui-monospace, monospace;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto"> { ... }</text>
