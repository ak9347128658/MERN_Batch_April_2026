<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="260" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">RETURNING Clause — Get Back What Was Written</text>

  <!-- WITHOUT RETURNING (left) -->
  <rect x="20" y="38" width="330" height="38" fill="#dc2626" rx="6 6 0 0"/>
  <text x="185" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌  Without RETURNING</text>

  <rect x="20" y="76" width="330" height="150" fill="white" rx="0 0 8 8" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="30" y="86" width="310" height="28" fill="#fee2e2" rx="4"/>
  <text x="185" y="100" text-anchor="middle" font-size="11" fill="#991b1b">INSERT INTO users (name, city)</text>
  <text x="185" y="113" text-anchor="middle" font-size="11" fill="#991b1b">VALUES ('Pooja', 'Ahmedabad');</text>

  <text x="185" y="140" text-anchor="middle" font-size="12" fill="#64748b">Database says:</text>
  <text x="185" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">"INSERT 0 1" — 1 row added</text>
  <text x="185" y="175" text-anchor="middle" font-size="11" fill="#94a3b8">But what is her ID?</text>

  <rect x="30" y="183" width="310" height="34" fill="#fef3c7" rx="4"/>
  <text x="185" y="197" text-anchor="middle" font-size="11" fill="#92400e">⏳ You must run a SEPARATE query:</text>
  <text x="185" y="212" text-anchor="middle" font-size="11" fill="#92400e">SELECT id FROM users WHERE name = 'Pooja';</text>

  <!-- WITH RETURNING (right) -->
  <rect x="390" y="38" width="330" height="38" fill="#16a34a" rx="6 6 0 0"/>
  <text x="555" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅  With RETURNING</text>

  <rect x="390" y="76" width="330" height="150" fill="white" rx="0 0 8 8" stroke="#86efac" stroke-width="1.5"/>
  <rect x="400" y="86" width="310" height="38" fill="#dcfce7" rx="4"/>
  <text x="555" y="100" text-anchor="middle" font-size="11" fill="#14532d">INSERT INTO users (name, city)</text>
  <text x="555" y="113" text-anchor="middle" font-size="11" fill="#14532d">VALUES ('Pooja', 'Ahmedabad')</text>
  <text x="555" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">RETURNING id, name, created_at;</text>

  <text x="555" y="148" text-anchor="middle" font-size="12" fill="#64748b">Immediately returns:</text>

  <!-- result table -->
  <rect x="400" y="156" width="310" height="22" fill="#16a34a" rx="3"/>
  <line x1="460" y1="156" x2="460" y2="220" stroke="#15803d" stroke-width="1"/>
  <line x1="570" y1="156" x2="570" y2="220" stroke="#15803d" stroke-width="1"/>
  <text x="430" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="white">id</text>
  <text x="515" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="white">name</text>
  <text x="650" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="white">created_at</text>

  <rect x="400" y="178" width="310" height="22" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="430" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">11</text>
  <text x="515" y="194" text-anchor="middle" font-size="11" fill="#1e293b">Pooja</text>
  <text x="650" y="194" text-anchor="middle" font-size="10" fill="#1e293b">2026-04-25 10:30:00</text>

  <!-- Benefit note -->
  <rect x="400" y="206" width="310" height="14" fill="#bbf7d0" rx="3"/>
  <text x="555" y="217" text-anchor="middle" font-size="10" fill="#14532d">✅  ID returned in the same round trip — no extra query!</text>

  <!-- Bottom comparison -->
  <rect x="20" y="238" width="700" height="16" fill="#1e40af" rx="4"/>
  <text x="370" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="white">RETURNING works with INSERT, UPDATE, and DELETE — always shows what was actually written to disk</text>
</svg>
