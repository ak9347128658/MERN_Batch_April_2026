<svg viewBox="0 0 740 250" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="250" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">How PostgreSQL UPDATE Works — MVCC (Multi-Version Concurrency Control)</text>

  <!-- BEFORE -->
  <text x="150" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">BEFORE UPDATE</text>
  <rect x="30" y="56" width="240" height="60" fill="white" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="56" width="240" height="24" fill="#3b82f6" rx="8 8 0 0"/>
  <text x="150" y="73" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Row id=1  (live tuple)</text>
  <text x="150" y="98" text-anchor="middle" font-size="13" fill="#1e293b">Rahul  |  city = 'Mumbai'</text>
  <text x="150" y="113" text-anchor="middle" font-size="10" fill="#64748b">xmin=100, xmax=0 (visible to all)</text>

  <!-- Arrow + SQL -->
  <line x1="285" y1="86" x2="315" y2="86" stroke="#7c3aed" stroke-width="2.5"/>
  <polygon points="311,80 321,86 311,92" fill="#7c3aed"/>
  <rect x="290" y="58" width="160" height="56" fill="#7c3aed" rx="6"/>
  <text x="370" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="white">UPDATE users</text>
  <text x="370" y="88" text-anchor="middle" font-size="10" fill="#ddd6fe">SET city = 'Bangalore'</text>
  <text x="370" y="101" text-anchor="middle" font-size="10" fill="#ddd6fe">WHERE id = 1;</text>
  <text x="370" y="113" text-anchor="middle" font-size="9" fill="#c4b5fd">txid = 500</text>

  <!-- AFTER -->
  <text x="555" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">AFTER UPDATE</text>

  <!-- Dead tuple -->
  <rect x="330" y="56" width="220" height="60" fill="#fef2f2" rx="8" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="330" y="56" width="220" height="24" fill="#fca5a5" rx="8 8 0 0"/>
  <text x="440" y="73" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">☠️  Row id=1  (dead tuple)</text>
  <text x="440" y="98" text-anchor="middle" font-size="11" fill="#94a3b8">Rahul  |  city = 'Mumbai'</text>
  <text x="440" y="113" text-anchor="middle" font-size="10" fill="#94a3b8">xmin=100, xmax=500 (dead)</text>

  <!-- New live tuple -->
  <rect x="490" y="128" width="230" height="60" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="490" y="128" width="230" height="24" fill="#16a34a" rx="8 8 0 0"/>
  <text x="605" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅  Row id=1  (new live tuple)</text>
  <text x="605" y="170" text-anchor="middle" font-size="13" fill="#1e293b">Rahul  |  city = 'Bangalore'</text>
  <text x="605" y="185" text-anchor="middle" font-size="10" fill="#64748b">xmin=500, xmax=0 (visible)</text>

  <!-- Arrow from dead to new -->
  <line x1="440" y1="116" x2="605" y2="128" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="600,122 610,128 603,136" fill="#16a34a"/>

  <!-- VACUUM -->
  <rect x="30" y="148" width="250" height="50" fill="#fef3c7" rx="8" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="155" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">🧹 VACUUM (background)</text>
  <text x="155" y="183" text-anchor="middle" font-size="11" fill="#92400e">Later reclaims space from dead tuples</text>
  <text x="155" y="196" text-anchor="middle" font-size="10" fill="#b45309">Dead tuple hangs around until VACUUM runs</text>

  <!-- Why this matters -->
  <rect x="30" y="208" width="700" height="34" fill="#ede9fe" rx="6" stroke="#c4b5fd" stroke-width="1"/>
  <text x="370" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Why MVCC Matters:</text>
  <text x="370" y="237" text-anchor="middle" font-size="11" fill="#475569">Other transactions reading the table STILL see 'Mumbai' (the old version) until they refresh. Readers never block writers. Writers never block readers.</text>
</svg>
