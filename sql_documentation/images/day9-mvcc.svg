<svg viewBox="0 0 740 270" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="270" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">MVCC — Multiple Versions Allow Readers and Writers in Parallel</text>

  <!-- Timeline labels -->
  <text x="370" y="42" text-anchor="middle" font-size="11" fill="#64748b">Transaction A updates a row — Transaction B reads at the same time — they never block each other</text>

  <!-- Timeline arrows -->
  <line x1="20" y1="58" x2="720" y2="58" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="10" y="56" font-size="9" fill="#94a3b8">time →</text>

  <!-- Transaction A (top half) -->
  <text x="30" y="80" font-size="11" font-weight="bold" fill="#2563eb">Transaction A (UPDATE)</text>

  <!-- Step 1: BEGIN -->
  <rect x="30" y="88" width="80" height="32" fill="#2563eb" rx="4"/>
  <text x="70" y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="white">BEGIN</text>

  <!-- Arrow -->
  <line x1="112" y1="104" x2="140" y2="104" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="137,100 144,104 137,108" fill="#2563eb"/>

  <!-- Step 2: UPDATE creates new version -->
  <rect x="144" y="88" width="180" height="32" fill="#2563eb" rx="4"/>
  <text x="234" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="white">UPDATE balance 50k→40k</text>
  <text x="234" y="116" text-anchor="middle" font-size="9" fill="#bfdbfe">Creates new row version</text>

  <!-- Arrow -->
  <line x1="326" y1="104" x2="354" y2="104" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="351,100 358,104 351,108" fill="#2563eb"/>

  <!-- Step 3: COMMIT -->
  <rect x="358" y="88" width="80" height="32" fill="#16a34a" rx="4"/>
  <text x="398" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="white">COMMIT</text>
  <text x="398" y="116" text-anchor="middle" font-size="9" fill="#bbf7d0">New version visible</text>

  <!-- Versions shown -->
  <!-- Old version (marked deleted by A) -->
  <rect x="150" y="130" width="160" height="40" fill="#fef2f2" rx="6" stroke="#dc2626" stroke-width="1.5"/>
  <text x="230" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Old version (dead tuple)</text>
  <text x="230" y="162" text-anchor="middle" font-size="10" fill="#1e293b">balance = 50,000  xmax = A</text>

  <!-- New version (created by A) -->
  <rect x="340" y="130" width="160" height="40" fill="#dcfce7" rx="6" stroke="#16a34a" stroke-width="1.5"/>
  <text x="420" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">New version (live)</text>
  <text x="420" y="162" text-anchor="middle" font-size="10" fill="#1e293b">balance = 40,000  xmin = A</text>

  <!-- VACUUM cleans up later -->
  <rect x="520" y="130" width="160" height="40" fill="#f5f3ff" rx="6" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="600" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c3aed">VACUUM (later)</text>
  <text x="600" y="162" text-anchor="middle" font-size="10" fill="#1e293b">Reclaims dead tuple space</text>

  <!-- Transaction B (bottom half) -->
  <text x="30" y="195" font-size="11" font-weight="bold" fill="#d97706">Transaction B (SELECT) — started BEFORE A committed</text>

  <rect x="30" y="203" width="80" height="32" fill="#d97706" rx="4"/>
  <text x="70" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="white">BEGIN</text>

  <!-- Arrow -->
  <line x1="112" y1="219" x2="140" y2="219" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="137,215 144,219 137,223" fill="#d97706"/>

  <rect x="144" y="203" width="180" height="32" fill="#d97706" rx="4"/>
  <text x="234" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="white">SELECT balance</text>
  <text x="234" y="231" text-anchor="middle" font-size="9" fill="#fde68a">Sees snapshot from BEGIN time</text>

  <!-- Arrow pointing to old version -->
  <line x1="230" y1="203" x2="230" y2="172" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="226,175 230,170 234,175" fill="#d97706"/>
  <text x="247" y="188" font-size="9" fill="#d97706">sees OLD value (50k)</text>
  <text x="247" y="199" font-size="9" fill="#d97706">A's change invisible</text>

  <!-- B never sees A's uncommitted change - wait until commit or snapshot -->
  <rect x="340" y="203" width="160" height="32" fill="#fef3c7" rx="4" stroke="#d97706" stroke-width="1"/>
  <text x="420" y="221" text-anchor="middle" font-size="10" fill="#92400e">Returns: balance = 50,000</text>
  <text x="420" y="232" text-anchor="middle" font-size="9" fill="#d97706">(B's snapshot was before A)</text>

  <!-- Bottom bar -->
  <rect x="20" y="246" width="700" height="18" fill="#1e40af" rx="6"/>
  <text x="370" y="259" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MVCC Key: Readers see the version that existed when their snapshot was taken — no waiting, no blocking</text>
</svg>
