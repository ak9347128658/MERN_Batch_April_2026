<svg viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="280" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">The Golden Rule: ALWAYS Use WHERE with UPDATE and DELETE</text>

  <!-- WRONG side -->
  <rect x="20" y="38" width="330" height="34" fill="#dc2626" rx="6 6 0 0"/>
  <text x="185" y="61" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌  Without WHERE — DISASTER!</text>
  <rect x="20" y="72" width="330" height="170" fill="white" rx="0 0 8 8" stroke="#fca5a5" stroke-width="2"/>

  <rect x="30" y="80" width="310" height="26" fill="#fee2e2" rx="4"/>
  <text x="185" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">UPDATE users SET city = 'Delhi';</text>

  <!-- ALL rows highlighted red -->
  <rect x="30" y="114" width="310" height="22" fill="#dc2626"/>
  <line x1="120" y1="114" x2="120" y2="236" stroke="#b91c1c" stroke-width="1"/>
  <line x1="210" y1="114" x2="210" y2="236" stroke="#b91c1c" stroke-width="1"/>
  <text x="75" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">name</text>
  <text x="165" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">city BEFORE</text>
  <text x="270" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">city AFTER ⚠️</text>

  <rect x="30" y="136" width="310" height="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="75" y="150" text-anchor="middle" font-size="10" fill="#1e293b">Rahul</text>
  <text x="165" y="150" text-anchor="middle" font-size="10" fill="#475569">Mumbai</text>
  <text x="270" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Delhi 😱</text>

  <rect x="30" y="156" width="310" height="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="75" y="170" text-anchor="middle" font-size="10" fill="#1e293b">Priya</text>
  <text x="165" y="170" text-anchor="middle" font-size="10" fill="#475569">Delhi</text>
  <text x="270" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Delhi 😱</text>

  <rect x="30" y="176" width="310" height="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="75" y="190" text-anchor="middle" font-size="10" fill="#1e293b">Amit</text>
  <text x="165" y="190" text-anchor="middle" font-size="10" fill="#475569">Pune</text>
  <text x="270" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Delhi 😱</text>

  <rect x="30" y="196" width="310" height="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="75" y="210" text-anchor="middle" font-size="10" fill="#1e293b">Sneha</text>
  <text x="165" y="210" text-anchor="middle" font-size="10" fill="#475569">Hyderabad</text>
  <text x="270" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Delhi 😱</text>

  <text x="185" y="233" text-anchor="middle" font-size="10" fill="#dc2626">... ALL 10,000 rows now say Delhi!</text>

  <!-- CORRECT side -->
  <rect x="390" y="38" width="330" height="34" fill="#16a34a" rx="6 6 0 0"/>
  <text x="555" y="61" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅  With WHERE — Surgical Precision</text>
  <rect x="390" y="72" width="330" height="170" fill="white" rx="0 0 8 8" stroke="#86efac" stroke-width="2"/>

  <rect x="400" y="80" width="310" height="26" fill="#dcfce7" rx="4"/>
  <text x="555" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">UPDATE users SET city = 'Delhi' WHERE id = 1;</text>

  <!-- Only first row highlighted -->
  <rect x="400" y="114" width="310" height="22" fill="#16a34a"/>
  <line x1="490" y1="114" x2="490" y2="236" stroke="#15803d" stroke-width="1"/>
  <line x1="580" y1="114" x2="580" y2="236" stroke="#15803d" stroke-width="1"/>
  <text x="445" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">name</text>
  <text x="535" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">city BEFORE</text>
  <text x="650" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">city AFTER ✅</text>

  <rect x="400" y="136" width="310" height="20" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="445" y="150" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">Rahul (id=1)</text>
  <text x="535" y="150" text-anchor="middle" font-size="10" fill="#475569">Mumbai</text>
  <text x="650" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">Delhi ✓</text>

  <rect x="400" y="156" width="310" height="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="445" y="170" text-anchor="middle" font-size="10" fill="#1e293b">Priya</text>
  <text x="535" y="170" text-anchor="middle" font-size="10" fill="#475569">Delhi</text>
  <text x="650" y="170" text-anchor="middle" font-size="10" fill="#475569">Delhi (unchanged)</text>

  <rect x="400" y="176" width="310" height="20" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="445" y="190" text-anchor="middle" font-size="10" fill="#1e293b">Amit</text>
  <text x="535" y="190" text-anchor="middle" font-size="10" fill="#475569">Pune</text>
  <text x="650" y="190" text-anchor="middle" font-size="10" fill="#475569">Pune (unchanged)</text>

  <rect x="400" y="196" width="310" height="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="445" y="210" text-anchor="middle" font-size="10" fill="#1e293b">Sneha</text>
  <text x="535" y="210" text-anchor="middle" font-size="10" fill="#475569">Hyderabad</text>
  <text x="650" y="210" text-anchor="middle" font-size="10" fill="#475569">Hyderabad (unchanged)</text>

  <text x="555" y="233" text-anchor="middle" font-size="10" fill="#16a34a">Only 1 row updated — exactly as intended ✅</text>

  <!-- Bottom rule -->
  <rect x="20" y="252" width="700" height="22" fill="#dc2626" rx="6"/>
  <text x="370" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⚠️  Pro tip: Always run SELECT with the same WHERE first to preview which rows will be affected!</text>
</svg>
