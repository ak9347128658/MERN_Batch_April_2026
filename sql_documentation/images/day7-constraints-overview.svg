<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="340" fill="#f0f4ff" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Database Constraints — Data Integrity Rules</text>

  <!-- Table -->
  <rect x="200" y="50" width="360" height="34" fill="#1e40af" rx="6 6 0 0"/>
  <text x="380" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CREATE TABLE users ( ... )</text>

  <!-- Rows with constraint labels -->
  <rect x="200" y="84" width="360" height="34" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="106" text-anchor="middle" font-size="13" fill="#1e293b">id  SERIAL  PRIMARY KEY</text>

  <rect x="200" y="118" width="360" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="140" text-anchor="middle" font-size="13" fill="#1e293b">email  VARCHAR(150)  UNIQUE  NOT NULL</text>

  <rect x="200" y="152" width="360" height="34" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="174" text-anchor="middle" font-size="13" fill="#1e293b">age  INT  CHECK (age &gt;= 13)</text>

  <rect x="200" y="186" width="360" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="208" text-anchor="middle" font-size="13" fill="#1e293b">status  VARCHAR(20)  DEFAULT 'active'</text>

  <rect x="200" y="220" width="360" height="34" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="242" text-anchor="middle" font-size="13" fill="#1e293b">dept_id  INT  FOREIGN KEY → depts(id)</text>

  <!-- Callout: PRIMARY KEY -->
  <line x1="200" y1="101" x2="100" y2="101" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="101" r="3" fill="#dc2626"/>
  <rect x="20" y="88" width="74" height="26" fill="#fee2e2" rx="4" stroke="#dc2626" stroke-width="1"/>
  <text x="57" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">PRIMARY KEY</text>
  <text x="57" y="111" text-anchor="middle" font-size="9" fill="#dc2626">Unique + Not Null</text>

  <!-- Callout: UNIQUE -->
  <line x1="200" y1="128" x2="110" y2="128" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="128" r="3" fill="#7c3aed"/>
  <rect x="20" y="116" width="84" height="24" fill="#ede9fe" rx="4" stroke="#7c3aed" stroke-width="1"/>
  <text x="62" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c3aed">UNIQUE — No duplicates</text>

  <!-- Callout: NOT NULL -->
  <line x1="200" y1="145" x2="120" y2="155" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="145" r="3" fill="#2563eb"/>
  <rect x="20" y="143" width="94" height="24" fill="#dbeafe" rx="4" stroke="#2563eb" stroke-width="1"/>
  <text x="67" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#2563eb">NOT NULL — Required</text>

  <!-- Callout: CHECK -->
  <line x1="200" y1="169" x2="100" y2="175" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="169" r="3" fill="#d97706"/>
  <rect x="20" y="163" width="74" height="24" fill="#fef3c7" rx="4" stroke="#d97706" stroke-width="1"/>
  <text x="57" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97706">CHECK — Custom rule</text>

  <!-- Callout: DEFAULT -->
  <line x1="200" y1="203" x2="100" y2="203" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="203" r="3" fill="#16a34a"/>
  <rect x="20" y="191" width="74" height="24" fill="#dcfce7" rx="4" stroke="#16a34a" stroke-width="1"/>
  <text x="57" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">DEFAULT</text>
  <text x="57" y="213" text-anchor="middle" font-size="9" fill="#16a34a">Auto value</text>

  <!-- Callout: FOREIGN KEY -->
  <line x1="200" y1="237" x2="90" y2="237" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="237" r="3" fill="#0369a1"/>
  <rect x="20" y="225" width="64" height="26" fill="#e0f2fe" rx="4" stroke="#0369a1" stroke-width="1"/>
  <text x="52" y="237" text-anchor="middle" font-size="10" font-weight="bold" fill="#0369a1">FOREIGN</text>
  <text x="52" y="249" text-anchor="middle" font-size="10" font-weight="bold" fill="#0369a1">KEY</text>

  <!-- Bottom divider -->
  <rect x="200" y="254" width="360" height="3" fill="#1e40af" rx="0 0 4 4"/>

  <!-- Summary bar -->
  <rect x="40" y="270" width="680" height="56" fill="white" rx="8" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="291" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Constraints = Bouncers at the door 🚪</text>
  <text x="380" y="308" text-anchor="middle" font-size="11" fill="#475569">Every INSERT or UPDATE is checked against all constraints. Any violation = error, data rejected.</text>
  <text x="380" y="322" text-anchor="middle" font-size="11" fill="#64748b">This is why valid data is guaranteed regardless of which application writes to the database.</text>
</svg>
