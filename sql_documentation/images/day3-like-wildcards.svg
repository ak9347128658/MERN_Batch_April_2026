<svg viewBox="0 0 740 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="310" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">LIKE Wildcards — Pattern Matching Guide</text>

  <!-- Wildcard legend -->
  <rect x="20" y="34" width="700" height="30" fill="#1e40af" rx="6"/>
  <text x="185" y="53" text-anchor="middle" font-size="12" font-weight="bold" fill="white">%  =  any number of characters (including zero)</text>
  <text x="555" y="53" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_  =  exactly ONE character</text>

  <!-- Table header -->
  <rect x="20" y="72" width="700" height="26" fill="#334155" rx="4 4 0 0"/>
  <line x1="200" y1="72" x2="200" y2="300" stroke="#475569" stroke-width="1"/>
  <line x1="380" y1="72" x2="380" y2="300" stroke="#475569" stroke-width="1"/>
  <line x1="510" y1="72" x2="510" y2="300" stroke="#475569" stroke-width="1"/>
  <text x="110" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pattern</text>
  <text x="290" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Meaning</text>
  <text x="445" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅ Matches</text>
  <text x="625" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="white">❌ Doesn't Match</text>

  <!-- Row 1 -->
  <rect x="20" y="98" width="700" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="110" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">'R%'</text>
  <text x="290" y="115" text-anchor="middle" font-size="11" fill="#1e293b">Starts with R</text>
  <text x="445" y="115" text-anchor="middle" font-size="11" fill="#16a34a">Rahul,  Ravi,  R</text>
  <text x="625" y="115" text-anchor="middle" font-size="11" fill="#dc2626">Priya,  Arjun</text>

  <!-- Row 2 -->
  <rect x="20" y="124" width="700" height="26" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="141" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">'%ar'</text>
  <text x="290" y="141" text-anchor="middle" font-size="11" fill="#1e293b">Ends with ar</text>
  <text x="445" y="141" text-anchor="middle" font-size="11" fill="#16a34a">Kumar,  Iyer,  ar</text>
  <text x="625" y="141" text-anchor="middle" font-size="11" fill="#dc2626">Sharma,  Arjun</text>

  <!-- Row 3 -->
  <rect x="20" y="150" width="700" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="110" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">'%Kumar%'</text>
  <text x="290" y="167" text-anchor="middle" font-size="11" fill="#1e293b">Contains Kumar</text>
  <text x="445" y="167" text-anchor="middle" font-size="11" fill="#16a34a">Amit Kumar,  Kumar Ji</text>
  <text x="625" y="167" text-anchor="middle" font-size="11" fill="#dc2626">Rahul Sharma</text>

  <!-- Row 4 -->
  <rect x="20" y="176" width="700" height="26" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">'_mit'</text>
  <text x="290" y="193" text-anchor="middle" font-size="11" fill="#1e293b">1 char then "mit"</text>
  <text x="445" y="193" text-anchor="middle" font-size="11" fill="#16a34a">Amit</text>
  <text x="625" y="193" text-anchor="middle" font-size="11" fill="#dc2626">Sumit,  mit  (0 chars)</text>

  <!-- Row 5 -->
  <rect x="20" y="202" width="700" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="110" y="219" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">'%@company.com'</text>
  <text x="290" y="219" text-anchor="middle" font-size="11" fill="#1e293b">Ends with domain</text>
  <text x="445" y="219" text-anchor="middle" font-size="11" fill="#16a34a">rahul@company.com</text>
  <text x="625" y="219" text-anchor="middle" font-size="11" fill="#dc2626">rahul@gmail.com</text>

  <!-- Row 6 -->
  <rect x="20" y="228" width="700" height="26" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">'R___'</text>
  <text x="290" y="245" text-anchor="middle" font-size="11" fill="#1e293b">R + exactly 3 chars</text>
  <text x="445" y="245" text-anchor="middle" font-size="11" fill="#16a34a">Ravi,  Rani</text>
  <text x="625" y="245" text-anchor="middle" font-size="11" fill="#dc2626">Rahul  (too long),  R  (too short)</text>

  <!-- Performance warning -->
  <rect x="20" y="262" width="700" height="42" fill="#fef3c7" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="370" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">⚡ Performance: Pattern starts with % = SLOW (full scan) | Pattern starts with letter = FAST (can use index)</text>
  <text x="370" y="294" text-anchor="middle" font-size="11" fill="#b45309">'R%' is fast  ✅  |  '%Kumar%' is slow ❌  |  Use ILIKE for case-insensitive search in PostgreSQL</text>
</svg>
