<svg viewBox="0 0 740 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="220" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">NULL — The Absence of a Value (Not Zero, Not Empty String)</text>

  <!-- Has value box -->
  <rect x="30" y="42" width="200" height="120" fill="white" rx="10" stroke="#16a34a" stroke-width="2"/>
  <rect x="30" y="42" width="200" height="36" fill="#16a34a" rx="10 10 0 0"/>
  <text x="130" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅  Has a Value</text>
  <text x="130" y="100" text-anchor="middle" font-size="36" fill="#1e293b">📦</text>
  <text x="130" y="130" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="bold">'Mumbai'  or  95</text>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#475569">A box with contents</text>

  <!-- NULL box -->
  <rect x="270" y="42" width="200" height="120" fill="white" rx="10" stroke="#dc2626" stroke-width="2"/>
  <rect x="270" y="42" width="200" height="36" fill="#dc2626" rx="10 10 0 0"/>
  <text x="370" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌  NULL — No Value</text>
  <text x="370" y="100" text-anchor="middle" font-size="36" fill="#94a3b8">📭</text>
  <text x="370" y="130" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">NULL  (missing / unknown)</text>
  <text x="370" y="148" text-anchor="middle" font-size="11" fill="#475569">An empty box — unknown</text>

  <!-- Rules box -->
  <rect x="510" y="42" width="210" height="120" fill="white" rx="10" stroke="#7c3aed" stroke-width="2"/>
  <rect x="510" y="42" width="210" height="36" fill="#7c3aed" rx="10 10 0 0"/>
  <text x="615" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚠️  NULL Rules</text>
  <text x="526" y="91" font-size="11" fill="#dc2626">✗   WHERE marks = NULL</text>
  <text x="526" y="109" font-size="11" fill="#dc2626">✗   WHERE marks != NULL</text>
  <line x1="518" y1="116" x2="712" y2="116" stroke="#e2e8f0" stroke-width="1"/>
  <text x="526" y="131" font-size="11" fill="#16a34a">✓   WHERE marks IS NULL</text>
  <text x="526" y="148" font-size="11" fill="#16a34a">✓   WHERE marks IS NOT NULL</text>

  <!-- Note at bottom -->
  <rect x="30" y="174" width="690" height="34" fill="#fef3c7" rx="6" stroke="#fbbf24" stroke-width="1"/>
  <text x="375" y="189" text-anchor="middle" font-size="11" fill="#92400e">💡  NULL is not 0 (zero) and not '' (empty string). It means the value is <tspan font-weight="bold">unknown or not provided.</tspan></text>
  <text x="375" y="203" text-anchor="middle" font-size="11" fill="#92400e">NULL compared to anything using = always returns UNKNOWN (neither true nor false) — that's why IS NULL exists.</text>
</svg>
