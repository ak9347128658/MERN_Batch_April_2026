<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="320" fill="#f0f4ff" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">GROUP BY: Sorting Rows into Buckets</text>

  <!-- Input table -->
  <rect x="20" y="45" width="175" height="34" fill="#1e40af" rx="4 4 0 0"/>
  <text x="107" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="white">sales</text>

  <rect x="20" y="79" width="175" height="28" fill="#3b82f6"/>
  <line x1="107" y1="79" x2="107" y2="235" stroke="#1d4ed8" stroke-width="1"/>
  <text x="63" y="98" text-anchor="middle" font-size="12" fill="white" font-weight="bold">category</text>
  <text x="151" y="98" text-anchor="middle" font-size="12" fill="white" font-weight="bold">revenue</text>

  <!-- rows -->
  <rect x="20" y="107" width="175" height="25" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="63" y="124" text-anchor="middle" font-size="12" fill="#1e293b">Electronics</text>
  <text x="151" y="124" text-anchor="middle" font-size="12" fill="#1e293b">55,000</text>

  <rect x="20" y="132" width="175" height="25" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
  <text x="63" y="149" text-anchor="middle" font-size="12" fill="#1e293b">Clothing</text>
  <text x="151" y="149" text-anchor="middle" font-size="12" fill="#1e293b">1,200</text>

  <rect x="20" y="157" width="175" height="25" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="63" y="174" text-anchor="middle" font-size="12" fill="#1e293b">Electronics</text>
  <text x="151" y="174" text-anchor="middle" font-size="12" fill="#1e293b">25,000</text>

  <rect x="20" y="182" width="175" height="25" fill="#fef3c7" stroke="#fde68a" stroke-width="0.5"/>
  <text x="63" y="199" text-anchor="middle" font-size="12" fill="#1e293b">Footwear</text>
  <text x="151" y="199" text-anchor="middle" font-size="12" fill="#1e293b">3,500</text>

  <rect x="20" y="207" width="175" height="25" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
  <text x="63" y="224" text-anchor="middle" font-size="12" fill="#1e293b">Clothing</text>
  <text x="151" y="224" text-anchor="middle" font-size="12" fill="#1e293b">2,200</text>

  <!-- Arrow -->
  <text x="225" y="147" text-anchor="middle" font-size="28" fill="#1e40af">⟹</text>
  <text x="225" y="165" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">GROUP BY</text>
  <text x="225" y="178" text-anchor="middle" font-size="11" fill="#64748b">category</text>

  <!-- Electronics bucket -->
  <rect x="270" y="45" width="145" height="108" fill="white" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <rect x="270" y="45" width="145" height="28" fill="#3b82f6" rx="8 8 0 0"/>
  <text x="342" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔌 Electronics</text>
  <text x="342" y="97" text-anchor="middle" font-size="11" fill="#475569">55,000</text>
  <text x="342" y="115" text-anchor="middle" font-size="11" fill="#475569">25,000</text>
  <text x="342" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">SUM = 80,000</text>

  <!-- Clothing bucket -->
  <rect x="430" y="45" width="145" height="108" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="430" y="45" width="145" height="28" fill="#16a34a" rx="8 8 0 0"/>
  <text x="502" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👕 Clothing</text>
  <text x="502" y="97" text-anchor="middle" font-size="11" fill="#475569">1,200</text>
  <text x="502" y="115" text-anchor="middle" font-size="11" fill="#475569">2,200</text>
  <text x="502" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">SUM = 3,400</text>

  <!-- Footwear bucket -->
  <rect x="590" y="45" width="145" height="108" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <rect x="590" y="45" width="145" height="28" fill="#d97706" rx="8 8 0 0"/>
  <text x="662" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👟 Footwear</text>
  <text x="662" y="97" text-anchor="middle" font-size="11" fill="#475569">3,500</text>
  <text x="662" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">SUM = 3,500</text>

  <!-- Result table -->
  <text x="502" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">↓  Result (one row per group)</text>
  <rect x="270" y="185" width="465" height="28" fill="#1e40af" rx="4 4 0 0"/>
  <text x="380" y="204" text-anchor="middle" font-size="12" fill="white" font-weight="bold">category</text>
  <text x="560" y="204" text-anchor="middle" font-size="12" fill="white" font-weight="bold">SUM(revenue)</text>
  <rect x="270" y="213" width="465" height="24" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="380" y="230" text-anchor="middle" font-size="12" fill="#1e293b">Electronics</text>
  <text x="560" y="230" text-anchor="middle" font-size="12" fill="#1e293b">80,000</text>
  <rect x="270" y="237" width="465" height="24" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
  <text x="380" y="254" text-anchor="middle" font-size="12" fill="#1e293b">Clothing</text>
  <text x="560" y="254" text-anchor="middle" font-size="12" fill="#1e293b">3,400</text>
  <rect x="270" y="261" width="465" height="24" fill="#fef3c7" stroke="#fde68a" stroke-width="0.5"/>
  <text x="380" y="278" text-anchor="middle" font-size="12" fill="#1e293b">Footwear</text>
  <text x="560" y="278" text-anchor="middle" font-size="12" fill="#1e293b">3,500</text>

  <text x="380" y="308" text-anchor="middle" font-size="11" fill="#64748b">GROUP BY creates one result row per unique value. Aggregate functions run independently on each group.</text>
</svg>
