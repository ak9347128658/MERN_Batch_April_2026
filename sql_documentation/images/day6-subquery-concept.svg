<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="260" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">How Subqueries Work — Inner Query Runs First</text>

  <!-- Step 1: Inner query -->
  <rect x="20" y="36" width="340" height="100" fill="white" rx="8" stroke="#7c3aed" stroke-width="2"/>
  <rect x="20" y="36" width="340" height="26" fill="#7c3aed" rx="8 8 0 0"/>
  <text x="190" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">① Inner Query (Subquery) runs FIRST</text>

  <rect x="35" y="70" width="310" height="56" fill="#f5f3ff" rx="4"/>
  <text x="45" y="88" font-size="11" font-weight="bold" fill="#7c3aed">SELECT AVG(salary)</text>
  <text x="45" y="103" font-size="11" fill="#475569">FROM employees;</text>
  <text x="280" y="96" font-size="16" font-weight="bold" fill="#16a34a">→ 65,000</text>

  <!-- Arrow down -->
  <polygon points="190,140 184,154 196,154" fill="#94a3b8"/>
  <line x1="190" y1="136" x2="190" y2="154" stroke="#94a3b8" stroke-width="2"/>
  <text x="210" y="150" font-size="10" fill="#64748b">result stored</text>

  <!-- Step 2: Result replaces subquery -->
  <rect x="20" y="158" width="340" height="86" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="20" y="158" width="340" height="26" fill="#16a34a" rx="8 8 0 0"/>
  <text x="190" y="176" text-anchor="middle" font-size="12" font-weight="bold" fill="white">② Result replaces the subquery placeholder</text>

  <rect x="35" y="192" width="310" height="44" fill="#f0fdf4" rx="4"/>
  <text x="45" y="210" font-size="11" fill="#475569">SELECT name FROM employees</text>
  <text x="45" y="225" font-size="11" fill="#475569">WHERE salary &gt;</text>
  <rect x="192" y="215" width="62" height="18" fill="#16a34a" rx="3"/>
  <text x="223" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="white">65,000</text>
  <text x="260" y="226" font-size="10" fill="#64748b">← substituted!</text>

  <!-- Right side: outer query visual -->
  <rect x="390" y="36" width="330" height="208" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <rect x="390" y="36" width="330" height="26" fill="#2563eb" rx="8 8 0 0"/>
  <text x="555" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">What You Write (outer query)</text>

  <rect x="405" y="70" width="300" height="90" fill="#f0f4ff" rx="6"/>
  <text x="415" y="88" font-size="11" font-weight="bold" fill="#2563eb">SELECT</text>
  <text x="455" y="88" font-size="11" fill="#475569">name, salary</text>
  <text x="415" y="103" font-size="11" font-weight="bold" fill="#2563eb">FROM</text>
  <text x="455" y="103" font-size="11" fill="#475569">employees</text>
  <text x="415" y="118" font-size="11" font-weight="bold" fill="#2563eb">WHERE</text>
  <text x="455" y="118" font-size="11" fill="#475569">salary &gt;</text>
  <!-- Nested box highlighting the subquery -->
  <rect x="508" y="107" width="180" height="22" fill="#fef3c7" rx="3" stroke="#d97706" stroke-width="1.5"/>
  <text x="515" y="122" font-size="10" fill="#d97706">(SELECT AVG(salary) FROM employees)</text>
  <text x="555" y="152" text-anchor="middle" font-size="10" fill="#d97706" font-weight="bold">↑ this is the subquery</text>

  <text x="415" y="170" font-size="11" fill="#475569">ORDER BY salary DESC;</text>

  <!-- Final result box -->
  <rect x="405" y="190" width="300" height="44" fill="#dbeafe" rx="6"/>
  <text x="555" y="207" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Result: Rajesh (120k), Priya (95k),</text>
  <text x="555" y="222" text-anchor="middle" font-size="11" fill="#1e40af">Amit (85k), Kavita (82k)... above avg!</text>
</svg>
