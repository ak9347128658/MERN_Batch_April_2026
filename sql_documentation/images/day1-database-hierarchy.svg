<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="320" fill="#f0f4ff" rx="12"/>
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Database Structure Hierarchy</text>

  <!-- Database Server -->
  <rect x="280" y="48" width="160" height="46" fill="#1e40af" rx="8"/>
  <text x="360" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🖥  Database Server</text>
  <text x="360" y="84" text-anchor="middle" font-size="11" fill="#bfdbfe">(PostgreSQL)</text>

  <!-- Arrow down -->
  <line x1="360" y1="94" x2="360" y2="116" stroke="#64748b" stroke-width="2"/>
  <polygon points="354,112 360,122 366,112" fill="#64748b"/>

  <!-- Database -->
  <rect x="265" y="122" width="190" height="40" fill="#2563eb" rx="8"/>
  <text x="360" y="141" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🗄  Database</text>
  <text x="360" y="155" text-anchor="middle" font-size="11" fill="#bfdbfe">e.g. school_db</text>

  <!-- Arrow down -->
  <line x1="360" y1="162" x2="360" y2="184" stroke="#64748b" stroke-width="2"/>
  <polygon points="354,180 360,190 366,180" fill="#64748b"/>

  <!-- Tables row -->
  <rect x="110" y="190" width="150" height="40" fill="#0369a1" rx="8"/>
  <text x="185" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📋 students</text>
  <text x="185" y="224" text-anchor="middle" font-size="11" fill="#bae6fd">Table</text>

  <rect x="285" y="190" width="150" height="40" fill="#0369a1" rx="8"/>
  <text x="360" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📋 teachers</text>
  <text x="360" y="224" text-anchor="middle" font-size="11" fill="#bae6fd">Table</text>

  <rect x="460" y="190" width="150" height="40" fill="#0369a1" rx="8"/>
  <text x="535" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📋 courses</text>
  <text x="535" y="224" text-anchor="middle" font-size="11" fill="#bae6fd">Table</text>

  <!-- Connector lines from database to tables -->
  <line x1="360" y1="190" x2="185" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="360" y1="190" x2="360" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="360" y1="190" x2="535" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="360" y1="184" x2="360" y2="190" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Arrows down to Rows/Columns -->
  <line x1="185" y1="230" x2="185" y2="252" stroke="#64748b" stroke-width="2"/>
  <polygon points="179,248 185,258 191,248" fill="#64748b"/>

  <!-- Rows / Columns box under students -->
  <rect x="100" y="258" width="170" height="42" fill="#15803d" rx="8"/>
  <text x="185" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Rows (Records)</text>
  <text x="185" y="291" text-anchor="middle" font-size="11" fill="#bbf7d0">+ Columns (Fields)</text>

  <!-- Legend note -->
  <text x="360" y="312" text-anchor="middle" font-size="11" fill="#64748b">One server can hold many databases. Each database has many tables. Each table has rows and columns.</text>
</svg>
