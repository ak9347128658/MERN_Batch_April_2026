<svg viewBox="0 0 720 390" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="390" fill="#f0f4ff" rx="12"/>
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Database Table Anatomy</text>

  <!-- Table name banner -->
  <rect x="160" y="55" width="400" height="34" fill="#1e40af" rx="6 6 0 0"/>
  <text x="360" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📋  students</text>

  <!-- Column headers -->
  <rect x="160" y="89" width="400" height="36" fill="#3b82f6"/>
  <line x1="260" y1="89" x2="260" y2="278" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="360" y1="89" x2="360" y2="278" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="460" y1="89" x2="460" y2="278" stroke="#1d4ed8" stroke-width="1"/>
  <text x="210" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">id</text>
  <text x="310" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">name</text>
  <text x="410" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">age</text>
  <text x="510" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">city</text>

  <!-- Row 1 (highlighted) -->
  <rect x="160" y="125" width="400" height="38" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="210" y="149" text-anchor="middle" font-size="13" fill="#1e293b">1</text>
  <text x="310" y="149" text-anchor="middle" font-size="13" fill="#1e293b">Rahul</text>
  <text x="410" y="149" text-anchor="middle" font-size="13" fill="#1e293b">20</text>
  <text x="510" y="149" text-anchor="middle" font-size="13" fill="#1e293b">Mumbai</text>

  <!-- Row 2 -->
  <rect x="160" y="163" width="400" height="38" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="210" y="187" text-anchor="middle" font-size="13" fill="#1e293b">2</text>
  <text x="310" y="187" text-anchor="middle" font-size="13" fill="#1e293b">Priya</text>
  <text x="410" y="187" text-anchor="middle" font-size="13" fill="#1e293b">22</text>
  <text x="510" y="187" text-anchor="middle" font-size="13" fill="#1e293b">Delhi</text>

  <!-- Row 3 -->
  <rect x="160" y="201" width="400" height="38" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="210" y="225" text-anchor="middle" font-size="13" fill="#1e293b">3</text>
  <text x="310" y="225" text-anchor="middle" font-size="13" fill="#1e293b">Amit</text>
  <text x="410" y="225" text-anchor="middle" font-size="13" fill="#1e293b">21</text>
  <text x="510" y="225" text-anchor="middle" font-size="13" fill="#1e293b">Pune</text>

  <!-- Row 4 -->
  <rect x="160" y="239" width="400" height="38" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="210" y="263" text-anchor="middle" font-size="13" fill="#1e293b">4</text>
  <text x="310" y="263" text-anchor="middle" font-size="13" fill="#1e293b">Sneha</text>
  <text x="410" y="263" text-anchor="middle" font-size="13" fill="#1e293b">20</text>
  <text x="510" y="263" text-anchor="middle" font-size="13" fill="#1e293b">Mumbai</text>

  <!-- Bottom border -->
  <rect x="160" y="277" width="400" height="3" fill="#1e40af" rx="0 0 4 4"/>

  <!-- Label: Table Name -->
  <line x1="160" y1="72" x2="90" y2="72" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="160" cy="72" r="3" fill="#dc2626"/>
  <text x="85" y="68" text-anchor="end" font-size="12" fill="#dc2626" font-weight="bold">Table</text>
  <text x="85" y="82" text-anchor="end" font-size="12" fill="#dc2626">Name</text>

  <!-- Label: Column -->
  <line x1="310" y1="89" x2="310" y2="52" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="310" cy="89" r="3" fill="#7c3aed"/>
  <text x="310" y="47" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="bold">Column (Field)</text>

  <!-- Label: Row -->
  <line x1="560" y1="144" x2="620" y2="144" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="560" cy="144" r="3" fill="#16a34a"/>
  <text x="625" y="140" font-size="12" fill="#16a34a" font-weight="bold">Row</text>
  <text x="625" y="154" font-size="12" fill="#16a34a">(Record)</text>

  <!-- Highlighted cell -->
  <rect x="260" y="163" width="100" height="38" fill="none" stroke="#d97706" stroke-width="2.5" rx="2"/>
  <line x1="310" y1="201" x2="310" y2="330" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="310" cy="201" r="3" fill="#d97706"/>
  <text x="310" y="346" text-anchor="middle" font-size="12" fill="#d97706" font-weight="bold">Cell (Single Value)</text>

  <text x="360" y="378" text-anchor="middle" font-size="11" fill="#64748b">A table stores data about one entity. Rows = records, Columns = attributes, Cells = individual values.</text>
</svg>
