<svg viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="300" fill="#f0f4ff" rx="12"/>
  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Why Not Just Use a Spreadsheet?</text>

  <!-- VS divider -->
  <rect x="345" y="42" width="50" height="230" fill="none"/>
  <line x1="370" y1="42" x2="370" y2="272" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="348" y="140" width="44" height="26" fill="#1e293b" rx="13"/>
  <text x="370" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="white">VS</text>

  <!-- Spreadsheet side (left) -->
  <rect x="20" y="42" width="320" height="38" fill="#f59e0b" rx="8 8 0 0"/>
  <text x="180" y="57" text-anchor="middle" font-size="16" fill="white">📊</text>
  <text x="180" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Spreadsheet (Excel / Google Sheets)</text>
  <rect x="20" y="80" width="320" height="192" fill="white" rx="0 0 8 8" stroke="#fbbf24" stroke-width="2"/>

  <rect x="30" y="90" width="300" height="28" fill="#fef3c7" rx="5"/>
  <text x="50" y="109" font-size="11" fill="#92400e">📏  Max rows:</text>
  <text x="220" y="109" font-size="11" font-weight="bold" fill="#dc2626">~1 million rows</text>

  <rect x="30" y="124" width="300" height="28" fill="#fff7ed" rx="5"/>
  <text x="50" y="143" font-size="11" fill="#92400e">👥  Multi-user:</text>
  <text x="220" y="143" font-size="11" font-weight="bold" fill="#dc2626">Conflicts &amp; overwrites</text>

  <rect x="30" y="158" width="300" height="28" fill="#fef3c7" rx="5"/>
  <text x="50" y="177" font-size="11" fill="#92400e">🛡  Data rules:</text>
  <text x="220" y="177" font-size="11" font-weight="bold" fill="#dc2626">Manual, error-prone</text>

  <rect x="30" y="192" width="300" height="28" fill="#fff7ed" rx="5"/>
  <text x="50" y="211" font-size="11" fill="#92400e">⚡  Speed:</text>
  <text x="220" y="211" font-size="11" font-weight="bold" fill="#dc2626">Slows at large data</text>

  <rect x="30" y="226" width="300" height="28" fill="#fef3c7" rx="5"/>
  <text x="50" y="245" font-size="11" fill="#92400e">🔌  Connect to apps:</text>
  <text x="220" y="245" font-size="11" font-weight="bold" fill="#dc2626">Difficult / limited</text>

  <!-- Database side (right) -->
  <rect x="400" y="42" width="320" height="38" fill="#16a34a" rx="8 8 0 0"/>
  <text x="560" y="57" text-anchor="middle" font-size="16" fill="white">🗄️</text>
  <text x="560" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Database (PostgreSQL)</text>
  <rect x="400" y="80" width="320" height="192" fill="white" rx="0 0 8 8" stroke="#4ade80" stroke-width="2"/>

  <rect x="410" y="90" width="300" height="28" fill="#dcfce7" rx="5"/>
  <text x="430" y="109" font-size="11" fill="#14532d">📏  Max rows:</text>
  <text x="590" y="109" font-size="11" font-weight="bold" fill="#16a34a">Billions+ (no limit)</text>

  <rect x="410" y="124" width="300" height="28" fill="#f0fdf4" rx="5"/>
  <text x="430" y="143" font-size="11" fill="#14532d">👥  Multi-user:</text>
  <text x="590" y="143" font-size="11" font-weight="bold" fill="#16a34a">100s of concurrent users</text>

  <rect x="410" y="158" width="300" height="28" fill="#dcfce7" rx="5"/>
  <text x="430" y="177" font-size="11" fill="#14532d">🛡  Data rules:</text>
  <text x="590" y="177" font-size="11" font-weight="bold" fill="#16a34a">Enforced automatically</text>

  <rect x="410" y="192" width="300" height="28" fill="#f0fdf4" rx="5"/>
  <text x="430" y="211" font-size="11" fill="#14532d">⚡  Speed:</text>
  <text x="590" y="211" font-size="11" font-weight="bold" fill="#16a34a">Optimised for huge data</text>

  <rect x="410" y="226" width="300" height="28" fill="#dcfce7" rx="5"/>
  <text x="430" y="245" font-size="11" fill="#14532d">🔌  Connect to apps:</text>
  <text x="590" y="245" font-size="11" font-weight="bold" fill="#16a34a">Built for it — APIs, ORMs</text>

  <text x="370" y="286" text-anchor="middle" font-size="11" fill="#64748b">Use a spreadsheet for personal data (budget, notes). Use a database the moment you need scale, speed, or multiple users.</text>
</svg>
