<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="260" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">MIN() and MAX() — Finding Extremes Across Any Data Type</text>

  <!-- Source column -->
  <text x="110" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">price column</text>
  <rect x="40" y="54" width="140" height="28" fill="#1e40af" rx="4"/>
  <text x="110" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="white">price</text>

  <!-- price values with MIN/MAX highlighted -->
  <rect x="40" y="82" width="140" height="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="90" y="98" text-anchor="middle" font-size="12" fill="#1e293b">₹800</text>
  <text x="160" y="98" font-size="10" fill="#16a34a" font-weight="bold">← MIN</text>

  <rect x="40" y="106" width="140" height="24" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="122" text-anchor="middle" font-size="12" fill="#1e293b">₹1,500</text>

  <rect x="40" y="130" width="140" height="24" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="146" text-anchor="middle" font-size="12" fill="#1e293b">₹3,500</text>

  <rect x="40" y="154" width="140" height="24" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="110" y="170" text-anchor="middle" font-size="12" fill="#1e293b">₹25,000</text>

  <rect x="40" y="178" width="140" height="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="90" y="194" text-anchor="middle" font-size="12" fill="#1e293b">₹55,000</text>
  <text x="160" y="194" font-size="10" fill="#dc2626" font-weight="bold">← MAX</text>

  <!-- Results panel -->
  <rect x="220" y="54" width="210" height="148" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="220" y="54" width="210" height="28" fill="#16a34a" rx="8 8 0 0"/>
  <text x="325" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MIN(price)</text>

  <text x="325" y="104" text-anchor="middle" font-size="11" fill="#475569">Scans all values</text>
  <text x="325" y="120" text-anchor="middle" font-size="11" fill="#475569">Tracks the smallest seen so far</text>
  <text x="325" y="136" text-anchor="middle" font-size="11" fill="#475569">Returns value at the "floor"</text>
  <text x="325" y="152" text-anchor="middle" font-size="11" fill="#475569">Works on numbers, dates, strings</text>
  <rect x="236" y="164" width="178" height="28" fill="#15803d" rx="4"/>
  <text x="325" y="183" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Result: ₹800</text>

  <rect x="455" y="54" width="210" height="148" fill="white" rx="8" stroke="#dc2626" stroke-width="2"/>
  <rect x="455" y="54" width="210" height="28" fill="#dc2626" rx="8 8 0 0"/>
  <text x="560" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MAX(price)</text>

  <text x="560" y="104" text-anchor="middle" font-size="11" fill="#475569">Scans all values</text>
  <text x="560" y="120" text-anchor="middle" font-size="11" fill="#475569">Tracks the largest seen so far</text>
  <text x="560" y="136" text-anchor="middle" font-size="11" fill="#475569">Returns value at the "ceiling"</text>
  <text x="560" y="152" text-anchor="middle" font-size="11" fill="#475569">If index exists → instant lookup!</text>
  <rect x="471" y="164" width="178" height="28" fill="#b91c1c" rx="4"/>
  <text x="560" y="183" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Result: ₹55,000</text>

  <!-- Bottom: also works on dates and strings -->
  <rect x="40" y="216" width="660" height="36" fill="#fef3c7" rx="6" stroke="#fbbf24" stroke-width="1"/>
  <text x="370" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">MIN/MAX work on more than just numbers:</text>
  <text x="370" y="246" text-anchor="middle" font-size="11" fill="#92400e">Dates: MIN(sale_date) = earliest date  •  MAX(sale_date) = most recent date  •  Strings: alphabetical order</text>
</svg>
