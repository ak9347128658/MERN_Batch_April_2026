<svg viewBox="0 0 740 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="220" fill="#f0f4ff" rx="12"/>
  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">SQL is a Language — Just for Databases</text>

  <!-- English -->
  <rect x="30" y="42" width="200" height="152" fill="white" rx="10" stroke="#2563eb" stroke-width="2"/>
  <rect x="30" y="42" width="200" height="40" fill="#2563eb" rx="10 10 0 0"/>
  <text x="130" y="58" text-anchor="middle" font-size="20" fill="white">🗣️</text>
  <text x="130" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">English</text>
  <text x="130" y="105" text-anchor="middle" font-size="12" fill="#64748b">Communicate with</text>
  <text x="130" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">People</text>
  <rect x="44" y="140" width="172" height="40" fill="#eff6ff" rx="6"/>
  <text x="130" y="155" text-anchor="middle" font-size="11" fill="#475569">"Show me students</text>
  <text x="130" y="170" text-anchor="middle" font-size="11" fill="#475569">from Mumbai"</text>

  <!-- Arrow 1 -->
  <text x="250" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>

  <!-- Python/JS -->
  <rect x="270" y="42" width="200" height="152" fill="white" rx="10" stroke="#7c3aed" stroke-width="2"/>
  <rect x="270" y="42" width="200" height="40" fill="#7c3aed" rx="10 10 0 0"/>
  <text x="370" y="58" text-anchor="middle" font-size="20" fill="white">💻</text>
  <text x="370" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Python / JavaScript</text>
  <text x="370" y="105" text-anchor="middle" font-size="12" fill="#64748b">Communicate with</text>
  <text x="370" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">Computers</text>
  <rect x="284" y="140" width="172" height="40" fill="#f5f3ff" rx="6"/>
  <text x="370" y="155" text-anchor="middle" font-size="11" fill="#475569">print("Hello")</text>
  <text x="370" y="170" text-anchor="middle" font-size="11" fill="#475569">console.log(42)</text>

  <!-- Arrow 2 -->
  <text x="490" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>

  <!-- SQL -->
  <rect x="510" y="42" width="200" height="152" fill="white" rx="10" stroke="#16a34a" stroke-width="2"/>
  <rect x="510" y="42" width="200" height="40" fill="#16a34a" rx="10 10 0 0"/>
  <text x="610" y="58" text-anchor="middle" font-size="20" fill="white">🐘</text>
  <text x="610" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SQL</text>
  <text x="610" y="105" text-anchor="middle" font-size="12" fill="#64748b">Communicate with</text>
  <text x="610" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">Databases</text>
  <rect x="524" y="140" width="172" height="40" fill="#f0fdf4" rx="6"/>
  <text x="610" y="153" text-anchor="middle" font-size="10" fill="#14532d">SELECT * FROM students</text>
  <text x="610" y="168" text-anchor="middle" font-size="10" fill="#14532d">WHERE city = 'Mumbai';</text>

  <text x="370" y="208" text-anchor="middle" font-size="11" fill="#64748b">SQL is declarative — you say WHAT you want, not HOW to get it. The database figures out the how.</text>
</svg>
