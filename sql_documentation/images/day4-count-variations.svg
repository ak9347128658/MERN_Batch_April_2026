<svg viewBox="0 0 740 290" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="290" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">COUNT Variations — Knowing Which One to Use</text>

  <!-- Shared source data -->
  <text x="370" y="42" text-anchor="middle" font-size="11" fill="#64748b">Source data — email column in employees table (3 have NULL, 3 have values)</text>

  <!-- COUNT(*) -->
  <rect x="20" y="52" width="215" height="200" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <rect x="20" y="52" width="215" height="32" fill="#2563eb" rx="8 8 0 0"/>
  <text x="127" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">COUNT(*)</text>
  <text x="127" y="100" text-anchor="middle" font-size="11" fill="#475569">Counts EVERY row</text>
  <text x="127" y="114" text-anchor="middle" font-size="11" fill="#475569">including NULLs</text>

  <rect x="40" y="124" width="175" height="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5" rx="3"/>
  <text x="127" y="139" text-anchor="middle" font-size="11" fill="#1e293b">rahul@company.com  ✓</text>
  <rect x="40" y="148" width="175" height="22" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5" rx="3"/>
  <text x="127" y="163" text-anchor="middle" font-size="11" fill="#dc2626">NULL  ✓  (still counted!)</text>
  <rect x="40" y="172" width="175" height="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5" rx="3"/>
  <text x="127" y="187" text-anchor="middle" font-size="11" fill="#1e293b">priya@company.com  ✓</text>
  <rect x="40" y="196" width="175" height="22" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5" rx="3"/>
  <text x="127" y="211" text-anchor="middle" font-size="11" fill="#dc2626">NULL  ✓  (still counted!)</text>
  <rect x="40" y="220" width="175" height="24" fill="#1d4ed8" rx="4"/>
  <text x="127" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Result: 4</text>

  <!-- COUNT(column) -->
  <rect x="263" y="52" width="215" height="200" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="263" y="52" width="215" height="32" fill="#16a34a" rx="8 8 0 0"/>
  <text x="370" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">COUNT(email)</text>
  <text x="370" y="100" text-anchor="middle" font-size="11" fill="#475569">Counts only</text>
  <text x="370" y="114" text-anchor="middle" font-size="11" fill="#475569">non-NULL values</text>

  <rect x="283" y="124" width="175" height="22" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" rx="3"/>
  <text x="370" y="139" text-anchor="middle" font-size="11" fill="#1e293b">rahul@company.com  ✓</text>
  <rect x="283" y="148" width="175" height="22" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5" rx="3"/>
  <text x="370" y="163" text-anchor="middle" font-size="11" fill="#94a3b8">NULL  ✗  (skipped!)</text>
  <rect x="283" y="172" width="175" height="22" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" rx="3"/>
  <text x="370" y="187" text-anchor="middle" font-size="11" fill="#1e293b">priya@company.com  ✓</text>
  <rect x="283" y="196" width="175" height="22" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5" rx="3"/>
  <text x="370" y="211" text-anchor="middle" font-size="11" fill="#94a3b8">NULL  ✗  (skipped!)</text>
  <rect x="283" y="220" width="175" height="24" fill="#15803d" rx="4"/>
  <text x="370" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Result: 2</text>

  <!-- COUNT(DISTINCT column) -->
  <rect x="506" y="52" width="214" height="200" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <rect x="506" y="52" width="214" height="32" fill="#d97706" rx="8 8 0 0"/>
  <text x="613" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="white">COUNT(DISTINCT category)</text>
  <text x="613" y="78" text-anchor="middle" font-size="10" fill="#fde68a">from sales table</text>
  <text x="613" y="100" text-anchor="middle" font-size="11" fill="#475569">Counts unique</text>
  <text x="613" y="114" text-anchor="middle" font-size="11" fill="#475569">non-NULL values only</text>

  <rect x="526" y="124" width="174" height="22" fill="#fef3c7" stroke="#fde047" stroke-width="0.5" rx="3"/>
  <text x="613" y="139" text-anchor="middle" font-size="11" fill="#1e293b">Electronics  ✓  (first seen)</text>
  <rect x="526" y="148" width="174" height="22" fill="#fef3c7" stroke="#fde047" stroke-width="0.5" rx="3"/>
  <text x="613" y="163" text-anchor="middle" font-size="11" fill="#d97706">Electronics  ✗  (duplicate!)</text>
  <rect x="526" y="172" width="174" height="22" fill="#fef3c7" stroke="#fde047" stroke-width="0.5" rx="3"/>
  <text x="613" y="187" text-anchor="middle" font-size="11" fill="#1e293b">Clothing  ✓  (new unique)</text>
  <rect x="526" y="196" width="174" height="22" fill="#fef3c7" stroke="#fde047" stroke-width="0.5" rx="3"/>
  <text x="613" y="211" text-anchor="middle" font-size="11" fill="#1e293b">Footwear  ✓  (new unique)</text>
  <rect x="526" y="220" width="174" height="24" fill="#b45309" rx="4"/>
  <text x="613" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Result: 4 unique</text>

  <!-- Bottom summary -->
  <rect x="20" y="264" width="700" height="20" fill="#1e40af" rx="6"/>
  <text x="370" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="white">COUNT(*) = all rows  |  COUNT(col) = non-NULL only  |  COUNT(DISTINCT col) = unique non-NULL values</text>
</svg>
