<svg viewBox="0 0 740 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="240" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">LEFT JOIN + WHERE IS NULL — Finding Unmatched Rows</text>
  <text x="370" y="40" text-anchor="middle" font-size="11" fill="#64748b">The classic pattern for "find customers with no orders" / "find products never sold"</text>

  <!-- Step 1: LEFT JOIN result -->
  <rect x="20" y="50" width="280" height="140" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <rect x="20" y="50" width="280" height="26" fill="#2563eb" rx="8 8 0 0"/>
  <text x="160" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Step 1: LEFT JOIN gives all customers</text>

  <text x="40" y="92" font-size="10" font-weight="bold" fill="#475569">customer</text>
  <text x="180" y="92" font-size="10" font-weight="bold" fill="#475569">order_id (from right table)</text>
  <line x1="20" y1="96" x2="300" y2="96" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="20" y="97" width="280" height="18" fill="#dbeafe"/>
  <text x="40" y="110" font-size="10" fill="#1e293b">Rahul</text><text x="200" y="110" font-size="10" fill="#1e293b">1</text>
  <text x="40" y="124" font-size="10" fill="#1e293b">Rahul</text><text x="200" y="124" font-size="10" fill="#1e293b">2</text>
  <rect x="20" y="126" width="280" height="18" fill="#dbeafe"/>
  <text x="40" y="139" font-size="10" fill="#1e293b">Priya</text><text x="200" y="139" font-size="10" fill="#1e293b">3</text>
  <text x="40" y="153" font-size="10" fill="#1e293b">Amit</text><text x="200" y="153" font-size="10" fill="#1e293b">4</text>
  <rect x="20" y="155" width="280" height="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="40" y="168" font-size="10" font-weight="bold" fill="#dc2626">Sneha</text><text x="200" y="168" font-size="10" font-weight="bold" fill="#dc2626">NULL ← no order</text>
  <rect x="20" y="173" width="280" height="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="40" y="186" font-size="10" font-weight="bold" fill="#dc2626">Vikram</text><text x="200" y="186" font-size="10" font-weight="bold" fill="#dc2626">NULL ← no order</text>

  <!-- Arrow -->
  <polygon points="318,128 334,122 334,134" fill="#16a34a"/>
  <line x1="300" y1="128" x2="334" y2="128" stroke="#16a34a" stroke-width="2"/>
  <text x="317" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">WHERE</text>
  <text x="317" y="144" text-anchor="middle" font-size="9" fill="#16a34a">o.id IS NULL</text>

  <!-- Step 2: After WHERE IS NULL filter -->
  <rect x="340" y="50" width="200" height="140" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="340" y="50" width="200" height="26" fill="#16a34a" rx="8 8 0 0"/>
  <text x="440" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 2: WHERE IS NULL filters</text>

  <text x="360" y="92" font-size="10" font-weight="bold" fill="#475569">customer</text>
  <text x="470" y="92" font-size="10" font-weight="bold" fill="#475569">order_id</text>
  <line x1="340" y1="96" x2="540" y2="96" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="115" font-size="11" fill="#94a3b8">Rahul — has orders, filtered OUT</text>
  <text x="360" y="133" font-size="11" fill="#94a3b8">Priya — has orders, filtered OUT</text>
  <text x="360" y="151" font-size="11" fill="#94a3b8">Amit — has orders, filtered OUT</text>
  <rect x="340" y="155" width="200" height="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="168" font-size="10" font-weight="bold" fill="#dc2626">Sneha ✓ NULL → KEEP</text>
  <rect x="340" y="173" width="200" height="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="186" font-size="10" font-weight="bold" fill="#dc2626">Vikram ✓ NULL → KEEP</text>

  <!-- Arrow -->
  <polygon points="558,128 574,122 574,134" fill="#d97706"/>
  <line x1="540" y1="128" x2="574" y2="128" stroke="#d97706" stroke-width="2"/>

  <!-- Final result -->
  <rect x="580" y="50" width="145" height="140" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <rect x="580" y="50" width="145" height="26" fill="#d97706" rx="8 8 0 0"/>
  <text x="652" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Final Result</text>
  <text x="652" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Customers with NO orders</text>
  <line x1="580" y1="96" x2="725" y2="96" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="580" y="97" width="145" height="30" fill="#fef3c7"/>
  <text x="595" y="117" font-size="12" font-weight="bold" fill="#1e293b">Sneha Reddy</text>
  <rect x="580" y="127" width="145" height="30" fill="#fef3c7"/>
  <text x="595" y="147" font-size="12" font-weight="bold" fill="#1e293b">Vikram Singh</text>
  <text x="652" y="178" text-anchor="middle" font-size="10" fill="#b45309">2 rows returned</text>
  <text x="652" y="192" text-anchor="middle" font-size="10" fill="#b45309">these are inactive customers</text>

  <!-- Bottom bar -->
  <rect x="20" y="200" width="700" height="32" fill="#1e40af" rx="6"/>
  <text x="370" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pattern: LEFT JOIN + WHERE right_table.id IS NULL = rows in LEFT table with NO match in RIGHT table</text>
  <text x="370" y="230" text-anchor="middle" font-size="11" fill="#bfdbfe">Use case: inactive customers, unsold products, unmatched records, data gap analysis</text>
</svg>
