<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="310" fill="#f0f4ff" rx="12"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Sequential Scan vs Index Scan</text>

  <!-- WITHOUT INDEX side -->
  <rect x="20" y="42" width="340" height="34" fill="#dc2626" rx="6"/>
  <text x="190" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌  Without Index  (Sequential Scan)</text>

  <!-- rows checked -->
  <rect x="20" y="80" width="340" height="26" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="98" text-anchor="middle" font-size="12" fill="#dc2626">Row 1: amit@email.com  ✗</text>
  <rect x="20" y="106" width="340" height="26" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="124" text-anchor="middle" font-size="12" fill="#dc2626">Row 2: priya@email.com  ✗</text>
  <rect x="20" y="132" width="340" height="26" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="150" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">Row 3: rahul@email.com  ✅  FOUND!</text>
  <rect x="20" y="158" width="340" height="26" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="176" text-anchor="middle" font-size="12" fill="#dc2626">Row 4: sneha@email.com  ✗</text>
  <text x="190" y="196" text-anchor="middle" font-size="12" fill="#dc2626">…  continues checking all rows…</text>
  <rect x="20" y="200" width="340" height="26" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="218" text-anchor="middle" font-size="12" fill="#dc2626">Row 100,000: vikram@email.com  ✗</text>

  <rect x="20" y="234" width="340" height="36" fill="#fca5a5" rx="6"/>
  <text x="190" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d">⏱  15,267 ms</text>
  <text x="190" y="265" text-anchor="middle" font-size="11" fill="#7f1d1d">Checked 100,000 rows to find 1</text>

  <!-- WITH INDEX side -->
  <rect x="400" y="42" width="340" height="34" fill="#16a34a" rx="6"/>
  <text x="570" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅  With Index  (Index Scan)</text>

  <!-- B-tree lookup boxes -->
  <rect x="400" y="80" width="340" height="32" fill="#dcfce7" stroke="#86efac" stroke-width="1" rx="4"/>
  <text x="570" y="101" text-anchor="middle" font-size="12" fill="#15803d">① Index root: 'R' ≥ M  →  go right</text>

  <rect x="400" y="118" width="340" height="32" fill="#dcfce7" stroke="#86efac" stroke-width="1" rx="4"/>
  <text x="570" y="139" text-anchor="middle" font-size="12" fill="#15803d">② Internal node: 'Ra' in R–Z range</text>

  <rect x="400" y="156" width="340" height="32" fill="#dcfce7" stroke="#86efac" stroke-width="1" rx="4"/>
  <text x="570" y="177" text-anchor="middle" font-size="12" fill="#15803d">③ Leaf: 'rahul@email.com' → Row #3</text>

  <rect x="400" y="194" width="340" height="32" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5" rx="4"/>
  <text x="570" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">④ Jump directly to Row #3  ✅</text>

  <rect x="400" y="234" width="340" height="36" fill="#4ade80" rx="6"/>
  <text x="570" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">⚡  0.048 ms</text>
  <text x="570" y="265" text-anchor="middle" font-size="11" fill="#14532d">~4 reads instead of 100,000</text>

  <!-- Divider -->
  <line x1="380" y1="42" x2="380" y2="278" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Speed badge -->
  <rect x="280" y="280" width="200" height="24" fill="#1e40af" rx="6"/>
  <text x="380" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="white">318× faster with an index!</text>
</svg>
