<svg viewBox="0 0 740 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="310" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">What Happens Internally When You INSERT a Row</text>

  <!-- Step 1 -->
  <rect x="30" y="38" width="680" height="34" fill="#2563eb" rx="6"/>
  <text x="50" y="51" font-size="13" font-weight="bold" fill="white">① Validate</text>
  <text x="170" y="51" font-size="12" fill="#bfdbfe">Check data types, NOT NULL, UNIQUE constraints, foreign keys</text>
  <text x="680" y="55" text-anchor="end" font-size="11" fill="#93c5fd">→ Error thrown here if invalid</text>

  <!-- Arrow -->
  <line x1="370" y1="72" x2="370" y2="84" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,80 370,90 376,80" fill="#94a3b8"/>

  <!-- Step 2 -->
  <rect x="30" y="90" width="680" height="34" fill="#7c3aed" rx="6"/>
  <text x="50" y="103" font-size="13" font-weight="bold" fill="white">② Assign Defaults</text>
  <text x="200" y="103" font-size="12" fill="#ddd6fe">Columns not provided get their DEFAULT value</text>
  <text x="680" y="107" text-anchor="end" font-size="11" fill="#c4b5fd">e.g. created_at = NOW()</text>

  <line x1="370" y1="124" x2="370" y2="136" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,132 370,142 376,132" fill="#94a3b8"/>

  <!-- Step 3 -->
  <rect x="30" y="142" width="680" height="34" fill="#0369a1" rx="6"/>
  <text x="50" y="155" font-size="13" font-weight="bold" fill="white">③ Generate IDs</text>
  <text x="185" y="155" font-size="12" fill="#bae6fd">SERIAL / IDENTITY columns auto-increment to the next number</text>
  <text x="680" y="159" text-anchor="end" font-size="11" fill="#7dd3fc">e.g. id = 11 (auto)</text>

  <line x1="370" y1="176" x2="370" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,184 370,194 376,184" fill="#94a3b8"/>

  <!-- Step 4 -->
  <rect x="30" y="194" width="680" height="34" fill="#d97706" rx="6"/>
  <text x="50" y="207" font-size="13" font-weight="bold" fill="white">④ Write to WAL</text>
  <text x="195" y="207" font-size="12" fill="#fde68a">Change is logged to Write-Ahead Log first (crash safety)</text>
  <text x="680" y="211" text-anchor="end" font-size="11" fill="#fcd34d">Durability guaranteed here</text>

  <line x1="370" y1="228" x2="370" y2="240" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,236 370,246 376,236" fill="#94a3b8"/>

  <!-- Step 5 -->
  <rect x="30" y="246" width="680" height="34" fill="#16a34a" rx="6"/>
  <text x="50" y="259" font-size="13" font-weight="bold" fill="white">⑤ Write Row to Table</text>
  <text x="225" y="259" font-size="12" fill="#bbf7d0">New row appended to the table's data file on disk</text>
  <text x="680" y="263" text-anchor="end" font-size="11" fill="#86efac">Heap file updated</text>

  <!-- Step 6 (to the right) -->
  <line x1="370" y1="280" x2="370" y2="292" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,288 370,298 376,288" fill="#94a3b8"/>

  <rect x="30" y="295" width="680" height="8" fill="#dc2626" rx="4"/>
  <text x="370" y="306" text-anchor="middle" font-size="10" fill="#dc2626">⑥ Update Indexes — Every index on the table must also be updated (this is why more indexes = slower inserts)</text>
</svg>
