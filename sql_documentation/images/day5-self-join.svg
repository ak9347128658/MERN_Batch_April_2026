<svg viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="280" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Self JOIN — A Table Joined to Itself (Employee-Manager)</text>

  <!-- Single employees table shown twice -->
  <text x="160" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">employees (as "e" — the employee)</text>
  <rect x="30" y="54" width="260" height="168" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <rect x="30" y="54" width="260" height="26" fill="#2563eb" rx="8 8 0 0"/>
  <text x="160" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="white">employees  (alias: e)</text>
  <text x="55" y="96" font-size="10" font-weight="bold" fill="#475569">id</text>
  <text x="90" y="96" font-size="10" font-weight="bold" fill="#475569">name</text>
  <text x="200" y="96" font-size="10" font-weight="bold" fill="#dc2626">manager_id</text>
  <line x1="30" y1="100" x2="290" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="100" width="260" height="20" fill="#dbeafe"/>
  <text x="55" y="114" font-size="10" fill="#1e293b">1</text><text x="90" y="114" font-size="10" fill="#1e293b">Rahul</text><text x="210" y="114" font-size="10" fill="#94a3b8">NULL</text>
  <text x="55" y="130" font-size="10" fill="#1e293b">2</text><text x="90" y="130" font-size="10" fill="#1e293b">Priya</text><text x="210" y="130" font-size="10" fill="#dc2626">1</text>
  <rect x="30" y="132" width="260" height="20" fill="#dbeafe"/>
  <text x="55" y="146" font-size="10" fill="#1e293b">3</text><text x="90" y="146" font-size="10" fill="#1e293b">Amit</text><text x="210" y="146" font-size="10" fill="#dc2626">1</text>
  <text x="55" y="162" font-size="10" fill="#1e293b">4</text><text x="90" y="162" font-size="10" fill="#1e293b">Sneha</text><text x="210" y="162" font-size="10" fill="#dc2626">2</text>
  <rect x="30" y="164" width="260" height="20" fill="#dbeafe"/>
  <text x="55" y="178" font-size="10" fill="#1e293b">5</text><text x="90" y="178" font-size="10" fill="#1e293b">Vikram</text><text x="210" y="178" font-size="10" fill="#dc2626">1</text>
  <text x="55" y="194" font-size="10" fill="#1e293b">7</text><text x="90" y="194" font-size="10" fill="#1e293b">Arjun</text><text x="210" y="194" font-size="10" fill="#dc2626">3</text>

  <!-- Arrow / JOIN label -->
  <text x="320" y="100" font-size="26" fill="#94a3b8">⟵</text>
  <text x="308" y="120" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">LEFT JOIN</text>
  <text x="308" y="134" text-anchor="middle" font-size="9" fill="#475569">ON e.manager_id</text>
  <text x="308" y="148" text-anchor="middle" font-size="9" fill="#475569">= m.id</text>

  <!-- Same table second alias -->
  <text x="525" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">employees (as "m" — the manager)</text>
  <rect x="370" y="54" width="200" height="168" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <rect x="370" y="54" width="200" height="26" fill="#d97706" rx="8 8 0 0"/>
  <text x="470" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="white">employees  (alias: m)</text>
  <text x="390" y="96" font-size="10" font-weight="bold" fill="#475569">id</text>
  <text x="425" y="96" font-size="10" font-weight="bold" fill="#475569">name</text>
  <line x1="370" y1="100" x2="570" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="370" y="100" width="200" height="20" fill="#fef3c7"/>
  <text x="390" y="114" font-size="10" fill="#1e293b">1</text><text x="425" y="114" font-size="10" fill="#1e293b">Rahul ← Manager</text>
  <text x="390" y="130" font-size="10" fill="#1e293b">2</text><text x="425" y="130" font-size="10" fill="#1e293b">Priya ← Manager</text>
  <rect x="370" y="132" width="200" height="20" fill="#fef3c7"/>
  <text x="390" y="146" font-size="10" fill="#1e293b">3</text><text x="425" y="146" font-size="10" fill="#1e293b">Amit ← Manager</text>

  <!-- Result -->
  <rect x="590" y="54" width="140" height="168" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="590" y="54" width="140" height="26" fill="#16a34a" rx="8 8 0 0"/>
  <text x="660" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Result</text>
  <text x="600" y="96" font-size="9" font-weight="bold" fill="#475569">employee</text>
  <text x="670" y="96" font-size="9" font-weight="bold" fill="#475569">manager</text>
  <line x1="590" y1="100" x2="730" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="590" y="100" width="140" height="20" fill="#dcfce7"/>
  <text x="600" y="114" font-size="9" fill="#1e293b">Rahul</text><text x="670" y="114" font-size="9" fill="#94a3b8">No Manager</text>
  <text x="600" y="130" font-size="9" fill="#1e293b">Priya</text><text x="670" y="130" font-size="9" fill="#1e293b">Rahul</text>
  <rect x="590" y="132" width="140" height="20" fill="#dcfce7"/>
  <text x="600" y="146" font-size="9" fill="#1e293b">Amit</text><text x="670" y="146" font-size="9" fill="#1e293b">Rahul</text>
  <text x="600" y="162" font-size="9" fill="#1e293b">Sneha</text><text x="670" y="162" font-size="9" fill="#1e293b">Priya</text>
  <rect x="590" y="164" width="140" height="20" fill="#dcfce7"/>
  <text x="600" y="178" font-size="9" fill="#1e293b">Vikram</text><text x="670" y="178" font-size="9" fill="#1e293b">Rahul</text>
  <text x="600" y="194" font-size="9" fill="#1e293b">Arjun</text><text x="670" y="194" font-size="9" fill="#1e293b">Amit</text>

  <!-- Bottom bar -->
  <rect x="20" y="236" width="700" height="32" fill="#1e293b" rx="6"/>
  <text x="370" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Key: Same physical table, two aliases (e and m) — both point to employees</text>
  <text x="370" y="264" text-anchor="middle" font-size="11" fill="#94a3b8">e.manager_id = m.id links each employee to their manager's row in the SAME table</text>
</svg>
