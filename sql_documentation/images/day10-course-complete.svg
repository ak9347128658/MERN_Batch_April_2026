<svg viewBox="0 0 740 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="220" fill="#f0f4ff" rx="12"/>
  <rect x="0" y="0" width="740" height="220" fill="url(#grad)" rx="12" opacity="0.7"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <text x="370" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">What You Built in 10 Days</text>

  <!-- Day tiles - 5 per row -->
  <!-- Row 1 -->
  <rect x="22" y="46" width="128" height="48" fill="#1e40af" rx="6"/>
  <text x="86" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 1–2</text>
  <text x="86" y="78" text-anchor="middle" font-size="10" fill="#bfdbfe">Tables, SELECT</text>
  <text x="86" y="88" text-anchor="middle" font-size="10" fill="#bfdbfe">CRUD Operations</text>

  <rect x="162" y="46" width="128" height="48" fill="#2563eb" rx="6"/>
  <text x="226" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 3</text>
  <text x="226" y="78" text-anchor="middle" font-size="10" fill="#bfdbfe">WHERE, ORDER BY</text>
  <text x="226" y="88" text-anchor="middle" font-size="10" fill="#bfdbfe">LIMIT, OFFSET</text>

  <rect x="302" y="46" width="128" height="48" fill="#7c3aed" rx="6"/>
  <text x="366" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 4</text>
  <text x="366" y="78" text-anchor="middle" font-size="10" fill="#ddd6fe">COUNT, SUM, AVG</text>
  <text x="366" y="88" text-anchor="middle" font-size="10" fill="#ddd6fe">GROUP BY, HAVING</text>

  <rect x="442" y="46" width="128" height="48" fill="#0369a1" rx="6"/>
  <text x="506" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 5</text>
  <text x="506" y="78" text-anchor="middle" font-size="10" fill="#bae6fd">INNER, LEFT, RIGHT</text>
  <text x="506" y="88" text-anchor="middle" font-size="10" fill="#bae6fd">FULL, CROSS JOINs</text>

  <rect x="582" y="46" width="136" height="48" fill="#0e7490" rx="6"/>
  <text x="650" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 6</text>
  <text x="650" y="78" text-anchor="middle" font-size="10" fill="#a5f3fc">Subqueries</text>
  <text x="650" y="88" text-anchor="middle" font-size="10" fill="#a5f3fc">EXISTS, CTEs</text>

  <!-- Row 2 -->
  <rect x="22" y="106" width="128" height="48" fill="#dc2626" rx="6"/>
  <text x="86" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 7</text>
  <text x="86" y="138" text-anchor="middle" font-size="10" fill="#fecaca">Constraints</text>
  <text x="86" y="148" text-anchor="middle" font-size="10" fill="#fecaca">PK, FK, UNIQUE, CHECK</text>

  <rect x="162" y="106" width="128" height="48" fill="#d97706" rx="6"/>
  <text x="226" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 8</text>
  <text x="226" y="138" text-anchor="middle" font-size="10" fill="#fde68a">Indexes &amp; Performance</text>
  <text x="226" y="148" text-anchor="middle" font-size="10" fill="#fde68a">B-Tree, GIN, EXPLAIN</text>

  <rect x="302" y="106" width="128" height="48" fill="#16a34a" rx="6"/>
  <text x="366" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Day 9</text>
  <text x="366" y="138" text-anchor="middle" font-size="10" fill="#bbf7d0">Transactions</text>
  <text x="366" y="148" text-anchor="middle" font-size="10" fill="#bbf7d0">ACID, MVCC, WAL</text>

  <rect x="442" y="106" width="276" height="48" fill="#1e293b" rx="6"/>
  <text x="580" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Day 10 — CAPSTONE</text>
  <text x="580" y="138" text-anchor="middle" font-size="10" fill="#94a3b8">Full e-commerce DB (ShopKart)</text>
  <text x="580" y="148" text-anchor="middle" font-size="10" fill="#94a3b8">All concepts combined in one real project</text>

  <!-- Celebration text -->
  <rect x="22" y="166" width="696" height="42" fill="#1e40af" rx="6"/>
  <text x="370" y="184" text-anchor="middle" font-size="13" font-weight="bold" fill="white">You can now design, build, query, and optimize a production PostgreSQL database!</text>
  <text x="370" y="200" text-anchor="middle" font-size="11" fill="#bfdbfe">The skills learned here apply to MySQL, SQL Server, Oracle, and SQLite — SQL is SQL!</text>
</svg>
