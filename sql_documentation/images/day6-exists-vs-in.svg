<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="260" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">EXISTS vs IN — Short-Circuit vs Full List Scan</text>

  <!-- IN (left) -->
  <rect x="20" y="36" width="335" height="200" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <rect x="20" y="36" width="335" height="28" fill="#d97706" rx="8 8 0 0"/>
  <text x="187" y="56" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IN — builds full list first</text>

  <rect x="35" y="72" width="305" height="40" fill="#fef3c7" rx="4"/>
  <text x="45" y="88" font-size="10" fill="#475569">WHERE customer_id IN</text>
  <text x="45" y="103" font-size="10" fill="#475569">  (SELECT DISTINCT customer_id FROM orders)</text>

  <text x="187" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">How it works:</text>
  <rect x="35" y="138" width="305" height="18" fill="#fef9c3" rx="3"/>
  <text x="187" y="151" text-anchor="middle" font-size="10" fill="#1e293b">1. Run subquery → get full list [1, 2, 3, ...]</text>
  <rect x="35" y="158" width="305" height="18" fill="#fef9c3" rx="3"/>
  <text x="187" y="171" text-anchor="middle" font-size="10" fill="#1e293b">2. Load ALL matching IDs into memory</text>
  <rect x="35" y="178" width="305" height="18" fill="#fef9c3" rx="3"/>
  <text x="187" y="191" text-anchor="middle" font-size="10" fill="#1e293b">3. Check each outer row: "is it in the list?"</text>
  <text x="187" y="214" text-anchor="middle" font-size="10" fill="#d97706">⚠️ With NULLs in subquery: IN can return wrong results!</text>
  <text x="187" y="228" text-anchor="middle" font-size="10" fill="#d97706">NOT IN fails entirely if ANY value is NULL!</text>

  <!-- EXISTS (right) -->
  <rect x="385" y="36" width="335" height="200" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="385" y="36" width="335" height="28" fill="#16a34a" rx="8 8 0 0"/>
  <text x="552" y="56" text-anchor="middle" font-size="12" font-weight="bold" fill="white">EXISTS — stops at first match (short-circuit)</text>

  <rect x="400" y="72" width="305" height="40" fill="#f0fdf4" rx="4"/>
  <text x="410" y="88" font-size="10" fill="#475569">WHERE EXISTS</text>
  <text x="410" y="103" font-size="10" fill="#475569">  (SELECT 1 FROM orders o WHERE o.customer_id = c.id)</text>

  <text x="552" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">How it works:</text>
  <rect x="400" y="138" width="305" height="18" fill="#dcfce7" rx="3"/>
  <text x="552" y="151" text-anchor="middle" font-size="10" fill="#1e293b">1. For this customer: start scanning orders</text>
  <rect x="400" y="158" width="305" height="18" fill="#dcfce7" rx="3"/>
  <text x="552" y="171" text-anchor="middle" font-size="10" fill="#16a34a">2. Found ONE match → immediately return TRUE ⚡</text>
  <rect x="400" y="178" width="305" height="18" fill="#dcfce7" rx="3"/>
  <text x="552" y="191" text-anchor="middle" font-size="10" fill="#1e293b">3. Skip remaining rows (no full scan needed!)</text>
  <text x="552" y="214" text-anchor="middle" font-size="10" fill="#16a34a">✅ NULL-safe: EXISTS never returns wrong results</text>
  <text x="552" y="228" text-anchor="middle" font-size="10" fill="#16a34a">NOT EXISTS also works correctly with NULLs</text>

  <!-- Bottom summary -->
  <rect x="20" y="244" width="700" height="0" fill="none"/>
</svg>
