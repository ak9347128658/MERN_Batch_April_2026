<svg viewBox="0 0 740 190" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="190" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">What Happens When You Press Enter on a SQL Query</text>

  <!-- Step 1: You type -->
  <rect x="20" y="40" width="125" height="110" fill="white" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="82" y="72" text-anchor="middle" font-size="28" fill="#475569">⌨️</text>
  <text x="82" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">You type SQL</text>
  <rect x="30" y="104" width="105" height="38" fill="#f1f5f9" rx="4"/>
  <text x="82" y="117" text-anchor="middle" font-size="9" fill="#475569">SELECT * FROM</text>
  <text x="82" y="129" text-anchor="middle" font-size="9" fill="#475569">students WHERE...</text>
  <text x="82" y="143" text-anchor="middle" font-size="9" fill="#94a3b8">↵ Press Enter</text>

  <!-- Arrow 1 -->
  <line x1="145" y1="95" x2="165" y2="95" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="161,89 171,95 161,101" fill="#94a3b8"/>

  <!-- Step 2: Parser -->
  <rect x="171" y="40" width="125" height="110" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <text x="233" y="72" text-anchor="middle" font-size="28" fill="#2563eb">🔍</text>
  <text x="233" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">1. Parser</text>
  <text x="233" y="112" text-anchor="middle" font-size="11" fill="#475569">Syntax check</text>
  <text x="233" y="127" text-anchor="middle" font-size="11" fill="#475569">Is the SQL valid?</text>
  <rect x="181" y="137" width="105" height="16" fill="#dbeafe" rx="3"/>
  <text x="233" y="149" text-anchor="middle" font-size="9" fill="#1e40af">Spell-check for SQL</text>

  <!-- Arrow 2 -->
  <line x1="296" y1="95" x2="316" y2="95" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="312,89 322,95 312,101" fill="#94a3b8"/>

  <!-- Step 3: Planner -->
  <rect x="322" y="40" width="125" height="110" fill="white" rx="8" stroke="#7c3aed" stroke-width="2"/>
  <text x="384" y="72" text-anchor="middle" font-size="28" fill="#7c3aed">🧠</text>
  <text x="384" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">2. Planner</text>
  <text x="384" y="112" text-anchor="middle" font-size="11" fill="#475569">Query planning</text>
  <text x="384" y="127" text-anchor="middle" font-size="11" fill="#475569">Fastest route?</text>
  <rect x="332" y="137" width="105" height="16" fill="#ede9fe" rx="3"/>
  <text x="384" y="149" text-anchor="middle" font-size="9" fill="#7c3aed">Use index or scan?</text>

  <!-- Arrow 3 -->
  <line x1="447" y1="95" x2="467" y2="95" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="463,89 473,95 463,101" fill="#94a3b8"/>

  <!-- Step 4: Executor -->
  <rect x="473" y="40" width="125" height="110" fill="white" rx="8" stroke="#d97706" stroke-width="2"/>
  <text x="535" y="72" text-anchor="middle" font-size="28" fill="#d97706">⚙️</text>
  <text x="535" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">3. Executor</text>
  <text x="535" y="112" text-anchor="middle" font-size="11" fill="#475569">Fetch the data</text>
  <text x="535" y="127" text-anchor="middle" font-size="11" fill="#475569">from disk/memory</text>
  <rect x="483" y="137" width="105" height="16" fill="#fef3c7" rx="3"/>
  <text x="535" y="149" text-anchor="middle" font-size="9" fill="#b45309">Read rows, apply WHERE</text>

  <!-- Arrow 4 -->
  <line x1="598" y1="95" x2="618" y2="95" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="614,89 624,95 614,101" fill="#94a3b8"/>

  <!-- Step 5: Result -->
  <rect x="624" y="40" width="100" height="110" fill="#15803d" rx="8"/>
  <text x="674" y="72" text-anchor="middle" font-size="28" fill="white">📊</text>
  <text x="674" y="94" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Result</text>
  <text x="674" y="112" text-anchor="middle" font-size="11" fill="#bbf7d0">Returned to</text>
  <text x="674" y="127" text-anchor="middle" font-size="11" fill="#bbf7d0">your screen</text>
  <rect x="634" y="137" width="80" height="16" fill="#14532d" rx="3"/>
  <text x="674" y="149" text-anchor="middle" font-size="9" fill="#bbf7d0">~20 milliseconds!</text>

  <text x="370" y="174" text-anchor="middle" font-size="11" fill="#1e293b">All four steps happen in milliseconds — even for tables with millions of rows.</text>
</svg>
