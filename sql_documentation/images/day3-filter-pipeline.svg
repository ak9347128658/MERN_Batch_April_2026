<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="200" fill="#f0f4ff" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">SQL Query Processing Pipeline</text>

  <!-- Stage 1: All Data -->
  <rect x="20" y="50" width="115" height="100" fill="#475569" rx="8"/>
  <text x="77" y="85" text-anchor="middle" font-size="24" fill="white">📦</text>
  <text x="77" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">All Data</text>
  <text x="77" y="123" text-anchor="middle" font-size="11" fill="#cbd5e1">FROM table</text>
  <text x="77" y="139" text-anchor="middle" font-size="10" fill="#94a3b8">1M rows</text>

  <!-- Arrow 1 -->
  <line x1="135" y1="100" x2="158" y2="100" stroke="#64748b" stroke-width="2.5"/>
  <polygon points="154,94 164,100 154,106" fill="#64748b"/>

  <!-- Stage 2: WHERE -->
  <rect x="164" y="50" width="115" height="100" fill="#2563eb" rx="8"/>
  <text x="221" y="85" text-anchor="middle" font-size="24" fill="white">🔍</text>
  <text x="221" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Filter</text>
  <text x="221" y="123" text-anchor="middle" font-size="11" fill="#bfdbfe">WHERE</text>
  <text x="221" y="139" text-anchor="middle" font-size="10" fill="#93c5fd">50K rows</text>

  <!-- Arrow 2 -->
  <line x1="279" y1="100" x2="302" y2="100" stroke="#64748b" stroke-width="2.5"/>
  <polygon points="298,94 308,100 298,106" fill="#64748b"/>

  <!-- Stage 3: ORDER BY -->
  <rect x="308" y="50" width="115" height="100" fill="#7c3aed" rx="8"/>
  <text x="365" y="85" text-anchor="middle" font-size="24" fill="white">↕️</text>
  <text x="365" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Sort</text>
  <text x="365" y="123" text-anchor="middle" font-size="11" fill="#ddd6fe">ORDER BY</text>
  <text x="365" y="139" text-anchor="middle" font-size="10" fill="#c4b5fd">50K sorted</text>

  <!-- Arrow 3 -->
  <line x1="423" y1="100" x2="446" y2="100" stroke="#64748b" stroke-width="2.5"/>
  <polygon points="442,94 452,100 442,106" fill="#64748b"/>

  <!-- Stage 4: LIMIT -->
  <rect x="452" y="50" width="115" height="100" fill="#d97706" rx="8"/>
  <text x="509" y="85" text-anchor="middle" font-size="24" fill="white">✂️</text>
  <text x="509" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Limit</text>
  <text x="509" y="123" text-anchor="middle" font-size="11" fill="#fde68a">LIMIT / OFFSET</text>
  <text x="509" y="139" text-anchor="middle" font-size="10" fill="#fcd34d">20 rows</text>

  <!-- Arrow 4 -->
  <line x1="567" y1="100" x2="590" y2="100" stroke="#64748b" stroke-width="2.5"/>
  <polygon points="586,94 596,100 586,106" fill="#64748b"/>

  <!-- Stage 5: Result -->
  <rect x="596" y="50" width="120" height="100" fill="#16a34a" rx="8"/>
  <text x="656" y="85" text-anchor="middle" font-size="24" fill="white">📊</text>
  <text x="656" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Result</text>
  <text x="656" y="123" text-anchor="middle" font-size="11" fill="#bbf7d0">Returned to</text>
  <text x="656" y="139" text-anchor="middle" font-size="10" fill="#86efac">application</text>

  <!-- Bottom note -->
  <text x="380" y="174" text-anchor="middle" font-size="11" fill="#1e293b">Each stage reduces data: filtering eliminates rows early, saving work for later stages.</text>
  <text x="380" y="190" text-anchor="middle" font-size="11" fill="#64748b">Execution order: FROM → WHERE → ORDER BY → LIMIT → SELECT</text>
</svg>
