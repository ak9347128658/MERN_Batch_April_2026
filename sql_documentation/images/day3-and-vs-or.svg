<svg viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="280" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">AND Narrows Results — OR Broadens Results</text>

  <!-- Source table shared -->
  <text x="370" y="44" text-anchor="middle" font-size="12" fill="#64748b">Starting table: 12 employees</text>

  <!-- AND side (left) -->
  <rect x="20" y="54" width="330" height="34" fill="#2563eb" rx="6 6 0 0"/>
  <text x="185" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="white">AND — Both must be true (narrows)</text>

  <rect x="20" y="88" width="330" height="162" fill="white" rx="0 0 8 8" stroke="#93c5fd" stroke-width="1.5"/>

  <rect x="30" y="96" width="310" height="28" fill="#dbeafe" rx="4"/>
  <text x="185" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">WHERE department = 'Engineering'</text>
  <text x="185" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">AND salary &gt; 80000</text>

  <!-- Bar: 12 → 4 → 3 -->
  <rect x="30" y="140" width="200" height="16" fill="#dbeafe" rx="3"/>
  <text x="240" y="153" font-size="11" fill="#475569">12 rows (start)</text>

  <text x="185" y="170" text-anchor="middle" font-size="11" fill="#475569">department = 'Engineering' → 4 rows</text>

  <rect x="30" y="178" width="70" height="16" fill="#2563eb" rx="3"/>
  <text x="240" y="191" font-size="11" fill="#475569">AND salary &gt; 80000 → 3 rows</text>

  <rect x="30" y="210" width="310" height="30" fill="#1e40af" rx="4"/>
  <text x="185" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Result: 3 rows</text>
  <text x="185" y="233" text-anchor="middle" font-size="10" fill="#bfdbfe">Each AND can only reduce the count</text>

  <!-- Arrow showing narrowing -->
  <text x="370" y="130" text-anchor="middle" font-size="28" fill="#94a3b8">⟺</text>

  <!-- OR side (right) -->
  <rect x="390" y="54" width="330" height="34" fill="#d97706" rx="6 6 0 0"/>
  <text x="555" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="white">OR — Either can be true (broadens)</text>

  <rect x="390" y="88" width="330" height="162" fill="white" rx="0 0 8 8" stroke="#fed7aa" stroke-width="1.5"/>

  <rect x="400" y="96" width="310" height="28" fill="#fef3c7" rx="4"/>
  <text x="555" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">WHERE city = 'Mumbai'</text>
  <text x="555" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">OR city = 'Delhi'</text>

  <!-- Bar: 12 → 4 → 7 -->
  <rect x="400" y="140" width="200" height="16" fill="#fef3c7" rx="3"/>
  <text x="608" y="153" font-size="11" fill="#475569">12 rows (start)</text>

  <text x="555" y="170" text-anchor="middle" font-size="11" fill="#475569">city = 'Mumbai' → 3 rows</text>

  <rect x="400" y="178" width="200" height="16" fill="#d97706" rx="3"/>
  <text x="608" y="191" font-size="11" fill="#475569">OR city = 'Delhi' → 2 more = 5 rows</text>

  <rect x="400" y="210" width="310" height="30" fill="#92400e" rx="4"/>
  <text x="555" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Result: 5 rows</text>
  <text x="555" y="233" text-anchor="middle" font-size="10" fill="#fde68a">Each OR can only increase the count</text>

  <!-- Bottom note -->
  <rect x="20" y="260" width="700" height="16" fill="#1e40af" rx="4"/>
  <text x="370" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="white">💡 AND = filter tighter (fewer rows)  |  OR = open wider (more rows)  |  NOT = exclude a group</text>
</svg>
