<svg viewBox="0 0 740 250" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="250" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Write Amplification — Every INSERT Updates All Indexes</text>

  <!-- INSERT statement -->
  <rect x="20" y="36" width="160" height="44" fill="#1e40af" rx="8"/>
  <text x="100" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">INSERT 1 row</text>
  <text x="100" y="72" text-anchor="middle" font-size="11" fill="#bfdbfe">into users table</text>

  <!-- Arrow -->
  <line x1="180" y1="58" x2="210" y2="58" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="206,54 214,58 206,62" fill="#94a3b8"/>

  <!-- Writes fan out -->
  <!-- Table heap -->
  <line x1="215" y1="58" x2="260" y2="48" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="36" width="160" height="24" fill="#dcfce7" rx="4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="340" y="52" text-anchor="middle" font-size="11" fill="#1e293b">① Write to table heap</text>

  <!-- Index writes -->
  <line x1="215" y1="58" x2="260" y2="76" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="66" width="160" height="24" fill="#fef2f2" rx="4" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="82" text-anchor="middle" font-size="11" fill="#dc2626">② Update idx_email</text>

  <line x1="215" y1="58" x2="260" y2="100" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="92" width="160" height="24" fill="#fef2f2" rx="4" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="108" text-anchor="middle" font-size="11" fill="#dc2626">③ Update idx_city</text>

  <line x1="215" y1="58" x2="260" y2="124" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="118" width="160" height="24" fill="#fef2f2" rx="4" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="134" text-anchor="middle" font-size="11" fill="#dc2626">④ Update idx_age</text>

  <line x1="215" y1="58" x2="260" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="142" width="160" height="24" fill="#fef2f2" rx="4" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#dc2626">⑤ Update idx_username</text>

  <line x1="215" y1="58" x2="260" y2="176" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="168" width="160" height="24" fill="#fef2f2" rx="4" stroke="#dc2626" stroke-width="1.5"/>
  <text x="340" y="184" text-anchor="middle" font-size="11" fill="#dc2626">⑥ Update idx_created_at</text>

  <!-- Total count -->
  <rect x="450" y="36" width="270" height="80" fill="white" rx="8" stroke="#dc2626" stroke-width="2"/>
  <rect x="450" y="36" width="270" height="26" fill="#dc2626" rx="8 8 0 0"/>
  <text x="585" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Total writes for 1 INSERT:</text>
  <text x="585" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">1 table write + 5 index writes = 6 writes</text>
  <text x="585" y="104" text-anchor="middle" font-size="11" fill="#475569">Insert 100,000 rows → 600,000 total writes!</text>

  <!-- Comparison table -->
  <rect x="450" y="132" width="270" height="80" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="450" y="132" width="270" height="26" fill="#16a34a" rx="8 8 0 0"/>
  <text x="585" y="151" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Rule of Thumb</text>
  <text x="465" y="173" font-size="11" fill="#1e293b">0 indexes → 1x write speed (baseline)</text>
  <text x="465" y="189" font-size="11" fill="#d97706">5 indexes → ~6x slower writes</text>
  <text x="465" y="205" font-size="11" fill="#dc2626">10+ indexes → avoid unless needed!</text>

  <!-- Bottom bar -->
  <rect x="20" y="220" width="700" height="22" fill="#1e40af" rx="6"/>
  <text x="370" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Balance: index what you READ most, remove indexes you don't query. Each index = a read-write trade-off.</text>
</svg>
