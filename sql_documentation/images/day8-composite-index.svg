<svg viewBox="0 0 740 250" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="250" fill="#f0f4ff" rx="12"/>
  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Composite Index Leftmost Prefix Rule</text>
  <text x="370" y="40" text-anchor="middle" font-size="11" fill="#64748b">CREATE INDEX idx_users_city_age ON users (city, age);</text>

  <!-- Phone book analogy header -->
  <text x="370" y="60" text-anchor="middle" font-size="11" fill="#475569">Think of it like a phone book sorted by Last Name, then First Name within each last name.</text>

  <!-- Cases -->
  <!-- Case 1: city + age = uses index -->
  <rect x="20" y="70" width="220" height="120" fill="white" rx="8" stroke="#16a34a" stroke-width="2"/>
  <rect x="20" y="70" width="220" height="26" fill="#16a34a" rx="8 8 0 0"/>
  <text x="130" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅ city + age — USES INDEX</text>
  <rect x="35" y="104" width="190" height="36" fill="#f0fdf4" rx="4"/>
  <text x="130" y="120" text-anchor="middle" font-size="10" fill="#475569">WHERE city = 'Mumbai'</text>
  <text x="130" y="135" text-anchor="middle" font-size="10" fill="#475569">AND age = 25</text>
  <text x="130" y="162" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">Both columns → full index used</text>
  <text x="130" y="178" text-anchor="middle" font-size="10" fill="#475569">Narrows by city, then by age</text>

  <!-- Case 2: city only = uses index -->
  <rect x="260" y="70" width="220" height="120" fill="white" rx="8" stroke="#2563eb" stroke-width="2"/>
  <rect x="260" y="70" width="220" height="26" fill="#2563eb" rx="8 8 0 0"/>
  <text x="370" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅ city only — USES INDEX</text>
  <rect x="275" y="104" width="190" height="36" fill="#dbeafe" rx="4"/>
  <text x="370" y="120" text-anchor="middle" font-size="10" fill="#475569">WHERE city = 'Mumbai'</text>
  <text x="370" y="135" text-anchor="middle" font-size="10" fill="#94a3b8">(no age filter)</text>
  <text x="370" y="162" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">Leftmost column → index used</text>
  <text x="370" y="178" text-anchor="middle" font-size="10" fill="#475569">Like looking up by last name only</text>

  <!-- Case 3: age only = does NOT use index -->
  <rect x="500" y="70" width="220" height="120" fill="white" rx="8" stroke="#dc2626" stroke-width="2"/>
  <rect x="500" y="70" width="220" height="26" fill="#dc2626" rx="8 8 0 0"/>
  <text x="610" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">❌ age only — NO INDEX</text>
  <rect x="515" y="104" width="190" height="36" fill="#fef2f2" rx="4"/>
  <text x="610" y="120" text-anchor="middle" font-size="10" fill="#475569">(no city filter)</text>
  <text x="610" y="135" text-anchor="middle" font-size="10" fill="#dc2626">WHERE age = 25</text>
  <text x="610" y="162" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">Skips leftmost → full scan!</text>
  <text x="610" y="178" text-anchor="middle" font-size="10" fill="#475569">Like looking up first name only</text>

  <!-- Mnemonic bar -->
  <rect x="20" y="204" width="700" height="36" fill="#1e40af" rx="6"/>
  <text x="370" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Rule: The index is usable if you include the LEFTMOST column(s) in your WHERE clause.</text>
  <text x="370" y="234" text-anchor="middle" font-size="11" fill="#bfdbfe">Column order matters: put equality columns first, range columns second → (status, date) not (date, status)</text>
</svg>
