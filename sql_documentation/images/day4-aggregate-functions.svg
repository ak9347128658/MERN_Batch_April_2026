<svg viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="300" fill="#f0f4ff" rx="12"/>
  <text x="370" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Aggregate Functions: Many Rows → One Result</text>

  <!-- Input rows -->
  <rect x="30" y="50" width="140" height="32" fill="#3b82f6" rx="4"/>
  <text x="100" y="71" text-anchor="middle" font-size="13" font-weight="bold" fill="white">marks</text>

  <rect x="30" y="84" width="140" height="30" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="104" text-anchor="middle" font-size="13" fill="#1e293b">85</text>
  <rect x="30" y="114" width="140" height="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="134" text-anchor="middle" font-size="13" fill="#1e293b">92</text>
  <rect x="30" y="144" width="140" height="30" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="164" text-anchor="middle" font-size="13" fill="#1e293b">78</text>
  <rect x="30" y="174" width="140" height="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="194" text-anchor="middle" font-size="13" fill="#1e293b">95</text>
  <rect x="30" y="204" width="140" height="30" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="224" text-anchor="middle" font-size="13" fill="#1e293b">88</text>

  <!-- 5 rows label -->
  <text x="100" y="252" text-anchor="middle" font-size="11" fill="#64748b">5 rows</text>

  <!-- Big arrow -->
  <line x1="180" y1="155" x2="225" y2="155" stroke="#64748b" stroke-width="3"/>
  <polygon points="219,148 232,155 219,162" fill="#64748b"/>

  <!-- Function box -->
  <rect x="232" y="120" width="130" height="70" fill="#1e40af" rx="10"/>
  <text x="297" y="148" text-anchor="middle" font-size="14" fill="white">Aggregate</text>
  <text x="297" y="165" text-anchor="middle" font-size="14" fill="white">Function</text>
  <text x="297" y="181" text-anchor="middle" font-size="12" fill="#93c5fd">⚙️ processes all rows</text>

  <!-- Arrow out -->
  <line x1="362" y1="155" x2="395" y2="155" stroke="#64748b" stroke-width="3"/>
  <polygon points="389,148 402,155 389,162" fill="#64748b"/>

  <!-- Results -->
  <rect x="402" y="60" width="145" height="36" fill="#16a34a" rx="6"/>
  <text x="474" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="white">COUNT(*)</text>
  <text x="474" y="90" text-anchor="middle" font-size="12" fill="white">→  5</text>

  <rect x="402" y="104" width="145" height="36" fill="#2563eb" rx="6"/>
  <text x="474" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SUM(marks)</text>
  <text x="474" y="134" text-anchor="middle" font-size="12" fill="white">→  438</text>

  <rect x="402" y="148" width="145" height="36" fill="#7c3aed" rx="6"/>
  <text x="474" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="white">AVG(marks)</text>
  <text x="474" y="178" text-anchor="middle" font-size="12" fill="white">→  87.6</text>

  <rect x="402" y="192" width="145" height="36" fill="#d97706" rx="6"/>
  <text x="474" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MIN / MAX</text>
  <text x="474" y="222" text-anchor="middle" font-size="12" fill="white">→  78 / 95</text>

  <!-- 1 value label -->
  <text x="474" y="252" text-anchor="middle" font-size="11" fill="#64748b">1 result each</text>

  <text x="370" y="278" text-anchor="middle" font-size="11" fill="#1e293b">Aggregate functions collapse many rows into a single summary value.</text>
  <text x="370" y="293" text-anchor="middle" font-size="11" fill="#64748b">NULL values are ignored by SUM, AVG, MIN, MAX, and COUNT(column).</text>
</svg>
