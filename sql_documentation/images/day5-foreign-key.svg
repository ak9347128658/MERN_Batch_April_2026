<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="280" fill="#f0f4ff" rx="12"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Foreign Key — Linking Tables Together</text>

  <!-- Customers table -->
  <rect x="40" y="48" width="240" height="34" fill="#1e40af" rx="6 6 0 0"/>
  <text x="160" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📋 customers (Parent)</text>

  <rect x="40" y="82" width="240" height="28" fill="#3b82f6"/>
  <line x1="120" y1="82" x2="120" y2="212" stroke="#1d4ed8" stroke-width="1"/>
  <text x="80" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">id (PK)</text>
  <text x="200" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">name</text>

  <rect x="40" y="110" width="240" height="26" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="80" y="128" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="bold">1</text>
  <text x="200" y="128" text-anchor="middle" font-size="12" fill="#1e293b">Rahul</text>

  <rect x="40" y="136" width="240" height="26" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="80" y="154" text-anchor="middle" font-size="12" fill="#1e293b">2</text>
  <text x="200" y="154" text-anchor="middle" font-size="12" fill="#1e293b">Priya</text>

  <rect x="40" y="162" width="240" height="26" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="80" y="180" text-anchor="middle" font-size="12" fill="#1e293b">3</text>
  <text x="200" y="180" text-anchor="middle" font-size="12" fill="#1e293b">Amit</text>

  <rect x="40" y="188" width="240" height="26" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="80" y="206" text-anchor="middle" font-size="12" fill="#1e293b">4</text>
  <text x="200" y="206" text-anchor="middle" font-size="12" fill="#1e293b">Sneha</text>

  <!-- PK badge -->
  <rect x="44" y="114" width="30" height="14" fill="#fbbf24" rx="3"/>
  <text x="59" y="125" text-anchor="middle" font-size="9" font-weight="bold" fill="#78350f">PK</text>

  <!-- FK arrow -->
  <path d="M 360 148 C 410 148, 430 148, 440 148" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="395" y="143" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">REFERENCES</text>
  <text x="395" y="163" text-anchor="middle" font-size="10" fill="#64748b">enforces</text>
  <text x="395" y="175" text-anchor="middle" font-size="10" fill="#64748b">integrity</text>

  <!-- Orders table -->
  <rect x="440" y="48" width="240" height="34" fill="#0369a1" rx="6 6 0 0"/>
  <text x="560" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📋 orders (Child)</text>

  <rect x="440" y="82" width="240" height="28" fill="#0284c7"/>
  <line x1="520" y1="82" x2="520" y2="212" stroke="#0369a1" stroke-width="1"/>
  <line x1="600" y1="82" x2="600" y2="212" stroke="#0369a1" stroke-width="1"/>
  <text x="480" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">id (PK)</text>
  <text x="560" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">customer_id (FK)</text>
  <text x="640" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">product</text>

  <rect x="440" y="110" width="240" height="26" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="480" y="128" text-anchor="middle" font-size="12" fill="#1e293b">101</text>
  <text x="560" y="128" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">1</text>
  <text x="640" y="128" text-anchor="middle" font-size="12" fill="#1e293b">Laptop</text>

  <rect x="440" y="136" width="240" height="26" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="480" y="154" text-anchor="middle" font-size="12" fill="#1e293b">102</text>
  <text x="560" y="154" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">1</text>
  <text x="640" y="154" text-anchor="middle" font-size="12" fill="#1e293b">Phone</text>

  <rect x="440" y="162" width="240" height="26" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="480" y="180" text-anchor="middle" font-size="12" fill="#1e293b">103</text>
  <text x="560" y="180" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">3</text>
  <text x="640" y="180" text-anchor="middle" font-size="12" fill="#1e293b">Headphones</text>

  <!-- FK badge -->
  <rect x="544" y="114" width="24" height="14" fill="#dc2626" rx="3"/>
  <text x="556" y="125" text-anchor="middle" font-size="9" font-weight="bold" fill="white">FK</text>

  <!-- Bottom note -->
  <rect x="40" y="228" width="640" height="36" fill="#fee2e2" rx="6" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="244" text-anchor="middle" font-size="11" fill="#991b1b">🚫  INSERT INTO orders (customer_id) VALUES (99)  →  ERROR: Key (customer_id)=(99) is not present in table "customers"</text>
  <text x="360" y="259" text-anchor="middle" font-size="11" fill="#991b1b">Foreign key prevents orphan records — every order must reference a real customer.</text>
</svg>
