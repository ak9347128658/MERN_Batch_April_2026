<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="280" fill="#f0f4ff" rx="12"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Transaction Lifecycle — All or Nothing</text>

  <!-- START -->
  <rect x="310" y="46" width="140" height="36" fill="#475569" rx="18"/>
  <text x="380" y="69" text-anchor="middle" font-size="13" font-weight="bold" fill="white">BEGIN</text>

  <!-- Arrow down to ACTIVE -->
  <line x1="380" y1="82" x2="380" y2="108" stroke="#64748b" stroke-width="2"/>
  <polygon points="374,104 380,114 386,104" fill="#64748b"/>

  <!-- ACTIVE box -->
  <rect x="290" y="114" width="180" height="44" fill="#2563eb" rx="8"/>
  <text x="380" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔄 ACTIVE</text>
  <text x="380" y="151" text-anchor="middle" font-size="11" fill="#bfdbfe">SQL statements executing</text>

  <!-- Arrow left: ROLLBACK path -->
  <line x1="290" y1="136" x2="160" y2="136" stroke="#dc2626" stroke-width="2"/>
  <text x="225" y="128" text-anchor="middle" font-size="11" fill="#dc2626">Error / ROLLBACK</text>
  <polygon points="164,130 154,136 164,142" fill="#dc2626"/>

  <!-- ABORTED box -->
  <rect x="30" y="114" width="120" height="44" fill="#dc2626" rx="8"/>
  <text x="90" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌ ABORTED</text>
  <text x="90" y="151" text-anchor="middle" font-size="11" fill="#fecaca">All changes undone</text>

  <!-- Arrow right: COMMIT path -->
  <line x1="470" y1="136" x2="600" y2="136" stroke="#16a34a" stroke-width="2"/>
  <text x="535" y="128" text-anchor="middle" font-size="11" fill="#16a34a">COMMIT</text>
  <polygon points="596,130 606,136 596,142" fill="#16a34a"/>

  <!-- COMMITTED box -->
  <rect x="606" y="114" width="128" height="44" fill="#16a34a" rx="8"/>
  <text x="670" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅ COMMITTED</text>
  <text x="670" y="151" text-anchor="middle" font-size="11" fill="#bbf7d0">Saved to disk (WAL)</text>

  <!-- Abort end -->
  <line x1="90" y1="158" x2="90" y2="184" stroke="#dc2626" stroke-width="2"/>
  <polygon points="84,180 90,190 96,180" fill="#dc2626"/>
  <rect x="40" y="190" width="100" height="30" fill="#fee2e2" rx="6" stroke="#dc2626" stroke-width="1.5"/>
  <text x="90" y="209" text-anchor="middle" font-size="11" fill="#7f1d1d">Database state</text>
  <text x="90" y="222" text-anchor="middle" font-size="11" fill="#7f1d1d">UNCHANGED ↩️</text>

  <!-- Commit end -->
  <line x1="670" y1="158" x2="670" y2="184" stroke="#16a34a" stroke-width="2"/>
  <polygon points="664,180 670,190 676,180" fill="#16a34a"/>
  <rect x="610" y="190" width="120" height="30" fill="#dcfce7" rx="6" stroke="#16a34a" stroke-width="1.5"/>
  <text x="670" y="209" text-anchor="middle" font-size="11" fill="#14532d">Permanent change</text>
  <text x="670" y="222" text-anchor="middle" font-size="11" fill="#14532d">survives crashes 💾</text>

  <!-- SAVEPOINT callout -->
  <rect x="250" y="175" width="260" height="38" fill="#fef3c7" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="380" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">💡 SAVEPOINT = checkpoint inside a transaction</text>
  <text x="380" y="208" text-anchor="middle" font-size="11" fill="#92400e">ROLLBACK TO SAVEPOINT undoes partial work only</text>

  <!-- Bottom note -->
  <text x="380" y="258" text-anchor="middle" font-size="11" fill="#1e293b">Auto-commit: every single SQL statement outside BEGIN is its own transaction.</text>
  <text x="380" y="272" text-anchor="middle" font-size="11" fill="#64748b">Use BEGIN when you need multiple statements to succeed or fail together.</text>
</svg>
