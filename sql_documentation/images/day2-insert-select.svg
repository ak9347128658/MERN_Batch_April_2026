<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="260" fill="#f0f4ff" rx="12"/>
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">INSERT INTO … SELECT — Copy Rows Between Tables</text>

  <!-- Source table (products) -->
  <rect x="20" y="42" width="240" height="28" fill="#1e40af" rx="6 6 0 0"/>
  <text x="140" y="61" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📋 products (source)</text>

  <rect x="20" y="70" width="240" height="22" fill="#3b82f6"/>
  <line x1="100" y1="70" x2="100" y2="200" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="180" y1="70" x2="180" y2="200" stroke="#1d4ed8" stroke-width="1"/>
  <text x="60" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">product</text>
  <text x="140" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">price</text>
  <text x="220" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">category</text>

  <rect x="20" y="92" width="240" height="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="60" y="106" text-anchor="middle" font-size="10" fill="#64748b">Headphones</text>
  <text x="140" y="106" text-anchor="middle" font-size="10" fill="#64748b">2,500</text>
  <text x="220" y="106" text-anchor="middle" font-size="10" fill="#64748b">Electronics</text>

  <!-- Highlighted expensive products -->
  <rect x="20" y="112" width="240" height="20" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="60" y="126" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">Laptop</text>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="bold">55,000 ✓</text>
  <text x="220" y="126" text-anchor="middle" font-size="10" fill="#1e293b">Electronics</text>

  <rect x="20" y="132" width="240" height="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="60" y="146" text-anchor="middle" font-size="10" fill="#64748b">Backpack</text>
  <text x="140" y="146" text-anchor="middle" font-size="10" fill="#64748b">1,200</text>
  <text x="220" y="146" text-anchor="middle" font-size="10" fill="#64748b">Bags</text>

  <rect x="20" y="152" width="240" height="20" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="60" y="166" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold">Smartphone</text>
  <text x="140" y="166" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="bold">25,000 ✓</text>
  <text x="220" y="166" text-anchor="middle" font-size="10" fill="#1e293b">Electronics</text>

  <rect x="20" y="172" width="240" height="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="60" y="186" text-anchor="middle" font-size="10" fill="#64748b">Water Bottle</text>
  <text x="140" y="186" text-anchor="middle" font-size="10" fill="#64748b">500</text>
  <text x="220" y="186" text-anchor="middle" font-size="10" fill="#64748b">Accessories</text>

  <rect x="20" y="192" width="240" height="10" fill="#1e40af" rx="0 0 4 4"/>
  <text x="140" y="218" text-anchor="middle" font-size="10" fill="#64748b">All products (some expensive ✓, some not)</text>

  <!-- Filter arrow in middle -->
  <rect x="276" y="98" width="188" height="68" fill="#1e40af" rx="8"/>
  <text x="370" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">INSERT INTO</text>
  <text x="370" y="133" text-anchor="middle" font-size="10" fill="#bfdbfe">expensive_products</text>
  <text x="370" y="148" text-anchor="middle" font-size="10" fill="#bfdbfe">SELECT … FROM products</text>
  <text x="370" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">WHERE price &gt; 5000</text>

  <!-- Arrows -->
  <line x1="260" y1="132" x2="274" y2="132" stroke="#64748b" stroke-width="2"/>
  <polygon points="270,126 280,132 270,138" fill="#64748b"/>
  <line x1="464" y1="132" x2="478" y2="132" stroke="#64748b" stroke-width="2"/>
  <polygon points="474,126 484,132 474,138" fill="#64748b"/>

  <!-- Destination table (expensive_products) -->
  <rect x="480" y="42" width="240" height="28" fill="#15803d" rx="6 6 0 0"/>
  <text x="600" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📋 expensive_products (dest)</text>

  <rect x="480" y="70" width="240" height="22" fill="#16a34a"/>
  <line x1="570" y1="70" x2="570" y2="160" stroke="#15803d" stroke-width="1"/>
  <line x1="660" y1="70" x2="660" y2="160" stroke="#15803d" stroke-width="1"/>
  <text x="525" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">product</text>
  <text x="615" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">price</text>
  <text x="700" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="white">category</text>

  <rect x="480" y="92" width="240" height="20" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="525" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Laptop</text>
  <text x="615" y="106" text-anchor="middle" font-size="10" fill="#14532d">55,000</text>
  <text x="700" y="106" text-anchor="middle" font-size="10" fill="#14532d">Electronics</text>

  <rect x="480" y="112" width="240" height="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="525" y="126" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Smartphone</text>
  <text x="615" y="126" text-anchor="middle" font-size="10" fill="#14532d">25,000</text>
  <text x="700" y="126" text-anchor="middle" font-size="10" fill="#14532d">Electronics</text>

  <rect x="480" y="132" width="240" height="22" fill="#dcfce7" rx="0 0 6 6" stroke="#86efac" stroke-width="1"/>
  <text x="600" y="146" text-anchor="middle" font-size="10" fill="#64748b">... (only rows where price &gt; 5000)</text>

  <text x="600" y="178" text-anchor="middle" font-size="10" fill="#64748b">Only 2 rows copied — cheaper items excluded</text>

  <!-- SQL display -->
  <rect x="20" y="228" width="700" height="28" fill="#1e40af" rx="6"/>
  <text x="370" y="241" text-anchor="middle" font-size="11" font-weight="bold" fill="white">INSERT INTO expensive_products (product_name, price, category)</text>
  <text x="370" y="252" text-anchor="middle" font-size="11" fill="#bfdbfe">SELECT product_name, price, category FROM products WHERE price &gt; 5000;</text>
</svg>
