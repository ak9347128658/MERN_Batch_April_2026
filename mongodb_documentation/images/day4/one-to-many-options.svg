<svg viewBox="0 0 730 265" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrOM" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546E7A"/>
    </marker>
    <marker id="arrOMb" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="730" height="265" fill="#fafafa" rx="14"/>
  <text x="365" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">One-to-Many: Three Approaches</text>

  <!-- Option 1: Embed -->
  <rect x="10" y="36" width="225" height="218" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <rect x="10" y="36" width="225" height="28" rx="10" fill="#2E7D32"/>
  <rect x="10" y="52" width="225" height="12" fill="#2E7D32"/>
  <text x="122" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Option 1: Embed</text>

  <rect x="22" y="72" width="200" height="130" rx="8" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="122" y="92" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">User Document</text>
  <text x="35"  y="108" font-size="9" fill="#555">name: "Amit"</text>
  <rect x="32" y="115" width="180" height="78" rx="5" fill="#C8E6C9"/>
  <text x="122" y="131" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">orders: [  ← embedded</text>
  <text x="44"  y="147" font-size="9" fill="#555">  { item: "Phone", total: 79999 }</text>
  <text x="44"  y="162" font-size="9" fill="#555">  { item: "Laptop", total: 114999 }</text>
  <text x="44"  y="177" font-size="9" fill="#555">  ...</text>
  <text x="122" y="190" text-anchor="middle" font-size="9" fill="#555">]</text>

  <rect x="22" y="210" width="200" height="38" rx="6" fill="#A5D6A7"/>
  <text x="122" y="226" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">✅ Best when:</text>
  <text x="122" y="242" text-anchor="middle" font-size="9" fill="#2e7d32">Few items, always read together</text>

  <!-- Option 2: Child Reference -->
  <rect x="252" y="36" width="225" height="218" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <rect x="252" y="36" width="225" height="28" rx="10" fill="#1565C0"/>
  <rect x="252" y="52" width="225" height="12" fill="#1565C0"/>
  <text x="364" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Option 2: Child Reference</text>

  <rect x="262" y="72" width="100" height="50" rx="7" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="312" y="92" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">User</text>
  <text x="312" y="108" text-anchor="middle" font-size="9" fill="#555">_id: user1</text>

  <!-- Arrows from orders to user -->
  <line x1="362" y1="100" x2="376" y2="82" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrOMb)"/>
  <line x1="362" y1="100" x2="376" y2="100" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrOMb)"/>
  <line x1="362" y1="100" x2="376" y2="118" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrOMb)"/>

  <rect x="376" y="68" width="92" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="422" y="82" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="bold">Order 1</text>
  <text x="422" y="92" text-anchor="middle" font-size="8" fill="#555">userId: user1</text>
  <rect x="376" y="97" width="92" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="422" y="111" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="bold">Order 2</text>
  <text x="422" y="121" text-anchor="middle" font-size="8" fill="#555">userId: user1</text>
  <rect x="376" y="126" width="92" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="422" y="140" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="bold">Order 3</text>
  <text x="422" y="150" text-anchor="middle" font-size="8" fill="#555">userId: user1</text>

  <text x="364" y="178" text-anchor="middle" font-size="9" fill="#555">Each order stores the userId →</text>
  <text x="364" y="192" text-anchor="middle" font-size="9" fill="#555">query: find({ userId: user1 })</text>

  <rect x="262" y="210" width="200" height="38" rx="6" fill="#BBDEFB"/>
  <text x="364" y="226" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">✅ Best when:</text>
  <text x="364" y="242" text-anchor="middle" font-size="9" fill="#1565c0">Many items, queried independently</text>

  <!-- Option 3: Parent Reference -->
  <rect x="494" y="36" width="225" height="218" rx="10" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <rect x="494" y="36" width="225" height="28" rx="10" fill="#6A1B9A"/>
  <rect x="494" y="52" width="225" height="12" fill="#6A1B9A"/>
  <text x="606" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Option 3: Parent Reference</text>

  <rect x="504" y="68" width="205" height="60" rx="7" fill="white" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="606" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">User Document</text>
  <text x="516" y="104" font-size="9" fill="#555">_id: user1</text>
  <text x="516" y="118" font-size="9" fill="#6A1B9A" font-weight="bold">orderIds: [order1, order2, order3]</text>

  <!-- Arrows from user to orders -->
  <line x1="580" y1="128" x2="558" y2="146" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrOM)"/>
  <line x1="606" y1="128" x2="606" y2="146" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrOM)"/>
  <line x1="632" y1="128" x2="654" y2="146" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrOM)"/>

  <rect x="504" y="146" width="62" height="26" rx="5" fill="white" stroke="#9C27B0" stroke-width="1"/>
  <text x="535" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#6A1B9A">Order 1</text>
  <rect x="575" y="146" width="62" height="26" rx="5" fill="white" stroke="#9C27B0" stroke-width="1"/>
  <text x="606" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#6A1B9A">Order 2</text>
  <rect x="646" y="146" width="62" height="26" rx="5" fill="white" stroke="#9C27B0" stroke-width="1"/>
  <text x="677" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#6A1B9A">Order 3</text>

  <text x="606" y="192" text-anchor="middle" font-size="9" fill="#555">User stores array of order IDs</text>

  <rect x="504" y="210" width="200" height="38" rx="6" fill="#E1BEE7"/>
  <text x="606" y="226" text-anchor="middle" font-size="10" fill="#4A148C" font-weight="bold">✅ Best when:</text>
  <text x="606" y="242" text-anchor="middle" font-size="9" fill="#6A1B9A">Quick check if relationship exists</text>
</svg>
