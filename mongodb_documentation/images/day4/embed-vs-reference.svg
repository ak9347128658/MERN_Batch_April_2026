<svg viewBox="0 0 710 225" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrER" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
  </defs>

  <rect width="710" height="225" fill="#fafafa" rx="14"/>
  <text x="355" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Embedded vs Referenced Documents</text>

  <!-- EMBEDDED panel -->
  <rect x="12" y="36" width="310" height="178" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <rect x="12" y="36" width="310" height="28" rx="10" fill="#2E7D32"/>
  <rect x="12" y="52" width="310" height="12" rx="0" fill="#2E7D32"/>
  <text x="167" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✅ Embedded (Denormalized)</text>

  <!-- Outer doc -->
  <rect x="24" y="72" width="286" height="130" rx="8" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="38" y="92"  font-size="10" font-weight="bold" fill="#1a1a2e">User Document</text>
  <text x="38" y="108" font-size="10" fill="#555">  name: "Amit Sharma"</text>
  <text x="38" y="123" font-size="10" fill="#555">  email: "amit@gmail.com"</text>

  <!-- Nested address -->
  <rect x="44" y="130" width="254" height="62" rx="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1"/>
  <text x="58" y="147" font-size="10" font-weight="bold" fill="#2e7d32">  address: {  ← embedded</text>
  <text x="58" y="163" font-size="10" fill="#555">    street: "123 MG Road"</text>
  <text x="58" y="179" font-size="10" fill="#555">    city: "Mumbai"</text>
  <text x="44" y="194" font-size="10" fill="#555">  }</text>

  <!-- VS -->
  <text x="355" y="134" text-anchor="middle" font-size="18" font-weight="bold" fill="#9e9e9e">vs</text>

  <!-- REFERENCED panel -->
  <rect x="388" y="36" width="310" height="178" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <rect x="388" y="36" width="310" height="28" rx="10" fill="#1565C0"/>
  <rect x="388" y="52" width="310" height="12" rx="0" fill="#1565C0"/>
  <text x="543" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔗 Referenced (Normalized)</text>

  <!-- User doc (left inside panel) -->
  <rect x="400" y="72" width="135" height="80" rx="7" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="414" y="90"  font-size="10" font-weight="bold" fill="#1a1a2e">User Document</text>
  <text x="414" y="106" font-size="10" fill="#555">name: "Amit"</text>
  <text x="414" y="120" font-size="10" fill="#555">email: "amit@..."</text>
  <text x="414" y="136" font-size="9"  fill="#1565c0" font-weight="bold">addressId: ───►</text>

  <!-- Arrow -->
  <line x1="535" y1="112" x2="552" y2="112" stroke="#1565C0" stroke-width="2" marker-end="url(#arrER)"/>

  <!-- Address doc (right inside panel) -->
  <rect x="552" y="72" width="135" height="80" rx="7" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="566" y="90"  font-size="10" font-weight="bold" fill="#1a1a2e">Address Doc</text>
  <text x="566" y="106" font-size="10" fill="#555">_id: ObjectId</text>
  <text x="566" y="120" font-size="10" fill="#555">street: "123..."</text>
  <text x="566" y="136" font-size="10" fill="#555">city: "Mumbai"</text>

  <!-- ONE query label -->
  <rect x="400" y="160" width="286" height="44" rx="7" fill="#BBDEFB"/>
  <text x="543" y="178" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">Separate collections — needs 2 queries</text>
  <text x="543" y="196" text-anchor="middle" font-size="10" fill="#1565c0">Use when data is large or queried independently</text>

  <!-- ONE query label for embedded -->
  <rect x="24" y="205" width="286" height="2" rx="1" fill="transparent"/>
  <text x="167" y="218" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">One query gets everything — fast!</text>
</svg>
