<svg viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrRT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546E7A"/>
    </marker>
    <marker id="arrRTb" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="720" height="230" fill="#fafafa" rx="14"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">MongoDB Relationship Types</text>

  <!-- ONE-TO-ONE -->
  <rect x="12" y="38" width="218" height="180" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <rect x="12" y="38" width="218" height="28" rx="10" fill="#2E7D32"/>
  <rect x="12" y="54" width="218" height="12" fill="#2E7D32"/>
  <text x="121" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="white">One-to-One (1:1)</text>

  <rect x="28" y="82" width="80" height="36" rx="7" fill="white" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="68" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">👤 User</text>
  <text x="68" y="113" text-anchor="middle" font-size="9" fill="#555">_id: u1</text>

  <line x1="108" y1="100" x2="130" y2="100" stroke="#546E7A" stroke-width="2" marker-end="url(#arrRT)"/>
  <text x="119" y="94" text-anchor="middle" font-size="9" fill="#555">1</text>
  <text x="125" y="94" text-anchor="middle" font-size="9" fill="#555">↔ 1</text>

  <rect x="130" y="82" width="88" height="36" rx="7" fill="white" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="174" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">📋 Profile</text>
  <text x="174" y="113" text-anchor="middle" font-size="9" fill="#555">userId: u1</text>

  <text x="121" y="142" text-anchor="middle" font-size="10" fill="#555">Examples:</text>
  <text x="121" y="158" text-anchor="middle" font-size="10" fill="#388E3C">User ↔ Profile</text>
  <text x="121" y="174" text-anchor="middle" font-size="10" fill="#388E3C">Person ↔ Passport</text>
  <text x="121" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">→ Usually EMBED</text>

  <!-- ONE-TO-MANY -->
  <rect x="250" y="38" width="218" height="180" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <rect x="250" y="38" width="218" height="28" rx="10" fill="#1565C0"/>
  <rect x="250" y="54" width="218" height="12" fill="#1565C0"/>
  <text x="359" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="white">One-to-Many (1:N)</text>

  <rect x="260" y="82" width="72" height="36" rx="7" fill="white" stroke="#2196F3" stroke-width="1.5"/>
  <text x="296" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">👤 User</text>
  <text x="296" y="113" text-anchor="middle" font-size="9" fill="#555">_id: u1</text>

  <line x1="332" y1="95" x2="352" y2="80" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrRT)"/>
  <line x1="332" y1="100" x2="352" y2="100" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrRT)"/>
  <line x1="332" y1="105" x2="352" y2="120" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrRT)"/>

  <rect x="352" y="68" width="105" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="404" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">📦 Order 1</text>
  <rect x="352" y="97" width="105" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="404" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">📦 Order 2</text>
  <rect x="352" y="126" width="105" height="26" rx="5" fill="white" stroke="#2196F3" stroke-width="1"/>
  <text x="404" y="143" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">📦 Order 3</text>

  <text x="359" y="168" text-anchor="middle" font-size="10" fill="#555">Examples:</text>
  <text x="359" y="183" text-anchor="middle" font-size="10" fill="#1565c0">User → Orders</text>
  <text x="359" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">→ REFERENCE (orders)</text>

  <!-- MANY-TO-MANY -->
  <rect x="488" y="38" width="220" height="180" rx="10" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <rect x="488" y="38" width="220" height="28" rx="10" fill="#6A1B9A"/>
  <rect x="488" y="54" width="220" height="12" fill="#6A1B9A"/>
  <text x="598" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Many-to-Many (N:M)</text>

  <rect x="498" y="78" width="78" height="28" rx="6" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="537" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">🎓 Student 1</text>
  <rect x="498" y="112" width="78" height="28" rx="6" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="537" y="131" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">🎓 Student 2</text>

  <!-- Crossing arrows -->
  <line x1="576" y1="90" x2="614" y2="90" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrRT)"/>
  <line x1="576" y1="90" x2="614" y2="118" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrRT)"/>
  <line x1="576" y1="126" x2="614" y2="90" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrRT)"/>
  <line x1="576" y1="126" x2="614" y2="118" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrRT)"/>

  <rect x="614" y="78" width="82" height="28" rx="6" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="655" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">📚 Course A</text>
  <rect x="614" y="112" width="82" height="28" rx="6" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="655" y="131" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">📚 Course B</text>

  <text x="598" y="160" text-anchor="middle" font-size="10" fill="#555">Examples:</text>
  <text x="598" y="175" text-anchor="middle" font-size="10" fill="#6A1B9A">Students ↔ Courses</text>
  <text x="598" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">→ Array of References</text>
</svg>
