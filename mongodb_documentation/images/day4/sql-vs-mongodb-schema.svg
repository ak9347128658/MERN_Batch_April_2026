<svg viewBox="0 0 720 295" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrSM" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="720" height="295" fill="#fafafa" rx="14"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">SQL vs MongoDB — E-Commerce Schema</text>

  <!-- SQL Side -->
  <rect x="12" y="36" width="330" height="248" rx="12" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="177" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">SQL: 5 Tables + JOINs</text>

  <!-- SQL Tables -->
  <rect x="110" y="68" width="115" height="30" rx="6" fill="#FF9800"/>
  <text x="167" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">users table</text>

  <rect x="26" y="120" width="115" height="30" rx="6" fill="#FF9800"/>
  <text x="83" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="white">addresses table</text>

  <rect x="194" y="120" width="115" height="30" rx="6" fill="#FF9800"/>
  <text x="251" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="white">orders table</text>

  <rect x="26" y="185" width="115" height="30" rx="6" fill="#FF9800"/>
  <text x="83" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="white">products table</text>

  <rect x="194" y="185" width="130" height="30" rx="6" fill="#FF9800"/>
  <text x="259" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="white">order_items table</text>

  <!-- JOIN lines -->
  <line x1="140" y1="98" x2="83" y2="120" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrSM)"/>
  <text x="98" y="112" font-size="8" fill="#e65100">FK JOIN</text>
  <line x1="195" y1="98" x2="251" y2="120" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrSM)"/>
  <text x="218" y="112" font-size="8" fill="#e65100">FK JOIN</text>
  <line x1="251" y1="150" x2="259" y2="185" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrSM)"/>
  <text x="261" y="171" font-size="8" fill="#e65100">FK JOIN</text>
  <line x1="230" y1="185" x2="110" y2="215" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrSM)"/>
  <text x="155" y="206" font-size="8" fill="#e65100">FK JOIN</text>

  <text x="177" y="238" text-anchor="middle" font-size="10" fill="#bf360c" font-style="italic">Every query needs multiple JOINs</text>
  <text x="177" y="255" text-anchor="middle" font-size="10" fill="#bf360c" font-style="italic">Fixed schema — ALTER TABLE for changes</text>
  <text x="177" y="272" text-anchor="middle" font-size="10" fill="#bf360c" font-style="italic">Many round-trips to the database</text>

  <!-- VS -->
  <text x="360" y="168" text-anchor="middle" font-size="18" font-weight="bold" fill="#9e9e9e">vs</text>

  <!-- MongoDB Side -->
  <rect x="378" y="36" width="330" height="248" rx="12" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="543" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">MongoDB: 3 Collections</text>

  <!-- MongoDB Collections -->
  <rect x="418" y="68" width="225" height="50" rx="8" fill="#2E7D32"/>
  <text x="530" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">👤 users collection</text>
  <text x="530" y="106" text-anchor="middle" font-size="9" fill="#A5D6A7">+ addresses embedded inside</text>

  <rect x="418" y="140" width="225" height="50" rx="8" fill="#1565C0"/>
  <text x="530" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="white">📦 orders collection</text>
  <text x="530" y="178" text-anchor="middle" font-size="9" fill="#BBDEFB">+ order_items embedded inside</text>

  <rect x="418" y="210" width="225" height="35" rx="8" fill="#E65100"/>
  <text x="530" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🛒 products collection</text>

  <!-- Dotted reference lines -->
  <line x1="530" y1="118" x2="530" y2="140" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrSM)"/>
  <text x="540" y="132" font-size="8" fill="#2e7d32">userId ref</text>
  <line x1="530" y1="190" x2="530" y2="210" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrSM)"/>
  <text x="540" y="204" font-size="8" fill="#2e7d32">productId ref</text>

  <text x="543" y="260" text-anchor="middle" font-size="10" fill="#1b5e20" font-style="italic">Most queries need only 1 collection</text>
  <text x="543" y="277" text-anchor="middle" font-size="10" fill="#1b5e20" font-style="italic">Flexible schema — add fields anytime</text>
</svg>
