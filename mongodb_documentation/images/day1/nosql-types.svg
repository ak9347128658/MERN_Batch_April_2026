<svg viewBox="0 0 700 195" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="195" fill="#fafafa" rx="14"/>
  <text x="350" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Types of NoSQL Databases</text>

  <!-- Document Store -->
  <rect x="18" y="50" width="155" height="128" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="95" y="86" text-anchor="middle" font-size="28">📄</text>
  <text x="95" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Document Store</text>
  <text x="95" y="132" text-anchor="middle" font-size="11" fill="#555">Example: MongoDB</text>
  <text x="95" y="150" text-anchor="middle" font-size="10" fill="#777">Web apps &amp;</text>
  <text x="95" y="166" text-anchor="middle" font-size="10" fill="#777">general purpose</text>

  <!-- Key-Value Store -->
  <rect x="193" y="50" width="155" height="128" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <text x="270" y="86" text-anchor="middle" font-size="28">🔑</text>
  <text x="270" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Key-Value Store</text>
  <text x="270" y="132" text-anchor="middle" font-size="11" fill="#555">Example: Redis</text>
  <text x="270" y="150" text-anchor="middle" font-size="10" fill="#777">Caching &amp;</text>
  <text x="270" y="166" text-anchor="middle" font-size="10" fill="#777">sessions</text>

  <!-- Column Family -->
  <rect x="368" y="50" width="155" height="128" rx="10" fill="#fff8e1" stroke="#FFC107" stroke-width="2"/>
  <text x="445" y="86" text-anchor="middle" font-size="28">📊</text>
  <text x="445" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Column Family</text>
  <text x="445" y="132" text-anchor="middle" font-size="11" fill="#555">Example: Cassandra</text>
  <text x="445" y="150" text-anchor="middle" font-size="10" fill="#777">Analytics &amp;</text>
  <text x="445" y="166" text-anchor="middle" font-size="10" fill="#777">time-series</text>

  <!-- Graph Database -->
  <rect x="543" y="50" width="145" height="128" rx="10" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <text x="615" y="86" text-anchor="middle" font-size="28">🕸️</text>
  <text x="615" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Graph Database</text>
  <text x="615" y="132" text-anchor="middle" font-size="11" fill="#555">Example: Neo4j</text>
  <text x="615" y="150" text-anchor="middle" font-size="10" fill="#777">Social networks &amp;</text>
  <text x="615" y="166" text-anchor="middle" font-size="10" fill="#777">recommendations</text>
</svg>
