  <text x="36" y="305" text-anchor="middle" font-size="8" fill="#444">"Amit"</text>
  <text x="36" y="320" text-anchor="middle" font-size="8" fill="#666">age: 25</text>

  <rect x="72" y="272" width="62" height="58" rx="5" fill="white" stroke="#9FA8DA" stroke-width="1.5"/>
