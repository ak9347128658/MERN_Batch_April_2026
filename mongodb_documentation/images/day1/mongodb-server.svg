  <rect x="76" y="210" width="85" height="30" rx="6" fill="#5C6BC0"/>
  <text x="118" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">products</text>

  <rect x="148" y="210" width="80" height="30" rx="6" fill="#5C6BC0"/>
  <text x="188" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">orders</text>

