  <text x="244" y="305" text-anchor="middle" font-size="8" fill="#444">"Phone"</text>
  <text x="244" y="320" text-anchor="middle" font-size="8" fill="#666">₹15,000</text>

  <!-- Blog collections -->
  <line x1="338" y1="172" x2="330" y2="210" stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="382" y1="172" x2="390" y2="210" stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arrD)"/>

  <rect x="288" y="210" width="80" height="30" rx="6" fill="#5C6BC0"/>
  <text x="328" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">posts</text>

  <rect x="370" y="210" width="80" height="30" rx="6" fill="#5C6BC0"/>
  <text x="410" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">authors</text>

