  </defs>

  <rect width="720" height="380" fill="#f5f5f5" rx="14"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">MongoDB Server — The Big Picture</text>

  <!-- MongoDB Server -->
  <rect x="210" y="42" width="300" height="48" rx="12" fill="#1A237E"/>
