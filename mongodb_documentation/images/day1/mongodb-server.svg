  <text x="172" y="305" text-anchor="middle" font-size="8" fill="#444">"Laptop"</text>
  <text x="172" y="320" text-anchor="middle" font-size="8" fill="#666">₹50,000</text>

  <rect x="210" y="272" width="68" height="58" rx="5" fill="white" stroke="#9FA8DA" stroke-width="1.5"/>
