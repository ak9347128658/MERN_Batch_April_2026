  <line x1="578" y1="172" x2="555" y2="210" stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="626" y1="172" x2="640" y2="210" stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arrD)"/>

  <rect x="500" y="210" width="85" height="30" rx="6" fill="#5C6BC0"/>
  <text x="542" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">messages</text>

  <rect x="596" y="210" width="100" height="30" rx="6" fill="#5C6BC0"/>
  <text x="646" y="229" text-anchor="middle" font-size="10" font-weight="bold" fill="white">chat_rooms</text>

  <!-- Legend -->
  <rect x="460" y="272" width="248" height="92" rx="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="584" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <rect x="476" y="304" width="14" height="12" rx="3" fill="#1A237E"/>
  <text x="498" y="315" font-size="10" fill="#555">MongoDB Server</text>
  <rect x="476" y="322" width="14" height="12" rx="3" fill="#303F9F"/>
  <text x="498" y="333" font-size="10" fill="#555">Database</text>
  <rect x="476" y="340" width="14" height="12" rx="3" fill="#5C6BC0"/>
  <text x="498" y="351" font-size="10" fill="#555">Collection</text>
  <rect x="580" y="304" width="14" height="12" rx="3" fill="white" stroke="#9FA8DA" stroke-width="1"/>
  <text x="602" y="315" font-size="10" fill="#555">Document (📄)</text>
