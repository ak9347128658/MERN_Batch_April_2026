<svg viewBox="0 0 700 270" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrM" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#78909C"/>
    </marker>
  </defs>

  <rect width="700" height="270" fill="#fafafa" rx="14"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">SQL Table vs MongoDB Documents</text>

  <!-- SQL Side -->
  <rect x="15" y="44" width="295" height="210" rx="12" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="162" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">SQL: users table</text>

  <!-- SQL Table header -->
  <rect x="28" y="74" width="270" height="30" rx="5" fill="#FF9800"/>
  <text x="60" y="94" font-size="11" font-weight="bold" fill="white">id</text>
  <text x="95" y="94" font-size="11" font-weight="bold" fill="white">name</text>
  <text x="160" y="94" font-size="11" font-weight="bold" fill="white">email</text>
  <text x="250" y="94" font-size="11" font-weight="bold" fill="white">age</text>

  <!-- SQL Table rows -->
  <rect x="28" y="104" width="270" height="28" rx="0" fill="#fff8f0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="60" y="123" font-size="10" fill="#555">1</text>
  <text x="90" y="123" font-size="10" fill="#555">Amit</text>
  <text x="150" y="123" font-size="10" fill="#555">amit@mail.com</text>
  <text x="250" y="123" font-size="10" fill="#555">25</text>

  <rect x="28" y="132" width="270" height="28" rx="0" fill="#fff3e0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="60" y="151" font-size="10" fill="#555">2</text>
  <text x="90" y="151" font-size="10" fill="#555">Sara</text>
  <text x="150" y="151" font-size="10" fill="#555">sara@mail.com</text>
  <text x="250" y="151" font-size="10" fill="#555">30</text>

  <!-- Warning note -->
  <rect x="28" y="172" width="270" height="48" rx="6" fill="#FFCCBC" stroke="#FF7043" stroke-width="1"/>
  <text x="163" y="190" text-anchor="middle" font-size="10" fill="#BF360C" font-weight="bold">⚠️ Adding "phone" field?</text>
  <text x="163" y="207" text-anchor="middle" font-size="10" fill="#BF360C">ALTER TABLE users ADD phone VARCHAR;</text>
  <text x="163" y="222" text-anchor="middle" font-size="9" fill="#E64A19">Affects ALL rows in the table!</text>

  <!-- Arrow -->
  <line x1="312" y1="148" x2="388" y2="148" stroke="#78909C" stroke-width="2.5" marker-end="url(#arrM)"/>
  <text x="350" y="142" text-anchor="middle" font-size="9" fill="#607D8B">migrate</text>
  <text x="350" y="162" text-anchor="middle" font-size="9" fill="#607D8B">to</text>

  <!-- MongoDB Side -->
  <rect x="390" y="44" width="295" height="210" rx="12" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="537" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">MongoDB: users collection</text>

  <!-- Document 1 -->
  <rect x="403" y="74" width="130" height="90" rx="7" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="468" y="93" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">📄 Document 1</text>
  <text x="415" y="110" font-size="9" fill="#333">_id: ObjectId("...")</text>
  <text x="415" y="126" font-size="9" fill="#333">name: "Amit"</text>
  <text x="415" y="142" font-size="9" fill="#333">email: "amit@..."</text>
  <text x="415" y="158" font-size="9" fill="#333">age: 25</text>

  <!-- Document 2 -->
  <rect x="545" y="74" width="130" height="106" rx="7" fill="white" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="610" y="93" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">📄 Document 2</text>
  <text x="558" y="110" font-size="9" fill="#333">_id: ObjectId("...")</text>
  <text x="558" y="126" font-size="9" fill="#333">name: "Sara"</text>
  <text x="558" y="142" font-size="9" fill="#333">email: "sara@..."</text>
  <text x="558" y="158" font-size="9" fill="#333">age: 30</text>
  <text x="558" y="174" font-size="9" fill="#388E3C" font-weight="bold">phone: "+91..."</text>

  <!-- Success note -->
  <rect x="403" y="182" width="272" height="48" rx="6" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="539" y="200" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">✅ Adding "phone" to Sara only?</text>
  <text x="539" y="216" text-anchor="middle" font-size="10" fill="#1b5e20">Just insert it in Sara's document.</text>
  <text x="539" y="232" text-anchor="middle" font-size="9" fill="#2e7d32">No schema changes needed!</text>
</svg>
