<svg viewBox="0 0 700 265" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4CAF50"/>
    </marker>
  </defs>

  <rect width="700" height="265" fill="#fafafa" rx="14"/>
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">SQL vs MongoDB Architecture</text>

  <!-- SQL Side -->
  <rect x="15" y="44" width="305" height="208" rx="12" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="167" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">SQL Database</text>

  <rect x="88" y="80" width="160" height="36" rx="7" fill="#FF9800"/>
  <text x="168" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Table: users</text>

  <line x1="130" y1="116" x2="80" y2="157" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowO)"/>
  <line x1="205" y1="116" x2="255" y2="157" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowO)"/>
  <text x="88" y="143" font-size="10" fill="#e65100" font-weight="bold">JOIN</text>
  <text x="225" y="143" font-size="10" fill="#e65100" font-weight="bold">JOIN</text>

  <rect x="22" y="157" width="120" height="36" rx="7" fill="#FF9800"/>
  <text x="82" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Table: orders</text>

  <rect x="178" y="157" width="125" height="36" rx="7" fill="#FF9800"/>
  <text x="240" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Table: products</text>

  <text x="167" y="220" text-anchor="middle" font-size="10" fill="#bf360c">Fixed schema • Rigid structure</text>
  <text x="167" y="238" text-anchor="middle" font-size="10" fill="#bf360c">Need ALTER TABLE to add new fields</text>

  <!-- VS label -->
  <text x="350" y="152" text-anchor="middle" font-size="18" font-weight="bold" fill="#9e9e9e">vs</text>

  <!-- MongoDB Side -->
  <rect x="380" y="44" width="305" height="208" rx="12" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="532" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">MongoDB</text>

  <rect x="418" y="80" width="190" height="36" rx="7" fill="#4CAF50"/>
  <text x="513" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Collection: users</text>

  <line x1="472" y1="116" x2="447" y2="150" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="558" y1="116" x2="578" y2="150" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Document 1 -->
  <rect x="390" y="150" width="125" height="75" rx="6" fill="white" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="452" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">📄 Document</text>
  <text x="452" y="188" text-anchor="middle" font-size="9" fill="#333">name: "Amit"</text>
  <text x="452" y="204" text-anchor="middle" font-size="9" fill="#333">age: 25</text>
  <text x="452" y="220" text-anchor="middle" font-size="9" fill="#388E3C">orders: [...]</text>

  <!-- Document 2 -->
  <rect x="530" y="150" width="135" height="75" rx="6" fill="white" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="597" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">📄 Document</text>
  <text x="597" y="188" text-anchor="middle" font-size="9" fill="#333">name: "Sara"</text>
  <text x="597" y="204" text-anchor="middle" font-size="9" fill="#333">age: 30</text>
  <text x="597" y="220" text-anchor="middle" font-size="9" fill="#388E3C">phone: "+91..."</text>

  <text x="532" y="237" text-anchor="middle" font-size="10" fill="#1b5e20">Flexible schema • Embedded documents</text>
</svg>
