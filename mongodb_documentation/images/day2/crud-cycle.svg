<svg viewBox="0 0 500 290" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrCy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78909C"/>
    </marker>
  </defs>

  <rect width="500" height="290" fill="#fafafa" rx="14"/>
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">The CRUD Cycle</text>

  <!-- CREATE (top-left) -->
  <rect x="30" y="48" width="180" height="88" rx="12" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="120" y="80" text-anchor="middle" font-size="26">➕</text>
  <text x="120" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">CREATE</text>
  <text x="120" y="126" text-anchor="middle" font-size="10" fill="#555">insertOne / insertMany</text>

  <!-- READ (top-right) -->
  <rect x="290" y="48" width="180" height="88" rx="12" fill="#e3f2fd" stroke="#2196F3" stroke-width="2.5"/>
  <text x="380" y="80" text-anchor="middle" font-size="26">🔍</text>
  <text x="380" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">READ</text>
  <text x="380" y="126" text-anchor="middle" font-size="10" fill="#555">find / findOne</text>

  <!-- UPDATE (bottom-left) -->
  <rect x="30" y="185" width="180" height="88" rx="12" fill="#fff8e1" stroke="#FF9800" stroke-width="2.5"/>
  <text x="120" y="217" text-anchor="middle" font-size="26">✏️</text>
  <text x="120" y="243" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">UPDATE</text>
  <text x="120" y="263" text-anchor="middle" font-size="10" fill="#555">updateOne / updateMany</text>

  <!-- DELETE (bottom-right) -->
  <rect x="290" y="185" width="180" height="88" rx="12" fill="#ffebee" stroke="#f44336" stroke-width="2.5"/>
  <text x="380" y="217" text-anchor="middle" font-size="26">🗑️</text>
  <text x="380" y="243" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">DELETE</text>
  <text x="380" y="263" text-anchor="middle" font-size="10" fill="#555">deleteOne / deleteMany</text>

  <!-- Center badge -->
  <circle cx="250" cy="152" r="32" fill="#1A237E"/>
  <text x="250" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="white">EVERY</text>
  <text x="250" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="white">APP</text>

  <!-- Connecting arrows (clockwise: CREATE→READ→DELETE→UPDATE→CREATE) -->
  <line x1="210" y1="88" x2="288" y2="88" stroke="#78909C" stroke-width="2" marker-end="url(#arrCy)"/>
  <line x1="380" y1="136" x2="380" y2="183" stroke="#78909C" stroke-width="2" marker-end="url(#arrCy)"/>
  <line x1="290" y1="234" x2="212" y2="234" stroke="#78909C" stroke-width="2" marker-end="url(#arrCy)"/>
  <line x1="120" y1="183" x2="120" y2="136" stroke="#78909C" stroke-width="2" marker-end="url(#arrCy)"/>
</svg>
