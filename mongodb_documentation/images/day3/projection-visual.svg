<svg viewBox="0 0 700 245" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrPr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="700" height="245" fill="#fafafa" rx="14"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Projection — Choosing Which Fields to Return</text>

  <!-- Full document -->
  <rect x="12" y="40" width="220" height="190" rx="10" fill="white" stroke="#90A4AE" stroke-width="2"/>
  <rect x="12" y="40" width="220" height="30" rx="10" fill="#546E7A"/>
  <rect x="12" y="58" width="220" height="12" rx="0" fill="#546E7A"/>
  <text x="122" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Full Document</text>

  <text x="28" y="92"  font-size="10" fill="#333">_id:      ObjectId("...")</text>
  <text x="28" y="110" font-size="10" fill="#333">name:     "iPhone 15"</text>
  <text x="28" y="128" font-size="10" fill="#333">brand:    "Apple"</text>
  <text x="28" y="146" font-size="10" fill="#333">price:    79999</text>
  <text x="28" y="164" font-size="10" fill="#aaa">category: "Phones"</text>
  <text x="28" y="182" font-size="10" fill="#aaa">stock:    50</text>
  <text x="28" y="200" font-size="10" fill="#aaa">rating:   4.6</text>
  <text x="28" y="218" font-size="10" fill="#aaa">releaseYear: 2023</text>

  <!-- Include arrow -->
  <line x1="232" y1="105" x2="272" y2="105" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrPr)"/>
  <text x="252" y="98" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold">{ name:1,</text>
  <text x="252" y="115" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold"> brand:1,</text>
  <text x="252" y="130" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold"> price:1 }</text>

  <!-- Include result -->
  <rect x="272" y="40" width="185" height="130" rx="10" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="272" y="40" width="185" height="30" rx="10" fill="#2E7D32"/>
  <rect x="272" y="58" width="185" height="12" rx="0" fill="#2E7D32"/>
  <text x="364" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Include (1)</text>
  <text x="288" y="92" font-size="10" fill="#aaa">_id:   ObjectId("...") ← always</text>
  <text x="288" y="112" font-size="10" fill="#2e7d32" font-weight="bold">name:  "iPhone 15" ✓</text>
  <text x="288" y="130" font-size="10" fill="#2e7d32" font-weight="bold">brand: "Apple"    ✓</text>
  <text x="288" y="148" font-size="10" fill="#2e7d32" font-weight="bold">price: 79999      ✓</text>

  <!-- Exclude arrow -->
  <line x1="232" y1="185" x2="272" y2="185" stroke="#f44336" stroke-width="2.5" marker-end="url(#arrPr)"/>
  <text x="252" y="178" text-anchor="middle" font-size="9" fill="#c62828" font-weight="bold">{ stock:0,</text>
  <text x="252" y="195" text-anchor="middle" font-size="9" fill="#c62828" font-weight="bold"> rating:0 }</text>

  <!-- Exclude result -->
  <rect x="272" y="178" width="185" height="58" rx="10" fill="white" stroke="#f44336" stroke-width="2"/>
  <rect x="272" y="178" width="185" height="22" rx="10" fill="#C62828"/>
  <rect x="272" y="190" width="185" height="10" rx="0" fill="#C62828"/>
  <text x="364" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Exclude (0)</text>
  <text x="288" y="215" font-size="10" fill="#555">All fields returned</text>
  <text x="288" y="230" font-size="10" fill="#c62828">except stock &amp; rating ✗</text>

  <!-- Note -->
  <rect x="468" y="40" width="220" height="190" rx="10" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1.5"/>
  <text x="578" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">⚠️ Rules</text>
  <text x="578" y="85"  text-anchor="middle" font-size="10" fill="#555">Can't MIX include</text>
  <text x="578" y="100" text-anchor="middle" font-size="10" fill="#555">and exclude in</text>
  <text x="578" y="115" text-anchor="middle" font-size="10" fill="#555">one projection.</text>
  <text x="578" y="138" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">WRONG:</text>
  <text x="578" y="154" text-anchor="middle" font-size="10" fill="#c62828">{ name:1, stock:0 }</text>
  <text x="578" y="177" text-anchor="middle" font-size="10" fill="#333">Exception: _id can</text>
  <text x="578" y="192" text-anchor="middle" font-size="10" fill="#333">always be excluded</text>
  <text x="578" y="207" text-anchor="middle" font-size="10" fill="#2e7d32">{ name:1, _id:0 } ✓</text>
  <text x="578" y="222" text-anchor="middle" font-size="10" fill="#555">This is always OK</text>
</svg>
