<svg viewBox="0 0 620 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="620" height="360" fill="#fafafa" rx="14"/>
  <text x="310" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">How MongoDB Processes a Query</text>

  <!-- Step 1: All Documents -->
  <rect x="160" y="38" width="300" height="42" rx="9" fill="#546E7A"/>
  <text x="310" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📚 All 12 Documents</text>
  <line x1="310" y1="80" x2="310" y2="100" stroke="#546E7A" stroke-width="2" marker-end="url(#arrF)"/>

  <!-- Filter label 1 -->
  <text x="420" y="94" font-size="10" fill="#4CAF50" font-weight="bold">category: "Phones"</text>

  <!-- Step 2: Category filter -->
  <rect x="185" y="100" width="250" height="38" rx="9" fill="#2E7D32"/>
  <text x="310" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔍 4 Phone Documents</text>
  <line x1="310" y1="138" x2="310" y2="158" stroke="#546E7A" stroke-width="2" marker-end="url(#arrF)"/>

  <!-- Filter label 2 -->
  <text x="420" y="152" font-size="10" fill="#2196F3" font-weight="bold">price: { $gte: 50000, $lte: 70000 }</text>

  <!-- Step 3: Price filter -->
  <rect x="200" y="158" width="220" height="38" rx="9" fill="#1565C0"/>
  <text x="310" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="white">💰 3 Documents</text>
  <line x1="310" y1="196" x2="310" y2="216" stroke="#546E7A" stroke-width="2" marker-end="url(#arrF)"/>

  <!-- Filter label 3 -->
  <text x="420" y="210" font-size="10" fill="#FF9800" font-weight="bold">sort: { rating: -1 }</text>

  <!-- Step 4: Sort -->
  <rect x="215" y="216" width="190" height="38" rx="9" fill="#E65100"/>
  <text x="310" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📊 Sorted by Rating</text>
  <line x1="310" y1="254" x2="310" y2="274" stroke="#546E7A" stroke-width="2" marker-end="url(#arrF)"/>

  <!-- Filter label 4 -->
  <text x="420" y="268" font-size="10" fill="#9C27B0" font-weight="bold">limit: 2</text>

  <!-- Step 5: Limit -->
  <rect x="225" y="274" width="170" height="38" rx="9" fill="#6A1B9A"/>
  <text x="310" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✂️ Top 2 Results</text>
  <line x1="310" y1="312" x2="310" y2="332" stroke="#546E7A" stroke-width="2" marker-end="url(#arrF)"/>

  <!-- Filter label 5 -->
  <text x="420" y="326" font-size="10" fill="#00796B" font-weight="bold">projection: { name, price, rating }</text>

  <!-- Step 6: Final output -->
  <rect x="185" y="332" width="250" height="20" rx="7" fill="#004D40"/>
  <text x="310" y="346" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✅ Final Output</text>

  <!-- Funnel width guide lines (decorative) -->
  <line x1="160" y1="38"  x2="160" y2="80"  stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="38"  x2="460" y2="80"  stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="185" y1="332" x2="160" y2="80"  stroke="#ccc" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="435" y1="332" x2="460" y2="80"  stroke="#ccc" stroke-width="1" stroke-dasharray="2,4"/>
</svg>
