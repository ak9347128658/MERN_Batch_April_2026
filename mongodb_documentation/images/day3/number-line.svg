<svg viewBox="0 0 660 170" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="660" height="170" fill="#fafafa" rx="14"/>
  <text x="330" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Comparison Operators on a Number Line</text>

  <!-- Number line axis -->
  <line x1="40" y1="90" x2="620" y2="90" stroke="#546E7A" stroke-width="2.5"/>
  <!-- Arrow left -->
  <polygon points="30,90 44,84 44,96" fill="#546E7A"/>
  <!-- Arrow right -->
  <polygon points="630,90 616,84 616,96" fill="#546E7A"/>

  <!-- Center value: 50000 -->
  <line x1="330" y1="80" x2="330" y2="100" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="330" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">50,000</text>
  <text x="330" y="132" text-anchor="middle" font-size="10" fill="#555">(your value)</text>

  <!-- $lt region (left of center, open) -->
  <rect x="42" y="55" width="278" height="16" rx="4" fill="#FF9800" opacity="0.3"/>
  <line x1="42" y1="55" x2="42" y2="71" stroke="#FF9800" stroke-width="0"/>
  <text x="181" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">$lt  (price &lt; 50000)</text>

  <!-- $lte region (left of center, closed) — slightly overlapping center -->
  <rect x="42" y="75" width="293" height="8" rx="3" fill="#FF9800" opacity="0.15"/>
  <text x="160" y="52" text-anchor="middle" font-size="10" fill="#BF360C">◄── $lte (price ≤ 50000) ──|</text>

  <!-- $gt region (right of center, open) -->
  <rect x="335" y="55" width="278" height="16" rx="4" fill="#4CAF50" opacity="0.3"/>
  <text x="474" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">$gt  (price &gt; 50000)</text>

  <!-- $gte region (right, closed) -->
  <rect x="328" y="75" width="285" height="8" rx="3" fill="#4CAF50" opacity="0.15"/>
  <text x="490" y="52" text-anchor="middle" font-size="10" fill="#1b5e20">|── $gte (price ≥ 50000) ──►</text>

  <!-- $eq dot -->
  <circle cx="330" cy="90" r="7" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="330" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">$eq</text>

  <!-- $ne label (everything except center) -->
  <text x="100" y="152" text-anchor="middle" font-size="10" fill="#6A1B9A">$ne ←</text>
  <text x="560" y="152" text-anchor="middle" font-size="10" fill="#6A1B9A">→ $ne</text>
  <text x="330" y="162" text-anchor="middle" font-size="9" fill="#888">($ne = everything except this point)</text>
</svg>
