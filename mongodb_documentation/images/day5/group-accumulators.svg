<svg viewBox="0 0 730 255" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="730" height="255" fill="#fafafa" rx="14"/>
  <text x="365" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">$group Accumulators</text>

  <!-- Root -->
  <rect x="265" y="36" width="200" height="34" rx="9" fill="#1565C0"/>
  <text x="365" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ $group Accumulators</text>

  <!-- Row 1: $sum, $avg, $min — centers 90, 260, 430 -->
  <!-- $sum -->
  <line x1="365" y1="70" x2="90" y2="95" stroke="#1976D2" stroke-width="1.5"/>
  <rect x="18" y="95" width="145" height="62" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="90" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">$sum</text>
  <text x="90" y="133" text-anchor="middle" font-size="9" fill="#555">Add up all values</text>
  <text x="90" y="148" text-anchor="middle" font-size="9" fill="#388E3C">SQL: SUM()</text>

  <!-- $avg -->
  <line x1="365" y1="70" x2="260" y2="95" stroke="#1976D2" stroke-width="1.5"/>
  <rect x="188" y="95" width="145" height="62" rx="8" fill="#e3f2fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="260" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">$avg</text>
  <text x="260" y="133" text-anchor="middle" font-size="9" fill="#555">Calculate average</text>
  <text x="260" y="148" text-anchor="middle" font-size="9" fill="#1976D2">SQL: AVG()</text>

  <!-- $min -->
  <line x1="365" y1="70" x2="430" y2="95" stroke="#1976D2" stroke-width="1.5"/>
  <rect x="358" y="95" width="145" height="62" rx="8" fill="#fff8e1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="430" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">$min</text>
  <text x="430" y="133" text-anchor="middle" font-size="9" fill="#555">Find minimum value</text>
  <text x="430" y="148" text-anchor="middle" font-size="9" fill="#F57C00">SQL: MIN()</text>

  <!-- $max -->
  <line x1="365" y1="70" x2="600" y2="95" stroke="#1976D2" stroke-width="1.5"/>
  <rect x="528" y="95" width="145" height="62" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
  <text x="600" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">$max</text>
  <text x="600" y="133" text-anchor="middle" font-size="9" fill="#555">Find maximum value</text>
  <text x="600" y="148" text-anchor="middle" font-size="9" fill="#D32F2F">SQL: MAX()</text>

  <!-- Row 2: $count, $push, $addToSet, $first/$last -->
  <!-- $count / sum:1 -->
  <line x1="365" y1="70" x2="90" y2="175" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="18" y="175" width="145" height="68" rx="8" fill="#f3e5f5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="90" y="197" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">$sum: 1</text>
  <text x="90" y="213" text-anchor="middle" font-size="9" fill="#555">Count documents</text>
  <text x="90" y="228" text-anchor="middle" font-size="9" fill="#7B1FA2">SQL: COUNT(*)</text>

  <!-- $push -->
  <line x1="365" y1="70" x2="260" y2="175" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="188" y="175" width="145" height="68" rx="8" fill="#e0f2f1" stroke="#009688" stroke-width="1.5"/>
  <text x="260" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#004D40">$push</text>
  <text x="260" y="213" text-anchor="middle" font-size="9" fill="#555">Collect into array</text>
  <text x="260" y="228" text-anchor="middle" font-size="9" fill="#00695C">SQL: GROUP_CONCAT</text>

  <!-- $addToSet -->
  <line x1="365" y1="70" x2="430" y2="175" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="358" y="175" width="145" height="68" rx="8" fill="#e8eaf6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="430" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">$addToSet</text>
  <text x="430" y="213" text-anchor="middle" font-size="9" fill="#555">Collect unique values</text>
  <text x="430" y="228" text-anchor="middle" font-size="9" fill="#3949AB">no duplicates</text>

  <!-- $first / $last -->
  <line x1="365" y1="70" x2="600" y2="175" stroke="#1976D2" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="528" y="175" width="145" height="68" rx="8" fill="#fbe9e7" stroke="#FF5722" stroke-width="1.5"/>
  <text x="600" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">$first / $last</text>
  <text x="600" y="213" text-anchor="middle" font-size="9" fill="#555">First or last value</text>
  <text x="600" y="228" text-anchor="middle" font-size="9" fill="#E64A19">in the group</text>
</svg>
