<svg viewBox="0 0 700 245" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrLK" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9C27B0"/>
    </marker>
  </defs>

  <rect width="700" height="245" fill="#fafafa" rx="14"/>
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">$lookup — Joining Collections (like SQL LEFT JOIN)</text>

  <!-- users collection -->
  <rect x="12" y="36" width="225" height="198" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <rect x="12" y="36" width="225" height="28" rx="10" fill="#1565C0"/>
  <rect x="12" y="52" width="225" height="12" fill="#1565C0"/>
  <text x="124" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👤 users collection</text>

  <rect x="24" y="76" width="200" height="50" rx="8" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="38" y="96"  font-size="10" font-weight="bold" fill="#1565c0">_id: ObjectId("e1")</text>
  <text x="38" y="112" font-size="10" fill="#555">name: "Amit Sharma"</text>

  <rect x="24" y="136" width="200" height="50" rx="8" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="38" y="156" font-size="10" font-weight="bold" fill="#1565c0">_id: ObjectId("e2")</text>
  <text x="38" y="172" font-size="10" fill="#555">name: "Priya Singh"</text>

  <text x="124" y="208" text-anchor="middle" font-size="9" fill="#1565c0" font-style="italic">localField: "_id"</text>

  <!-- $lookup stage center -->
  <rect x="260" y="100" width="130" height="50" rx="9" fill="#4A148C"/>
  <text x="325" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">$lookup</text>
  <text x="325" y="134" text-anchor="middle" font-size="9" fill="#CE93D8">foreignField:</text>
  <text x="325" y="146" text-anchor="middle" font-size="9" fill="#CE93D8">"userId"</text>

  <!-- userOrders collection -->
  <rect x="422" y="36" width="265" height="198" rx="10" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <rect x="422" y="36" width="265" height="28" rx="10" fill="#6A1B9A"/>
  <rect x="422" y="52" width="265" height="12" fill="#6A1B9A"/>
  <text x="554" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📦 userOrders collection</text>

  <rect x="434" y="76" width="240" height="36" rx="6" fill="white" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="448" y="95"  font-size="9" fill="#555">iPhone 15   ← <tspan font-weight="bold" fill="#6A1B9A">userId: "e1"</tspan></text>

  <rect x="434" y="118" width="240" height="36" rx="6" fill="white" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="448" y="137" font-size="9" fill="#555">AirPods Pro ← <tspan font-weight="bold" fill="#6A1B9A">userId: "e1"</tspan></text>

  <rect x="434" y="160" width="240" height="36" rx="6" fill="white" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="448" y="179" font-size="9" fill="#555">MacBook Air ← <tspan font-weight="bold" fill="#6A1B9A">userId: "e2"</tspan></text>

  <text x="554" y="210" text-anchor="middle" font-size="9" fill="#6A1B9A" font-style="italic">as: "orders" (array added to each user)</text>

  <!-- Lookup arrows: Amit (e1) → iPhone, AirPods -->
  <line x1="224" y1="96" x2="260" y2="120" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="260" y1="128" x2="394" y2="95" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrLK)"/>
  <line x1="260" y1="128" x2="394" y2="137" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrLK)"/>

  <!-- Lookup arrows: Priya (e2) → MacBook -->
  <line x1="224" y1="160" x2="260" y2="145" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="260" y1="137" x2="394" y2="179" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arrLK)"/>

  <!-- SQL equiv bar -->
  <rect x="12" y="232" width="676" height="8" rx="4" fill="transparent"/>
  <text x="350" y="240" text-anchor="middle" font-size="10" fill="#555" font-style="italic">SQL equivalent: SELECT u.*, o.* FROM users u LEFT JOIN userOrders o ON u._id = o.userId</text>
</svg>
