<svg viewBox="0 0 720 135" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrPF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="720" height="135" fill="#fafafa" rx="14"/>
  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Aggregation Pipeline — Assembly Line</text>

  <!-- Raw Data -->
  <rect x="10" y="38" width="98" height="62" rx="9" fill="#37474F"/>
  <text x="59" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="white">📚 Raw</text>
  <text x="59" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Data</text>
  <text x="59" y="94" text-anchor="middle" font-size="9" fill="#90A4AE">All documents</text>
  <line x1="108" y1="69" x2="126" y2="69" stroke="#546E7A" stroke-width="2" marker-end="url(#arrPF)"/>

  <!-- $match -->
  <rect x="126" y="38" width="98" height="62" rx="9" fill="#2E7D32"/>
  <text x="175" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="white">$match</text>
  <text x="175" y="78" text-anchor="middle" font-size="9" fill="#A5D6A7">Filter docs</text>
  <text x="175" y="92" text-anchor="middle" font-size="9" fill="#A5D6A7">like WHERE</text>
  <line x1="224" y1="69" x2="242" y2="69" stroke="#546E7A" stroke-width="2" marker-end="url(#arrPF)"/>

  <!-- $group -->
  <rect x="242" y="38" width="98" height="62" rx="9" fill="#1565C0"/>
  <text x="291" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="white">$group</text>
  <text x="291" y="78" text-anchor="middle" font-size="9" fill="#BBDEFB">Aggregate</text>
  <text x="291" y="92" text-anchor="middle" font-size="9" fill="#BBDEFB">sum/avg/count</text>
  <line x1="340" y1="69" x2="358" y2="69" stroke="#546E7A" stroke-width="2" marker-end="url(#arrPF)"/>

  <!-- $sort -->
  <rect x="358" y="38" width="98" height="62" rx="9" fill="#E65100"/>
  <text x="407" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="white">$sort</text>
  <text x="407" y="78" text-anchor="middle" font-size="9" fill="#FFCCBC">Order results</text>
  <text x="407" y="92" text-anchor="middle" font-size="9" fill="#FFCCBC">1 or -1</text>
  <line x1="456" y1="69" x2="474" y2="69" stroke="#546E7A" stroke-width="2" marker-end="url(#arrPF)"/>

  <!-- $project -->
  <rect x="474" y="38" width="98" height="62" rx="9" fill="#6A1B9A"/>
  <text x="523" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="white">$project</text>
  <text x="523" y="78" text-anchor="middle" font-size="9" fill="#E1BEE7">Reshape</text>
  <text x="523" y="92" text-anchor="middle" font-size="9" fill="#E1BEE7">rename fields</text>
  <line x1="572" y1="69" x2="590" y2="69" stroke="#546E7A" stroke-width="2" marker-end="url(#arrPF)"/>

  <!-- Final Results -->
  <rect x="590" y="38" width="118" height="62" rx="9" fill="#1A237E"/>
  <text x="649" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅ Final</text>
  <text x="649" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Results</text>
  <text x="649" y="94" text-anchor="middle" font-size="9" fill="#90CAF9">Analytics output</text>

  <!-- Labels below arrows -->
  <text x="117" y="115" text-anchor="middle" font-size="8" fill="#555">reduce</text>
  <text x="233" y="115" text-anchor="middle" font-size="8" fill="#555">calculate</text>
  <text x="349" y="115" text-anchor="middle" font-size="8" fill="#555">order</text>
  <text x="465" y="115" text-anchor="middle" font-size="8" fill="#555">transform</text>
  <text x="581" y="115" text-anchor="middle" font-size="8" fill="#555">done</text>
</svg>
