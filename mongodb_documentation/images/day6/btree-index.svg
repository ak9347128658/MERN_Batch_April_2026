<svg viewBox="0 0 700 290" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrBT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrBT2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9C27B0"/>
    </marker>
  </defs>

  <rect width="700" height="290" fill="#fafafa" rx="14"/>
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">How Indexes Work — B-Tree Structure</text>

  <!-- Collection (left, unsorted) -->
  <rect x="10" y="36" width="250" height="240" rx="10" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="135" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">📦 Collection (Unsorted)</text>

  <rect x="22" y="66" width="224" height="32" rx="6" fill="white" stroke="#FFB74D" stroke-width="1"/>
  <text x="134" y="81" text-anchor="middle" font-size="10" fill="#555">name: "iPhone"  price: <tspan fill="#e65100" font-weight="bold">79,999</tspan></text>
  <text x="28" y="94" font-size="8" fill="#aaa">Doc 1</text>

  <rect x="22" y="106" width="224" height="32" rx="6" fill="white" stroke="#FFB74D" stroke-width="1"/>
  <text x="134" y="121" text-anchor="middle" font-size="10" fill="#555">name: "Galaxy"  price: <tspan fill="#e65100" font-weight="bold">69,999</tspan></text>
  <text x="28" y="134" font-size="8" fill="#aaa">Doc 2</text>

  <rect x="22" y="146" width="224" height="32" rx="6" fill="white" stroke="#FFB74D" stroke-width="1"/>
  <text x="134" y="161" text-anchor="middle" font-size="10" fill="#555">name: "Pixel"    price: <tspan fill="#e65100" font-weight="bold">52,999</tspan></text>
  <text x="28" y="174" font-size="8" fill="#aaa">Doc 3</text>

  <rect x="22" y="186" width="224" height="32" rx="6" fill="white" stroke="#FFB74D" stroke-width="1"/>
  <text x="134" y="201" text-anchor="middle" font-size="10" fill="#555">name: "MacBook"  price: <tspan fill="#e65100" font-weight="bold">114,999</tspan></text>
  <text x="28" y="214" font-size="8" fill="#aaa">Doc 4</text>

  <rect x="22" y="226" width="224" height="32" rx="6" fill="white" stroke="#FFB74D" stroke-width="1"/>
  <text x="134" y="241" text-anchor="middle" font-size="10" fill="#555">name: "AirPods"  price: <tspan fill="#e65100" font-weight="bold">24,999</tspan></text>
  <text x="28" y="254" font-size="8" fill="#aaa">Doc 5</text>

  <text x="135" y="272" text-anchor="middle" font-size="9" fill="#e65100" font-style="italic">Prices are in random order</text>

  <!-- Index (right, sorted B-tree) -->
  <rect x="440" y="36" width="250" height="240" rx="10" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <text x="565" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">📑 Index on 'price' (B-tree)</text>
  <text x="565" y="70" text-anchor="middle" font-size="9" fill="#1976D2">Sorted — fast binary search</text>

  <rect x="452" y="76" width="224" height="30" rx="6" fill="#1565C0"/>
  <text x="564" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="white">24,999 → Doc 5 (AirPods)</text>

  <rect x="452" y="112" width="224" height="30" rx="6" fill="#1976D2" opacity="0.8"/>
  <text x="564" y="131" text-anchor="middle" font-size="10" font-weight="bold" fill="white">52,999 → Doc 3 (Pixel)</text>

  <rect x="452" y="148" width="224" height="30" rx="6" fill="#1976D2" opacity="0.6"/>
  <text x="564" y="167" text-anchor="middle" font-size="10" font-weight="bold" fill="white">69,999 → Doc 2 (Galaxy) ★</text>

  <rect x="452" y="184" width="224" height="30" rx="6" fill="#1976D2" opacity="0.4"/>
  <text x="564" y="203" text-anchor="middle" font-size="10" fill="white">79,999 → Doc 1 (iPhone)</text>

  <rect x="452" y="220" width="224" height="30" rx="6" fill="#1976D2" opacity="0.2"/>
  <text x="564" y="239" text-anchor="middle" font-size="10" fill="#333">114,999 → Doc 4 (MacBook)</text>

  <!-- Connecting arrow from index to collection (69,999 → Doc 2) -->
  <line x1="440" y1="163" x2="260" y2="122" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrBT2)"/>

  <!-- Query label in center -->
  <rect x="270" y="130" width="160" height="38" rx="8" fill="#4A148C"/>
  <text x="350" y="146" text-anchor="middle" font-size="10" font-weight="bold" fill="white">find({price: 69999})</text>
  <text x="350" y="161" text-anchor="middle" font-size="9" fill="#CE93D8">Direct lookup → Doc 2</text>
</svg>
