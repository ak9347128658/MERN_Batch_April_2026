<svg viewBox="0 0 720 215" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrCS" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c62828"/>
    </marker>
    <marker id="arrIS" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="720" height="215" fill="#fafafa" rx="14"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Index Scan vs Collection Scan</text>

  <!-- COLLSCAN panel -->
  <rect x="10" y="36" width="338" height="168" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <rect x="10" y="36" width="338" height="28" rx="10" fill="#C62828"/>
  <rect x="10" y="52" width="338" height="12" fill="#C62828"/>
  <text x="179" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">❌ Without Index (COLLSCAN)</text>

  <!-- Docs scanned one by one -->
  <rect x="22" y="75" width="52" height="36" rx="6" fill="white" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="48" y="91" text-anchor="middle" font-size="9" fill="#c62828">Doc 1</text>
  <text x="48" y="104" text-anchor="middle" font-size="11">❌</text>

  <line x1="74" y1="93" x2="88" y2="93" stroke="#c62828" stroke-width="2" marker-end="url(#arrCS)"/>

  <rect x="88" y="75" width="52" height="36" rx="6" fill="white" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="114" y="91" text-anchor="middle" font-size="9" fill="#c62828">Doc 2</text>
  <text x="114" y="104" text-anchor="middle" font-size="11">❌</text>

  <line x1="140" y1="93" x2="154" y2="93" stroke="#c62828" stroke-width="2" marker-end="url(#arrCS)"/>

  <rect x="154" y="75" width="52" height="36" rx="6" fill="white" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="180" y="91" text-anchor="middle" font-size="9" fill="#c62828">Doc 3</text>
  <text x="180" y="104" text-anchor="middle" font-size="11">❌</text>

  <line x1="206" y1="93" x2="220" y2="93" stroke="#c62828" stroke-width="2" marker-end="url(#arrCS)"/>

  <rect x="220" y="75" width="62" height="36" rx="6" fill="#FFCDD2" stroke="#f44336" stroke-width="2"/>
  <text x="251" y="91" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="bold">Doc 4</text>
  <text x="251" y="104" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">✅ Found!</text>

  <line x1="282" y1="93" x2="296" y2="93" stroke="#c62828" stroke-width="2" marker-end="url(#arrCS)"/>

  <rect x="296" y="75" width="42" height="36" rx="6" fill="white" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="317" y="91" text-anchor="middle" font-size="9" fill="#c62828">Doc 5</text>
  <text x="317" y="104" text-anchor="middle" font-size="11">❌</text>

  <text x="179" y="138" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Scans ALL 10,000 documents</text>
  <rect x="28" y="148" width="290" height="46" rx="7" fill="#FFCDD2"/>
  <text x="179" y="164" text-anchor="middle" font-size="11" fill="#B71C1C" font-weight="bold">executionTimeMillis: ~15ms</text>
  <text x="179" y="180" text-anchor="middle" font-size="10" fill="#C62828">totalDocsExamined: 10,000</text>
  <text x="179" y="193" text-anchor="middle" font-size="10" fill="#C62828">stage: "COLLSCAN"</text>

  <!-- VS -->
  <text x="360" y="132" text-anchor="middle" font-size="16" font-weight="bold" fill="#9e9e9e">vs</text>

  <!-- IXSCAN panel -->
  <rect x="372" y="36" width="336" height="168" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <rect x="372" y="36" width="336" height="28" rx="10" fill="#2E7D32"/>
  <rect x="372" y="52" width="336" height="12" fill="#2E7D32"/>
  <text x="540" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✅ With Index (IXSCAN)</text>

  <!-- Index box -->
  <rect x="385" y="72" width="160" height="50" rx="8" fill="#1565C0"/>
  <text x="465" y="92" text-anchor="middle" font-size="10" font-weight="bold" fill="white">📑 Index on 'email'</text>
  <text x="465" y="108" text-anchor="middle" font-size="9" fill="#BBDEFB">emp5000 → Doc 4</text>

  <!-- Direct arrow to result -->
  <line x1="545" y1="97" x2="570" y2="97" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrIS)"/>

  <rect x="570" y="72" width="120" height="50" rx="8" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
  <text x="630" y="92" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Doc 4</text>
  <text x="630" y="108" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">✅ Found!</text>

  <text x="540" y="138" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">Jumps DIRECTLY to the document</text>
  <rect x="385" y="148" width="310" height="46" rx="7" fill="#C8E6C9"/>
  <text x="540" y="164" text-anchor="middle" font-size="11" fill="#1B5E20" font-weight="bold">executionTimeMillis: ~1ms</text>
  <text x="540" y="180" text-anchor="middle" font-size="10" fill="#2e7d32">totalDocsExamined: 1</text>
  <text x="540" y="193" text-anchor="middle" font-size="10" fill="#2e7d32">stage: "IXSCAN"</text>
</svg>
