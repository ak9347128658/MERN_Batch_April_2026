<svg viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="400" fill="#f8fafc" rx="12"/>
  <text x="390" y="28" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">HTTP Methods — CRUD Operations</text>

  <!-- Header row -->
  <rect x="20" y="44" width="740" height="30" rx="6" fill="#1e293b"/>
  <text x="90" y="63" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">METHOD</text>
  <text x="220" y="63" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">CRUD</text>
  <text x="340" y="63" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">ENDPOINT</text>
  <text x="520" y="63" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">WHAT IT DOES</text>
  <text x="700" y="63" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">STATUS</text>

  <!-- GET row -->
  <rect x="20" y="80" width="740" height="60" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <rect x="28" y="90" width="120" height="24" rx="4" fill="#22c55e"/>
  <text x="88" y="106" text-anchor="middle" fill="white" font-size="14" font-weight="bold">GET</text>
  <rect x="168" y="90" width="90" height="24" rx="4" fill="#bbf7d0"/>
  <text x="213" y="106" text-anchor="middle" fill="#14532d" font-size="12" font-weight="bold">READ</text>
  <text x="330" y="101" fill="#166534" font-size="11" font-family="monospace">GET /todos</text>
  <text x="330" y="117" fill="#166534" font-size="11" font-family="monospace">GET /todos/:id</text>
  <text x="460" y="101" fill="#374151" font-size="11">Fetch all todos</text>
  <text x="460" y="117" fill="#374151" font-size="11">Fetch one todo by ID</text>
  <rect x="656" y="90" width="90" height="24" rx="4" fill="#22c55e"/>
  <text x="701" y="106" text-anchor="middle" fill="white" font-size="11" font-weight="bold">200 OK</text>

  <!-- POST row -->
  <rect x="20" y="146" width="740" height="60" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="28" y="156" width="120" height="24" rx="4" fill="#3b82f6"/>
  <text x="88" y="172" text-anchor="middle" fill="white" font-size="14" font-weight="bold">POST</text>
  <rect x="168" y="156" width="90" height="24" rx="4" fill="#bfdbfe"/>
  <text x="213" y="172" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">CREATE</text>
  <text x="330" y="167" fill="#1d4ed8" font-size="11" font-family="monospace">POST /todos</text>
  <text x="330" y="183" fill="#1d4ed8" font-size="11" font-family="monospace">body: {"title":"Buy milk"}</text>
  <text x="460" y="167" fill="#374151" font-size="11">Create a new todo</text>
  <text x="460" y="183" fill="#374151" font-size="11">Body = payload sent</text>
  <rect x="656" y="156" width="90" height="24" rx="4" fill="#22c55e"/>
  <text x="701" y="172" text-anchor="middle" fill="white" font-size="11" font-weight="bold">201 Created</text>

  <!-- PUT row -->
  <rect x="20" y="212" width="740" height="60" rx="4" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <rect x="28" y="222" width="120" height="24" rx="4" fill="#eab308"/>
  <text x="88" y="238" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PUT</text>
  <rect x="168" y="222" width="90" height="24" rx="4" fill="#fef08a"/>
  <text x="213" y="238" text-anchor="middle" fill="#713f12" font-size="12" font-weight="bold">UPDATE</text>
  <text x="330" y="233" fill="#854d0e" font-size="11" font-family="monospace">PUT /todos/:id</text>
  <text x="330" y="249" fill="#854d0e" font-size="11" font-family="monospace">body: {"title":"Buy eggs"}</text>
  <text x="460" y="233" fill="#374151" font-size="11">Replace a whole todo</text>
  <text x="460" y="249" fill="#374151" font-size="11">Needs the full object in body</text>
  <rect x="656" y="222" width="90" height="24" rx="4" fill="#22c55e"/>
  <text x="701" y="238" text-anchor="middle" fill="white" font-size="11" font-weight="bold">200 OK</text>

  <!-- PATCH row -->
  <rect x="20" y="278" width="740" height="60" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <rect x="28" y="288" width="120" height="24" rx="4" fill="#f97316"/>
  <text x="88" y="304" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PATCH</text>
  <rect x="168" y="288" width="90" height="24" rx="4" fill="#fed7aa"/>
  <text x="213" y="304" text-anchor="middle" fill="#7c2d12" font-size="11" font-weight="bold">PARTIAL</text>
  <text x="330" y="299" fill="#9a3412" font-size="11" font-family="monospace">PATCH /todos/:id</text>
  <text x="330" y="315" fill="#9a3412" font-size="11" font-family="monospace">body: {"completed":true}</text>
  <text x="460" y="299" fill="#374151" font-size="11">Update one field only</text>
  <text x="460" y="315" fill="#374151" font-size="11">Partial update</text>
  <rect x="656" y="288" width="90" height="24" rx="4" fill="#22c55e"/>
  <text x="701" y="304" text-anchor="middle" fill="white" font-size="11" font-weight="bold">200 OK</text>

  <!-- DELETE row -->
  <rect x="20" y="344" width="740" height="44" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <rect x="28" y="354" width="120" height="24" rx="4" fill="#ef4444"/>
  <text x="88" y="370" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DELETE</text>
  <rect x="168" y="354" width="90" height="24" rx="4" fill="#fecaca"/>
  <text x="213" y="370" text-anchor="middle" fill="#7f1d1d" font-size="12" font-weight="bold">DELETE</text>
  <text x="330" y="366" fill="#991b1b" font-size="11" font-family="monospace">DELETE /todos/:id</text>
  <text x="460" y="366" fill="#374151" font-size="11">Remove a todo permanently</text>
  <rect x="656" y="354" width="90" height="24" rx="4" fill="#22c55e"/>
  <text x="701" y="370" text-anchor="middle" fill="white" font-size="11" font-weight="bold">200 OK</text>
</svg>
