<svg viewBox="0 0 780 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="260" fill="#f8fafc" rx="12"/>
  <text x="390" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">Client ↔ Server Architecture</text>

  <!-- CLIENT BOX -->
  <rect x="30" y="55" width="150" height="150" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="80" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">CLIENT</text>
  <!-- Browser window icon -->
  <rect x="55" y="90" width="100" height="70" rx="4" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="55" y="90" width="100" height="16" rx="4" fill="#93c5fd"/>
  <circle cx="65" cy="98" r="4" fill="#fff"/>
  <circle cx="77" cy="98" r="4" fill="#fff"/>
  <circle cx="89" cy="98" r="4" fill="#fff"/>
  <rect x="62" y="115" width="86" height="6" rx="2" fill="#bfdbfe"/>
  <rect x="62" y="128" width="60" height="6" rx="2" fill="#bfdbfe"/>
  <rect x="62" y="141" width="76" height="6" rx="2" fill="#bfdbfe"/>
  <text x="105" y="185" text-anchor="middle" fill="#1d4ed8" font-size="11">Browser / App</text>

  <!-- REQUEST ARROW -->
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Request arrow (top) -->
  <path d="M185 110 Q390 80 590 110" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#arr1)" stroke-dasharray="0"/>
  <text x="390" y="90" text-anchor="middle" fill="#ea580c" font-size="12" font-weight="bold">HTTP Request</text>
  <text x="390" y="104" text-anchor="middle" fill="#9a3412" font-size="10">GET /todos  |  POST /todos  |  DELETE /todos/1</text>

  <!-- Response arrow (bottom) -->
  <path d="M590 155 Q390 185 185 155" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arr2)"/>
  <text x="390" y="200" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">HTTP Response</text>
  <text x="390" y="214" text-anchor="middle" fill="#166534" font-size="10">200 OK  |  { "todos": [...] }  |  JSON Data</text>

  <!-- INTERNET CLOUD -->
  <ellipse cx="390" cy="130" rx="55" ry="32" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="390" y="127" text-anchor="middle" fill="#0369a1" font-size="12" font-weight="bold">Internet</text>
  <text x="390" y="142" text-anchor="middle" fill="#0284c7" font-size="10">HTTP/HTTPS</text>

  <!-- SERVER BOX -->
  <rect x="600" y="55" width="150" height="150" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="80" text-anchor="middle" fill="#166534" font-size="13" font-weight="bold">SERVER</text>
  <!-- Server icon -->
  <rect x="625" y="88" width="100" height="22" rx="3" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  <circle cx="636" cy="99" r="4" fill="#fff"/>
  <rect x="645" y="95" width="50" height="4" rx="2" fill="#bbf7d0"/>
  <rect x="625" y="116" width="100" height="22" rx="3" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  <circle cx="636" cy="127" r="4" fill="#fff"/>
  <rect x="645" y="123" width="40" height="4" rx="2" fill="#bbf7d0"/>
  <rect x="625" y="144" width="100" height="22" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="675" y="159" text-anchor="middle" fill="#14532d" font-size="9">todos.json</text>
  <text x="675" y="185" text-anchor="middle" fill="#15803d" font-size="11">Node.js + Express</text>

  <!-- Labels bottom -->
  <text x="105" y="222" text-anchor="middle" fill="#64748b" font-size="10">Your Browser</text>
  <text x="675" y="222" text-anchor="middle" fill="#64748b" font-size="10">localhost:3000</text>
</svg>
