<svg viewBox="0 0 780 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="320" fill="#f8fafc" rx="12"/>
  <text x="390" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">Understanding Host &amp; Port</text>

  <!-- URL Bar -->
  <rect x="40" y="50" width="700" height="50" rx="8" fill="#1e293b"/>
  <rect x="52" y="62" width="676" height="26" rx="5" fill="#fff"/>
  <text x="390" y="80" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="bold" font-family="monospace">http://localhost:3000/todos/5?sort=asc</text>

  <!-- Annotation lines -->
  <!-- protocol -->
  <line x1="95" y1="88" x2="95" y2="130" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="130" width="90" height="36" rx="6" fill="#7c3aed"/>
  <text x="75" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Protocol</text>
  <text x="75" y="163" text-anchor="middle" fill="#e9d5ff" font-size="9">http://</text>

  <!-- host -->
  <line x1="200" y1="88" x2="200" y2="130" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="145" y="130" width="110" height="36" rx="6" fill="#2563eb"/>
  <text x="200" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Host</text>
  <text x="200" y="163" text-anchor="middle" fill="#bfdbfe" font-size="9">localhost</text>

  <!-- port -->
  <line x1="305" y1="88" x2="305" y2="130" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="252" y="130" width="100" height="36" rx="6" fill="#dc2626"/>
  <text x="302" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Port</text>
  <text x="302" y="163" text-anchor="middle" fill="#fecaca" font-size="9">:3000</text>

  <!-- path -->
  <line x1="400" y1="88" x2="400" y2="130" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="130" width="100" height="36" rx="6" fill="#d97706"/>
  <text x="400" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Path</text>
  <text x="400" y="163" text-anchor="middle" fill="#fef3c7" font-size="9">/todos</text>

  <!-- path param -->
  <line x1="466" y1="88" x2="466" y2="130" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="416" y="130" width="100" height="36" rx="6" fill="#059669"/>
  <text x="466" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Path Param</text>
  <text x="466" y="163" text-anchor="middle" fill="#d1fae5" font-size="9">/5  →  :id</text>

  <!-- query -->
  <line x1="610" y1="88" x2="610" y2="130" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="545" y="130" width="130" height="36" rx="6" fill="#db2777"/>
  <text x="610" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Query Param</text>
  <text x="610" y="163" text-anchor="middle" fill="#fce7f3" font-size="9">?sort=asc</text>

  <!-- Explanation boxes row -->
  <!-- Host explanation -->
  <rect x="30" y="195" width="220" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="215" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">HOST = Address</text>
  <text x="140" y="232" text-anchor="middle" fill="#1d4ed8" font-size="11">localhost = your own PC</text>
  <text x="140" y="248" text-anchor="middle" fill="#374151" font-size="10">Like a house address.</text>
  <text x="140" y="262" text-anchor="middle" fill="#374151" font-size="10">127.0.0.1 = same thing</text>
  <text x="140" y="278" text-anchor="middle" fill="#374151" font-size="10">In production: myapp.com</text>

  <!-- Port explanation -->
  <rect x="275" y="195" width="220" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="385" y="215" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="bold">PORT = Door Number</text>
  <text x="385" y="232" text-anchor="middle" fill="#dc2626" font-size="11">:3000 = door on the server</text>
  <text x="385" y="248" text-anchor="middle" fill="#374151" font-size="10">Like apartment number.</text>
  <text x="385" y="262" text-anchor="middle" fill="#374151" font-size="10">3000 = Node.js default</text>
  <text x="385" y="278" text-anchor="middle" fill="#374151" font-size="10">80=HTTP  443=HTTPS</text>

  <!-- Query params explanation -->
  <rect x="520" y="195" width="230" height="100" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="635" y="215" text-anchor="middle" fill="#6b21a8" font-size="12" font-weight="bold">QUERY PARAMS = Filters</text>
  <text x="635" y="232" text-anchor="middle" fill="#7e22ce" font-size="11">After ? in the URL</text>
  <text x="635" y="248" text-anchor="middle" fill="#374151" font-size="10">/todos?sort=asc&amp;page=2</text>
  <text x="635" y="262" text-anchor="middle" fill="#374151" font-size="10">key=value pairs</text>
  <text x="635" y="278" text-anchor="middle" fill="#374151" font-size="10">req.query.sort → "asc"</text>
</svg>
