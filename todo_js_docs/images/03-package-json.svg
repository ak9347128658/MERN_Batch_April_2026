<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="420" fill="#f8fafc" rx="12"/>
  <text x="390" y="28" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">package.json — Project Identity Card</text>

  <!-- File container -->
  <rect x="40" y="44" width="380" height="360" rx="8" fill="#1e293b"/>
  <!-- File tab -->
  <rect x="40" y="44" width="120" height="24" rx="6" fill="#334155"/>
  <text x="100" y="60" text-anchor="middle" fill="#94a3b8" font-size="11">package.json</text>

  <!-- JSON content -->
  <text x="55" y="84" fill="#94a3b8" font-size="12" font-family="monospace">{</text>

  <text x="70" y="104" fill="#f472b6" font-size="12" font-family="monospace">"name"</text>
  <text x="142" y="104" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="152" y="104" fill="#86efac" font-size="12" font-family="monospace">"todo-app"</text>
  <text x="240" y="104" fill="#e2e8f0" font-size="12" font-family="monospace">,</text>

  <text x="70" y="124" fill="#f472b6" font-size="12" font-family="monospace">"version"</text>
  <text x="157" y="124" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="167" y="124" fill="#86efac" font-size="12" font-family="monospace">"1.0.0"</text>
  <text x="226" y="124" fill="#e2e8f0" font-size="12" font-family="monospace">,</text>

  <text x="70" y="144" fill="#f472b6" font-size="12" font-family="monospace">"main"</text>
  <text x="142" y="144" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="152" y="144" fill="#86efac" font-size="12" font-family="monospace">"server.js"</text>
  <text x="248" y="144" fill="#e2e8f0" font-size="12" font-family="monospace">,</text>

  <text x="70" y="164" fill="#f472b6" font-size="12" font-family="monospace">"scripts"</text>
  <text x="154" y="164" fill="#e2e8f0" font-size="12" font-family="monospace">: {</text>
  <text x="85" y="184" fill="#f472b6" font-size="12" font-family="monospace">"start"</text>
  <text x="141" y="184" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="151" y="184" fill="#fbbf24" font-size="12" font-family="monospace">"node server.js"</text>
  <text x="280" y="184" fill="#e2e8f0" font-size="12" font-family="monospace">,</text>
  <text x="85" y="204" fill="#f472b6" font-size="12" font-family="monospace">"dev"</text>
  <text x="121" y="204" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="131" y="204" fill="#fbbf24" font-size="12" font-family="monospace">"nodemon server.js"</text>
  <text x="70" y="220" fill="#e2e8f0" font-size="12" font-family="monospace">},</text>

  <text x="70" y="244" fill="#f472b6" font-size="12" font-family="monospace">"dependencies"</text>
  <text x="196" y="244" fill="#e2e8f0" font-size="12" font-family="monospace">: {</text>
  <text x="85" y="264" fill="#f472b6" font-size="12" font-family="monospace">"express"</text>
  <text x="155" y="264" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="165" y="264" fill="#86efac" font-size="12" font-family="monospace">"^4.18.2"</text>
  <text x="70" y="280" fill="#e2e8f0" font-size="12" font-family="monospace">},</text>

  <text x="70" y="304" fill="#f472b6" font-size="12" font-family="monospace">"devDependencies"</text>
  <text x="220" y="304" fill="#e2e8f0" font-size="12" font-family="monospace">: {</text>
  <text x="85" y="324" fill="#f472b6" font-size="12" font-family="monospace">"nodemon"</text>
  <text x="158" y="324" fill="#e2e8f0" font-size="12" font-family="monospace">:</text>
  <text x="168" y="324" fill="#86efac" font-size="12" font-family="monospace">"^3.0.1"</text>
  <text x="70" y="340" fill="#e2e8f0" font-size="12" font-family="monospace">}</text>

  <text x="55" y="360" fill="#94a3b8" font-size="12" font-family="monospace">}</text>

  <!-- Callout boxes on right -->
  <defs>
    <marker id="arrSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- name callout -->
  <line x1="420" y1="104" x2="460" y2="104" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrSmall)"/>
  <rect x="462" y="88" width="280" height="34" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="602" y="107" text-anchor="middle" fill="#1e40af" font-size="11">Project name (lowercase, no spaces)</text>

  <!-- version callout -->
  <line x1="420" y1="124" x2="460" y2="134" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrSmall)"/>
  <rect x="462" y="120" width="280" height="34" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="602" y="137" text-anchor="middle" fill="#15803d" font-size="11">Semantic versioning: major.minor.patch</text>

  <!-- scripts callout -->
  <line x1="420" y1="184" x2="460" y2="184" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrSmall)"/>
  <rect x="462" y="158" width="280" height="52" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="602" y="177" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="bold">npm run start  →  node server.js</text>
  <text x="602" y="195" text-anchor="middle" fill="#854d0e" font-size="11">npm run dev  →  nodemon server.js</text>

  <!-- dependencies callout -->
  <line x1="420" y1="264" x2="460" y2="264" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrSmall)"/>
  <rect x="462" y="244" width="280" height="52" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="602" y="263" text-anchor="middle" fill="#6b21a8" font-size="11" font-weight="bold">Production libraries</text>
  <text x="602" y="281" text-anchor="middle" fill="#6b21a8" font-size="11">npm install → saves here</text>

  <!-- devDependencies callout -->
  <line x1="420" y1="324" x2="460" y2="314" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrSmall)"/>
  <rect x="462" y="298" width="280" height="52" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="602" y="317" text-anchor="middle" fill="#9a3412" font-size="11" font-weight="bold">Dev-only tools (not in production)</text>
  <text x="602" y="335" text-anchor="middle" fill="#9a3412" font-size="11">npm install --save-dev nodemon</text>

  <!-- npm commands box at bottom -->
  <rect x="462" y="368" width="280" height="40" rx="6" fill="#1e293b"/>
  <text x="602" y="383" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">npm init -y        → creates this file</text>
  <text x="602" y="399" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">npm install express → adds to deps</text>
</svg>
