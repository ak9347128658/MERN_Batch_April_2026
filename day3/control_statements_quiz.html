
<style>
  h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  .quiz-wrap{padding:.25rem 0}
  .score-row{display:flex;gap:10px;align-items:center;margin-bottom:.75rem;font-size:13px;color:var(--color-text-secondary)}
  .score-val{font-size:20px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
  .prog-bar{flex:1;height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
  .prog-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width .4s}
  .q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
  .q-tag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;display:inline-block;margin-bottom:.5rem}
  .q-text{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem;line-height:1.5}
  .q-code{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.5rem .75rem;font-family:var(--font-mono);font-size:12.5px;line-height:1.7;color:var(--color-text-primary);margin:.4rem 0}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:.6rem 0}
  .opt{padding:.6rem .9rem;border-radius:var(--border-radius-md);border:1.5px solid var(--color-border-secondary);font-size:13px;text-align:center;cursor:pointer;transition:all .2s;color:var(--color-text-primary);background:var(--color-background-secondary);font-family:var(--font-mono)}
  .opt:hover{border-color:#534AB7;background:#EEEDFE}
  .opt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
  .opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
  .opt.show-correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
  .feedback{padding:.6rem 1rem;border-radius:var(--border-radius-md);font-size:13px;margin:.4rem 0;display:none;font-weight:500}
  .fb-ok{background:#E1F5EE;color:#085041}.fb-no{background:#FCEBEB;color:#791F1F}
  .explain{background:var(--color-background-secondary);border-left:3px solid #534AB7;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:.5rem .9rem;font-size:12.5px;color:var(--color-text-secondary);margin:.3rem 0;display:none}
  .next-btn{width:100%;margin-top:.5rem;display:none}
  .finish-box{text-align:center;padding:1.5rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary)}
  @media(max-width:480px){.opts{grid-template-columns:1fr}}
</style>

<h2 class="sr-only">Control statements revision quiz with 10 questions</h2>

<div class="quiz-wrap">
  <div class="score-row">
    <span>Score:</span>
    <span class="score-val" id="sc">0 / 0</span>
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0"></div></div>
    <span id="qc" style="font-size:12px">Q 1 of 10</span>
  </div>
  <div id="q-area"></div>
</div>

<script>
const qs=[
  {tag:'if/else',tagColor:'#EEEDFE',tagText:'#534AB7',
   text:'What is the output of this code?',
   code:'let x = 15;\nif (x > 20) {\n  console.log("big");\n} else if (x > 10) {\n  console.log("medium");\n} else {\n  console.log("small");\n}',
   opts:['big','medium','small','error'],ans:'medium',
   explain:'x=15 is NOT > 20, but IS > 10 — so the else-if runs.'},
  {tag:'switch',tagColor:'#E1F5EE',tagText:'#085041',
   text:'What happens if you forget break in a switch case?',
   opts:['Error is thrown','Code stops working','Falls through to next case','Nothing — it\'s fine'],
   ans:'Falls through to next case',
   explain:'"Fall-through" — JavaScript keeps running into the next case without stopping.'},
  {tag:'for loop',tagColor:'#E6F1FB',tagText:'#185FA5',
   text:'How many times does this loop run?',
   code:'for (let i = 2; i < 8; i += 2) {\n  console.log(i);\n}',
   opts:['3','4','6','8'],ans:'3',
   explain:'i goes: 2, 4, 6 — then 8 is NOT < 8 so stops. That\'s 3 iterations.'},
  {tag:'while',tagColor:'#FAEEDA',tagText:'#633806',
   text:'What is wrong with this code?',
   code:'let n = 5;\nwhile (n > 0) {\n  console.log(n);\n}',
   opts:['Nothing — it\'s fine','Missing semicolon','n never decreases — infinite loop!','while needs a for'],
   ans:'n never decreases — infinite loop!',
   explain:'n never changes so (n > 0) is always true — the loop runs forever! Always update the variable inside while.'},
  {tag:'do...while',tagColor:'#FAECE7',tagText:'#4A1B0C',
   text:'How many times does this do...while run?',
   code:'let x = 10;\ndo {\n  console.log(x);\n  x++;\n} while (x < 5);',
   opts:['0','1','5','10'],ans:'1',
   explain:'do...while always runs at LEAST once. x=10 is already not < 5, but it still runs the body once before checking.'},
  {tag:'break',tagColor:'#FCEBEB',tagText:'#791F1F',
   text:'What does this code print?',
   code:'for (let i = 0; i < 5; i++) {\n  if (i === 3) break;\n  console.log(i);\n}',
   opts:['0 1 2 3','0 1 2','0 1 2 3 4','3 4'],ans:'0 1 2',
   explain:'When i=3, break fires BEFORE console.log — so 3 is never printed. Output is 0, 1, 2.'},
  {tag:'continue',tagColor:'#FAEEDA',tagText:'#633806',
   text:'What does this code print?',
   code:'for (let i = 0; i < 6; i++) {\n  if (i % 2 === 0) continue;\n  console.log(i);\n}',
   opts:['0 2 4','1 3 5','0 1 2 3 4 5','1 2 3'],ans:'1 3 5',
   explain:'continue skips even numbers (0,2,4). Only odd numbers (1,3,5) reach console.log.'},
  {tag:'ternary',tagColor:'#EEEDFE',tagText:'#534AB7',
   text:'What is the value of result?',
   code:'let age = 16;\nlet result = age >= 18 ? "Adult" : "Minor";',
   opts:['"Adult"','"Minor"','undefined','error'],ans:'"Minor"',
   explain:'age=16 is NOT >= 18, so the false branch "Minor" is returned.'},
  {tag:'loops',tagColor:'#E1F5EE',tagText:'#085041',
   text:'Which loop is BEST when you don\'t know how many times to repeat?',
   opts:['for loop','while loop','do...while','forEach'],ans:'while loop',
   explain:'for is for known counts. while is for unknown counts — "keep going until something becomes false".'},
  {tag:'all',tagColor:'#F1EFE8',tagText:'#444441',
   text:'What is the output?',
   code:'let sum = 0;\nfor (let i = 1; i <= 5; i++) {\n  if (i === 3) continue;\n  sum += i;\n}\nconsole.log(sum);',
   opts:['15','12','10','9'],ans:'12',
   explain:'Adds 1+2+4+5=12. When i=3, continue skips it — so 3 is NOT added to sum.'},
];

let qi=0, score=0, total=0, answered=false;

function render(){
  const q=qs[qi]; answered=false;
  document.getElementById('qc').textContent='Q '+(qi+1)+' of '+qs.length;
  let html=`<div class="q-card">`
    +`<span class="q-tag" style="background:${q.tagColor};color:${q.tagText}">${q.tag}</span>`
    +`<div class="q-text">${q.text}</div>`
    +(q.code?`<div class="q-code">${q.code.replace(/\n/g,'<br>').replace(/ /g,'&nbsp;')}</div>`:'')
    +`<div class="opts" id="opts">`;
  q.opts.forEach(o=>{
    html+=`<div class="opt" onclick="pick(this,'${o.replace(/'/g,"\\'")}')"> ${o}</div>`;
  });
  html+=`</div><div class="feedback" id="fb"></div><div class="explain" id="ex"></div>`
    +`<button class="next-btn" id="nb" onclick="nextQ()">Next question →</button></div>`;
  document.getElementById('q-area').innerHTML=html;
}

function pick(el,chosen){
  if(answered) return;
  answered=true; total++;
  const q=qs[qi];
  const ok=chosen===q.ans;
  if(ok){score++; el.classList.add('correct');}
  else{
    el.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(o=>{if(o.textContent.trim()===q.ans)o.classList.add('show-correct');});
  }
  const fb=document.getElementById('fb');
  fb.style.display='block';
  fb.className='feedback '+(ok?'fb-ok':'fb-no');
  fb.textContent=ok?'Correct! ':'Wrong — the answer is: '+q.ans;
  const ex=document.getElementById('ex');
  ex.style.display='block'; ex.textContent='Explanation: '+q.explain;
  document.getElementById('nb').style.display='block';
  document.getElementById('sc').textContent=score+' / '+total;
  document.getElementById('pf').style.width=Math.round(score/total*100)+'%';
}

function nextQ(){
  qi=(qi+1)%qs.length;
  render();
}

render();
</script>
